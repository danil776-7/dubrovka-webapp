<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Dubrovka Admin</title>

<style>
body{
background:#0d0d0d;
color:#fff;
font-family:Arial;
padding:20px;
}

h2{
text-align:center;
}

.card{
background:#1c1c1c;
padding:15px;
margin-bottom:12px;
border-radius:12px;
}

.row{
display:flex;
justify-content:space-between;
}

button{
margin-top:10px;
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.done{background:#28a745;}
.delete{background:#dc3545;}
</style>
</head>

<body>

<h2>📊 Брони</h2>

<div id="list">Загрузка...</div>

<script>
const API = "https://dubrovka-webapp-9.onrender.com";

let lastData = "";

// =====================
// ЗАГРУЗКА
// =====================

async function load(){

try{

let res = await fetch(API + "/bookings");
let data = await res.json();

let json = JSON.stringify(data);

// 🔥 если ничего не изменилось — не перерисовываем
if(json === lastData) return;
lastData = json;

let html = "";

if(data.length === 0){
html = "Нет броней";
}else{

data.reverse().forEach(b=>{

html += `
<div class="card">

<div class="row">
<b>${b.name}</b>
<span>${b.time}</span>
</div>

📅 ${b.date}<br>
📞 ${b.phone}<br>
🪑 Стол: ${b.table}<br>
👥 ${b.guests}<br>
📌 ${b.status}

<br>

<button class="done" onclick="done(${b.id})">
Гость ушёл
</button>

</div>
`;
});
}

document.getElementById("list").innerHTML = html;

}catch(e){
document.getElementById("list").innerHTML = "Ошибка загрузки";
}
}

// =====================
// ОСВОБОДИТЬ СТОЛ
// =====================

async function done(id){

await fetch(API + "/done/" + id,{
method:"POST"
});

load();
}

// =====================
// 🔥 АВТО ОБНОВЛЕНИЕ (каждые 2 сек)
// =====================

setInterval(load, 2000);

// первая загрузка
load();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Админ панель</title>

<style>
body{
background:#111;
color:#fff;
font-family:Arial;
padding:20px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:10px;
background:#d6b36a;
border:none;
border-radius:8px;
cursor:pointer;
}

.card{
background:#222;
padding:12px;
margin:10px 0;
border-radius:10px;
}

h2{
text-align:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2>🔐 Вход</h2>

<input id="loginInput" placeholder="Логин">
<input id="passwordInput" type="password" placeholder="Пароль">

<button onclick="adminLogin()">Войти</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none;">
<h2>📊 Брони</h2>
<div id="list">Загрузка...</div>
</div>

<script>
const API = "https://dubrovka-webapp-9.onrender.com";

// =====================
// ЛОГИН (БЕЗ БАГОВ)
// =====================

async function adminLogin(){

let loginValue = document.getElementById("loginInput").value;
let passwordValue = document.getElementById("passwordInput").value;

try{

let res = await fetch(API + "/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
login: loginValue,
password: passwordValue
})
});

let data = await res.json();

if(data.ok){

localStorage.setItem("admin","1");

document.getElementById("loginBox").style.display="none";
document.getElementById("panel").style.display="block";

loadBookings();

}else{
alert("❌ Неверный логин или пароль");
}

}catch(e){
alert("Ошибка соединения");
console.error(e);
}
}

// =====================
// ПРОВЕРКА СЕССИИ
// =====================

if(localStorage.getItem("admin")){
document.getElementById("loginBox").style.display="none";
document.getElementById("panel").style.display="block";
loadBookings();
}

// =====================
// ЗАГРУЗКА БРОНЕЙ
// =====================

async function loadBookings(){

try{

let res = await fetch(API + "/bookings");
let data = await res.json();

let html = "";

if(data.length === 0){
html = "Нет броней";
}else{

data.reverse().forEach(b=>{
html += `
<div class="card">
<b>${b.name}</b><br>
📅 ${b.date} ${b.time}<br>
📞 ${b.phone}<br>
🪑 Стол: ${b.table}<br>
👥 ${b.guests}<br>

<button onclick="doneBooking(${b.id})">
Гость ушёл
</button>
</div>
`;
});
}

document.getElementById("list").innerHTML = html;

}catch(e){
document.getElementById("list").innerHTML = "Ошибка загрузки";
}
}

// =====================
// ОСВОБОДИТЬ СТОЛ
// =====================

async function doneBooking(id){

await fetch(API + "/done/" + id,{
method:"POST"
});

loadBookings();
}

// =====================
// АВТО ОБНОВЛЕНИЕ
// =====================

setInterval(loadBookings, 2000);
</script>

</body>
</html>

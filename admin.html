<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka PRO Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#faf9f7;
color:#4a4a4a;
}

.container{display:flex;height:100vh;}

/* sidebar */
.sidebar{
width:230px;
background:#ffffff;
padding:20px;
border-right:1px solid #efe8df;
}

.logo{
color:#b89a4b;
font-size:20px;
margin-bottom:20px;
font-weight:500;
}

.menu div{
padding:10px;
margin-bottom:8px;
border-radius:12px;
cursor:pointer;
transition:all 0.2s;
}

.menu div:hover{background:#f5f2ed;}
.active{background:#e8dbbc;color:#6b5a3a;}

/* content */
.content{
flex:1;
padding:20px;
overflow:auto;
}

.header{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

input, select{
padding:10px 12px;
border-radius:12px;
border:1px solid #efe8df;
background:#ffffff;
color:#4a4a4a;
font-size:14px;
}

input:focus, select:focus{
outline:none;
border-color:#e8dbbc;
}

button{
padding:10px 16px;
border-radius:12px;
border:none;
background:#e8dbbc;
color:#6b5a3a;
cursor:pointer;
font-weight:500;
transition:all 0.2s;
}

button:hover{
background:#e2d4b0;
}

/* grid */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:12px;
}

/* card */
.card{
background:#ffffff;
padding:15px;
border-radius:16px;
border:1px solid #efe8df;
transition:0.2s;
}

.card.new{
border:1px solid #e8dbbc;
box-shadow:0 2px 8px rgba(184,154,75,0.1);
}

.time{
font-size:22px;
color:#b89a4b;
font-weight:500;
}

.name{font-size:18px;font-weight:500;margin:8px 0 4px;}
.phone{color:#bcb2a4;margin-bottom:8px;font-size:13px;}

.status{
font-size:11px;
padding:4px 8px;
border-radius:20px;
display:inline-block;
margin-bottom:6px;
font-weight:500;
}

.active{background:#e8dbbc;color:#6b5a3a;}
.completed{background:#d4e0d4;color:#4a6b4a;}
.cancelled{background:#f0e4dc;color:#b87a5a;}
.pending{background:#f0ede8;color:#8a7a6a;}

button.done-btn{
padding:8px 12px;
border:none;
border-radius:12px;
background:#e8dbbc;
color:#6b5a3a;
cursor:pointer;
margin-top:10px;
width:100%;
font-size:13px;
font-weight:500;
}

button.done-btn:hover{
background:#e2d4b0;
}

.date-title{
margin:20px 0 10px;
font-size:16px;
color:#b89a4b;
font-weight:500;
}

.error-message{
background:#fef5f0;
padding:15px;
border-radius:12px;
color:#c97e5a;
text-align:center;
margin:20px;
border:1px solid #fae5d6;
}

.loading{
text-align:center;
padding:40px;
color:#bcb2a4;
}
</style>
</head>

<body>

<audio id="notifySound">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<div class="container">

<div class="sidebar">
<div class="logo">🍷 Dubrovka PRO</div>

<div class="menu">
<div class="active" onclick="showToday(this)">📅 Сегодня</div>
<div onclick="showCalendar(this)">🗓 Календарь</div>
</div>
</div>

<div class="content">

<div class="header">
<input type="text" id="search" placeholder="🔍 Поиск (имя / телефон)">
<select id="tableFilter">
<option value="">Все столы</option>
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
<option>VIP</option>
</select>
<input type="date" id="dateInput" style="display:none;">
<button onclick="refresh()" style="background:#f5f2ed;">🔄 Обновить</button>
</div>

<div id="list"></div>

</div>

</div>

<script>
// ПРЯМАЯ ССЫЛКА НА API (без переменных окружения)
const API = "https://dubrovka-webapp-production-a00c.up.railway.app";
const list = document.getElementById("list");

let currentData = [];
let previousIds = new Set();
let currentMode = "today";

/* дата */
function getLocalDate(){
let now=new Date();
let tz=now.getTimezoneOffset()*60000;
return new Date(now-tz).toISOString().split("T")[0];
}

/* загрузка с обработкой ошибок */
async function load(date){
if(!date) return;
try {
console.log(`🔄 Загрузка броней на ${date}...`);
let res = await fetch(`${API}/bookings_by_date?date=${date}`);
console.log(`📡 Статус ответа: ${res.status}`);
if(!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
let data = await res.json();
console.log(`✅ Загружено броней: ${data.length}`, data);
handleNew(data);
currentData = data;
render();
} catch(e) {
console.error("❌ Ошибка загрузки:", e);
list.innerHTML = `<div class="error-message">
❌ Ошибка загрузки данных<br>
<small>${e.message}</small><br><br>
<button onclick="refresh()" style="background:#e8dbbc;">Повторить</button>
</div>`;
}
}

/* новые брони */
function handleNew(data){
let newIds = data.map(b=>b.id);
let hasNew = false;

newIds.forEach(id=>{
if(!previousIds.has(id)){
hasNew = true;
console.log("🔔 Новая бронь:", id);
}
});

if(hasNew){
let sound = document.getElementById("notifySound");
if(sound) sound.play().catch(e=>console.log("Звук не воспроизведен"));
}

previousIds = new Set(newIds);
}

/* фильтр */
function applyFilters(data){
let search = document.getElementById("search").value.toLowerCase();
let table = document.getElementById("tableFilter").value;

return data.filter(b=>{
let matchSearch = 
b.name.toLowerCase().includes(search) ||
b.phone.includes(search);
let matchTable = !table || b.table == table;
return matchSearch && matchTable;
});
}

/* render */
function render(){
let data = applyFilters(currentData);

if(data.length === 0){
list.innerHTML = "<div style='text-align:center;padding:40px;color:#bcb2a4;'>📭 Нет броней на этот день</div>";
return;
}

data.sort((a,b)=> new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));

let grouped = {};
data.forEach(b=>{
if(!grouped[b.date]) grouped[b.date]=[];
grouped[b.date].push(b);
});

let html="";

for(let date in grouped){
html += `<div class="date-title">📅 ${date}</div><div class="grid">`;

grouped[date].forEach(b=>{
let isNew = !previousIds.has(b.id);
let statusText = b.status === "active" ? "✅ Активна" : 
                 b.status === "completed" ? "✔ Завершена" : 
                 b.status === "cancelled" ? "❌ Отменена" : b.status;

html += `
<div class="card ${isNew ? 'new':''}">
<div class="status ${b.status}">${statusText}</div>
<div class="time">⏰ ${b.time}</div>
<div class="name">👤 ${b.name}</div>
<div class="phone">📞 ${b.phone}</div>
<div>🪑 Стол ${b.table} | 👥 ${b.guests} чел.</div>
`;

if(b.status === "active"){
html += `<button class="done-btn" onclick="done(${b.id})">✅ Гость ушёл</button>`;
}

html += `</div>`;
});

html += `</div>`;
}

list.innerHTML = html;
}

/* done */
async function done(id){
if(!confirm("Отметить что гость ушел?")) return;
try {
console.log(`📤 Отправка запроса на завершение брони ${id}...`);
let res = await fetch(`${API}/done/${id}`, {method:"POST"});
if(res.ok){
currentData = currentData.map(b=> b.id===id ? {...b,status:"completed"} : b);
render();
console.log(`✅ Бронь ${id} завершена`);
} else {
throw new Error(`HTTP ${res.status}`);
}
} catch(e) {
console.error("❌ Ошибка:", e);
alert("Ошибка: " + e.message);
}
}

/* refresh */
function refresh(){
let date = currentMode === "today" ? getLocalDate() : dateInput.value;
if(date) {
list.innerHTML = '<div class="loading">🔄 Загрузка...</div>';
load(date);
}
}

/* табы */
function showToday(el){
currentMode = "today";
setActive(el);
document.getElementById("dateInput").style.display="none";
load(getLocalDate());
}

function showCalendar(el){
currentMode = "calendar";
setActive(el);
document.getElementById("dateInput").style.display="block";
let date = document.getElementById("dateInput").value || getLocalDate();
load(date);
}

function setActive(el){
document.querySelectorAll(".menu div").forEach(e=>e.classList.remove("active"));
el.classList.add("active");
}

/* события */
document.getElementById("dateInput").onchange=()=>{
if(currentMode === "calendar") load(dateInput.value);
};
document.getElementById("search").oninput=render;
document.getElementById("tableFilter").onchange=render;

/* автообновление каждые 5 секунд */
setInterval(()=>{
let date = currentMode === "today" ? getLocalDate() : document.getElementById("dateInput").value;
if(date) load(date);
},5000);

/* старт */
console.log("🚀 Админ панель запущена");
console.log(`📡 API URL: ${API}`);
load(getLocalDate());
</script>

</body>
</html>

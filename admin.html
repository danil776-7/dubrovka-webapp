<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka PRO Admin</title>
<style>
/* ... стили как выше ... */
</style>
</head>
<body>

<div class="container">
  <div class="sidebar">
    <div class="logo">🍷 Dubrovka PRO</div>
    <div class="menu">
      <div class="active" onclick="showToday(this)">📅 Сегодня</div>
      <div onclick="showCalendar(this)">🗓 Календарь</div>
    </div>
  </div>

  <div class="content">
    <div class="header">
      <input type="text" id="search" placeholder="🔍 Поиск (имя / телефон)">
      <select id="tableFilter">
        <option value="">Все столы</option>
        <option>1</option><option>2</option><option>3</option>
        <option>4</option><option>5</option><option>6</option>
        <option>VIP</option>
      </select>
      <input type="date" id="dateInput" style="display:none;">
      <button onclick="refresh()">🔄 Обновить</button>
    </div>
    <div id="list"></div>
  </div>
</div>

<script>
// ПРЯМАЯ ССЫЛКА НА API
const API = "https://dubrovka-webapp-production-a00c.up.railway.app";
const list = document.getElementById("list");

let currentData = [];
let previousIds = new Set();
let currentMode = "today";

function getLocalDate(){
  let now = new Date();
  let tz = now.getTimezoneOffset() * 60000;
  return new Date(now - tz).toISOString().split("T")[0];
}

async function load(date){
  if(!date) return;
  try {
    console.log(`🔄 Загрузка броней на ${date}...`);
    const url = `${API}/bookings_by_date?date=${date}`;
    console.log(`📡 URL: ${url}`);
    
    const res = await fetch(url, {
      method: 'GET',
      headers: {
        'Content-Type': 'application/json',
      }
    });
    
    console.log(`📡 Статус: ${res.status}`);
    
    if(!res.ok) {
      const errorText = await res.text();
      throw new Error(`HTTP ${res.status}: ${errorText}`);
    }
    
    const data = await res.json();
    console.log(`✅ Загружено броней: ${data.length}`, data);
    
    handleNew(data);
    currentData = data;
    render();
  } catch(e) {
    console.error("❌ Ошибка загрузки:", e);
    list.innerHTML = `<div style="background:#fef5f0;padding:20px;border-radius:12px;color:#c97e5a;text-align:center;">
      ❌ Ошибка загрузки данных<br>
      <small>${e.message}</small><br><br>
      <button onclick="refresh()" style="background:#e8dbbc;border:none;padding:8px 16px;border-radius:8px;">Повторить</button>
    </div>`;
  }
}

function handleNew(data){
  let newIds = data.map(b=>b.id);
  let hasNew = false;
  newIds.forEach(id => {
    if(!previousIds.has(id)){
      hasNew = true;
      console.log("🔔 Новая бронь:", id);
    }
  });
  if(hasNew){
    // звук если нужно
  }
  previousIds = new Set(newIds);
}

function applyFilters(data){
  let search = document.getElementById("search").value.toLowerCase();
  let table = document.getElementById("tableFilter").value;
  return data.filter(b => {
    let matchSearch = b.name.toLowerCase().includes(search) || b.phone.includes(search);
    let matchTable = !table || b.table == table;
    return matchSearch && matchTable;
  });
}

function render(){
  let data = applyFilters(currentData);
  if(data.length === 0){
    list.innerHTML = "<div style='text-align:center;padding:40px;color:#bcb2a4;'>📭 Нет броней</div>";
    return;
  }
  data.sort((a,b)=> new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));
  let grouped = {};
  data.forEach(b => {
    if(!grouped[b.date]) grouped[b.date] = [];
    grouped[b.date].push(b);
  });
  let html = "";
  for(let date in grouped){
    html += `<div style="margin:20px 0 10px;font-size:16px;color:#b89a4b;">📅 ${date}</div><div class="grid">`;
    grouped[date].forEach(b => {
      let isNew = !previousIds.has(b.id);
      let statusText = b.status === "active" ? "✅ Активна" : b.status === "completed" ? "✔ Завершена" : b.status;
      html += `
        <div style="background:#ffffff;padding:15px;border-radius:16px;border:1px solid #efe8df;${isNew ? 'border-color:#e8dbbc;' : ''}">
          <div style="font-size:11px;padding:4px 8px;border-radius:20px;display:inline-block;background:#e8dbbc;color:#6b5a3a;">${statusText}</div>
          <div style="font-size:22px;color:#b89a4b;margin-top:8px;">⏰ ${b.time}</div>
          <div style="font-size:18px;margin:8px 0 4px;">👤 ${b.name}</div>
          <div style="color:#bcb2a4;margin-bottom:8px;">📞 ${b.phone}</div>
          <div>🪑 Стол ${b.table} | 👥 ${b.guests} чел.</div>
          ${b.status === "active" ? `<button onclick="done(${b.id})" style="width:100%;margin-top:10px;padding:8px;background:#e8dbbc;border:none;border-radius:12px;">✅ Гость ушёл</button>` : ''}
        </div>
      `;
    });
    html += `</div>`;
  }
  list.innerHTML = html;
}

async function done(id){
  if(!confirm("Отметить что гость ушел?")) return;
  try {
    const res = await fetch(`${API}/done/${id}`, {method: "POST"});
    if(res.ok){
      currentData = currentData.map(b => b.id===id ? {...b, status:"completed"} : b);
      render();
      console.log(`✅ Бронь ${id} завершена`);
    } else {
      throw new Error(`HTTP ${res.status}`);
    }
  } catch(e) {
    console.error("❌ Ошибка:", e);
    alert("Ошибка: " + e.message);
  }
}

function refresh(){
  let date = currentMode === "today" ? getLocalDate() : dateInput.value;
  if(date) {
    list.innerHTML = '<div style="text-align:center;padding:40px;">🔄 Загрузка...</div>';
    load(date);
  }
}

function showToday(el){
  currentMode = "today";
  document.querySelectorAll(".menu div").forEach(e => e.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("dateInput").style.display = "none";
  load(getLocalDate());
}

function showCalendar(el){
  currentMode = "calendar";
  document.querySelectorAll(".menu div").forEach(e => e.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("dateInput").style.display = "block";
  let date = document.getElementById("dateInput").value || getLocalDate();
  load(date);
}

document.getElementById("dateInput").onchange = () => {
  if(currentMode === "calendar") load(dateInput.value);
};
document.getElementById("search").oninput = render;
document.getElementById("tableFilter").onchange = render;

setInterval(() => {
  let date = currentMode === "today" ? getLocalDate() : document.getElementById("dateInput").value;
  if(date) load(date);
}, 10000);

console.log("🚀 Админ панель запущена");
load(getLocalDate());
</script>
</body>
</html>

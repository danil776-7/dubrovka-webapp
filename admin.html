<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUBROVKA PRO - Админ панель</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', Arial, sans-serif;
  background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
  color: #fff;
  min-height: 100vh;
}

/* СТРАНИЦА ВХОДА */
.login-container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.login-card {
  background: rgba(20, 20, 30, 0.95);
  backdrop-filter: blur(10px);
  padding: 40px;
  border-radius: 24px;
  border: 1px solid rgba(212, 175, 55, 0.3);
  width: 100%;
  max-width: 400px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
}

.login-logo {
  text-align: center;
  margin-bottom: 30px;
}

.login-logo h2 {
  color: #d4af37;
  font-size: 28px;
  margin-bottom: 5px;
}

.login-logo p {
  color: #888;
  font-size: 14px;
}

.login-input {
  width: 100%;
  padding: 14px 16px;
  margin: 10px 0;
  border-radius: 12px;
  border: 1px solid rgba(212, 175, 55, 0.3);
  background: rgba(30, 30, 40, 0.9);
  color: #fff;
  font-size: 15px;
  transition: all 0.3s ease;
}

.login-input:focus {
  outline: none;
  border-color: #d4af37;
  box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
}

.login-btn {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  background: linear-gradient(135deg, #d4af37 0%, #b88d2a 100%);
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 700;
  font-size: 16px;
  color: #0a0a0f;
  transition: all 0.3s ease;
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
}

/* АДМИН ПАНЕЛЬ */
.admin-container {
  display: flex;
  height: 100vh;
  display: none;
}

.sidebar {
  width: 260px;
  background: rgba(10, 10, 15, 0.95);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-right: 1px solid rgba(212, 175, 55, 0.2);
  overflow-y: auto;
}

.logo {
  color: #d4af37;
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 30px;
  text-align: center;
  padding-bottom: 15px;
  border-bottom: 1px solid rgba(212, 175, 55, 0.2);
}

.menu-item {
  padding: 12px 15px;
  margin-bottom: 8px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
  font-weight: 500;
}

.menu-item:hover {
  background: rgba(212, 175, 55, 0.15);
}

.menu-item.active {
  background: linear-gradient(135deg, #d4af37 0%, #b88d2a 100%);
  color: #0a0a0f;
}

.user-info {
  margin-top: 30px;
  padding: 15px;
  background: rgba(30, 30, 40, 0.8);
  border-radius: 12px;
  font-size: 12px;
  color: #888;
}

.logout-btn {
  width: 100%;
  padding: 8px;
  margin-top: 10px;
  background: rgba(231, 76, 60, 0.2);
  border: 1px solid rgba(231, 76, 60, 0.3);
  border-radius: 8px;
  color: #e74c3c;
  cursor: pointer;
  transition: all 0.2s ease;
}

.logout-btn:hover {
  background: rgba(231, 76, 60, 0.4);
}

.content {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.header-bar {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  background: rgba(20, 20, 30, 0.8);
  padding: 15px;
  border-radius: 16px;
}

.header-bar input, .header-bar select {
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid rgba(212, 175, 55, 0.3);
  background: rgba(30, 30, 40, 0.9);
  color: #fff;
  font-size: 14px;
  flex: 1;
}

.header-bar button {
  padding: 10px 20px;
  background: rgba(212, 175, 55, 0.2);
  border: 1px solid rgba(212, 175, 55, 0.3);
  border-radius: 12px;
  color: #d4af37;
  cursor: pointer;
  transition: all 0.2s ease;
}

.header-bar button:hover {
  background: rgba(212, 175, 55, 0.4);
}

/* СТАТИСТИКА */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
  margin-bottom: 20px;
}

.stat-card {
  background: rgba(20, 20, 30, 0.8);
  padding: 20px;
  border-radius: 16px;
  text-align: center;
  border: 1px solid rgba(212, 175, 55, 0.2);
}

.stat-card .number {
  font-size: 32px;
  color: #d4af37;
  font-weight: 700;
}

.stat-card .label {
  font-size: 12px;
  color: #888;
  margin-top: 5px;
}

/* СПИСОК БРОНЕЙ */
.bookings-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  gap: 16px;
}

.booking-card {
  background: rgba(20, 20, 30, 0.9);
  padding: 18px;
  border-radius: 16px;
  border: 1px solid rgba(212, 175, 55, 0.2);
  transition: all 0.2s ease;
}

.booking-card.selected {
  border: 2px solid #d4af37;
  background: rgba(212, 175, 55, 0.1);
}

.booking-card.new {
  border: 1px solid #d4af37;
  box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
}

.time-badge {
  font-size: 22px;
  color: #d4af37;
  font-weight: 700;
  margin-bottom: 8px;
}

.time-interval {
  display: inline-block;
  background: rgba(212, 175, 55, 0.15);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  color: #d4af37;
  margin-bottom: 10px;
}

.name {
  font-size: 18px;
  font-weight: 600;
  margin: 8px 0 4px;
}

.phone {
  color: #888;
  font-size: 13px;
  margin-bottom: 8px;
}

.table-info {
  display: flex;
  gap: 12px;
  margin: 8px 0;
  font-size: 13px;
  color: #aaa;
}

.status {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  margin-bottom: 10px;
}

.status.active {
  background: rgba(212, 175, 55, 0.2);
  color: #d4af37;
}

.status.completed {
  background: rgba(46, 204, 113, 0.2);
  color: #2ecc71;
}

.status.cancelled {
  background: rgba(231, 76, 60, 0.2);
  color: #e74c3c;
}

/* КНОПКИ ДЕЙСТВИЙ */
.booking-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.btn-sm {
  padding: 8px 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: all 0.2s ease;
}

.btn-sm:hover {
  transform: translateY(-1px);
}

.btn-edit {
  background: rgba(52, 152, 219, 0.2);
  color: #3498db;
  border: 1px solid #3498db;
}

.btn-extend {
  background: rgba(46, 204, 113, 0.2);
  color: #2ecc71;
  border: 1px solid #2ecc71;
}

.btn-complete {
  background: rgba(212, 175, 55, 0.2);
  color: #d4af37;
  border: 1px solid #d4af37;
}

.btn-cancel {
  background: rgba(231, 76, 60, 0.2);
  color: #e74c3c;
  border: 1px solid #e74c3c;
}

.btn-export {
  background: rgba(52, 152, 219, 0.2);
  color: #3498db;
  border: 1px solid #3498db;
}

/* МАССОВЫЕ ДЕЙСТВИЯ */
.bulk-actions {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
  flex-wrap: wrap;
  padding: 10px;
  background: rgba(30, 30, 40, 0.5);
  border-radius: 12px;
}

.checkbox {
  width: 20px;
  height: 20px;
  cursor: pointer;
  margin-right: 10px;
  accent-color: #d4af37;
}

/* МОДАЛЬНОЕ ОКНО */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  visibility: hidden;
  transition: 0.2s;
}

.modal.active {
  opacity: 1;
  visibility: visible;
}

.modal-content {
  background: #1a1a1f;
  border-radius: 24px;
  width: 90%;
  max-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
  border: 1px solid rgba(212, 175, 55, 0.3);
  padding: 20px;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 1px solid rgba(212, 175, 55, 0.2);
}

.modal-header h3 {
  color: #d4af37;
}

.close-modal {
  font-size: 24px;
  cursor: pointer;
  color: #888;
}

.modal-input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  border: 1px solid rgba(212, 175, 55, 0.3);
  background: rgba(30, 30, 40, 0.9);
  color: #fff;
  font-size: 14px;
}

.modal-input:focus {
  outline: none;
  border-color: #d4af37;
}

.modal-book-btn {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: linear-gradient(135deg, #d4af37 0%, #b88d2a 100%);
  border: none;
  border-radius: 12px;
  color: #0a0a0f;
  font-weight: 700;
  cursor: pointer;
}

/* АДАПТИВ */
@media (max-width: 768px) {
  .sidebar {
    width: 200px;
  }
  .bookings-grid {
    grid-template-columns: 1fr;
  }
  .stats-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 480px) {
  .sidebar {
    width: 70px;
  }
  .sidebar .logo {
    font-size: 10px;
  }
  .menu-item {
    text-align: center;
    font-size: 10px;
    padding: 10px 5px;
  }
  .user-info {
    font-size: 8px;
    text-align: center;
  }
}

/* АНИМАЦИИ */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.booking-card {
  animation: fadeIn 0.3s ease;
}
</style>
</head>

<body>

<!-- СТРАНИЦА ВХОДА -->
<div id="loginPage" class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <h2>🍷 DUBROVKA PRO</h2>
      <p>Административная панель</p>
    </div>
    <input type="text" id="loginUsername" class="login-input" placeholder="Логин" autocomplete="off">
    <input type="password" id="loginPassword" class="login-input" placeholder="Пароль">
    <button class="login-btn" onclick="attemptLogin()">Войти</button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<!-- АДМИН ПАНЕЛЬ -->
<div id="adminPanel" class="admin-container">
  <!-- БОКОВОЕ МЕНЮ -->
  <div class="sidebar">
    <div class="logo">🍷 DUBROVKA<br>PRO</div>
    <div class="menu-item active" data-page="bookings">📅 Бронирования</div>
    <div class="menu-item" data-page="stats">📊 Статистика</div>
    <div class="menu-item" data-page="export">📎 Экспорт</div>
    <div class="user-info">
      👤 Администратор<br>
      <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
    </div>
  </div>

  <!-- ОСНОВНОЙ КОНТЕНТ -->
  <div class="content">
    <!-- ВЕРХНЯЯ ПАНЕЛЬ ФИЛЬТРОВ -->
    <div class="header-bar">
      <input type="text" id="searchInput" placeholder="🔍 Поиск по имени или телефону">
      <select id="statusFilter">
        <option value="">📌 Все статусы</option>
        <option value="active">🟡 Активные</option>
        <option value="completed">✅ Завершённые</option>
        <option value="cancelled">❌ Отменённые</option>
      </select>
      <select id="tableFilter">
        <option value="">🪑 Все столы</option>
        <option>1</option><option>2</option><option>3</option>
        <option>4</option><option>5</option><option>6</option>
        <option>VIP</option>
      </select>
      <input type="date" id="dateFilter">
      <button onclick="refreshData()">🔄 Обновить</button>
    </div>

    <!-- СТРАНИЦА СТАТИСТИКИ -->
    <div id="statsPage" class="page" style="display:none;">
      <div class="stats-grid" id="statsGrid"></div>
    </div>

    <!-- СТРАНИЦА БРОНИРОВАНИЙ -->
    <div id="bookingsPage" class="page">
      <div class="bulk-actions">
        <button class="btn-sm" onclick="selectAllBookings()">✓ Выбрать все</button>
        <button class="btn-sm btn-complete" onclick="bulkComplete()">✅ Завершить выбранные</button>
        <button class="btn-sm btn-cancel" onclick="bulkCancel()">❌ Отменить выбранные</button>
        <span style="flex:1"></span>
        <span id="selectedCount" style="color:#d4af37; font-size:12px;"></span>
      </div>
      <div id="bookingsList" class="bookings-grid"></div>
    </div>

    <!-- СТРАНИЦА ЭКСПОРТА -->
    <div id="exportPage" class="page" style="display:none;">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="number">📅</div>
          <button class="btn-sm btn-export" style="margin-top:10px; width:100%;" onclick="exportToExcel('day')">Экспорт за сегодня</button>
        </div>
        <div class="stat-card">
          <div class="number">📆</div>
          <button class="btn-sm btn-export" style="margin-top:10px; width:100%;" onclick="exportToExcel('week')">Экспорт за неделю</button>
        </div>
        <div class="stat-card">
          <div class="number">📊</div>
          <button class="btn-sm btn-export" style="margin-top:10px; width:100%;" onclick="exportToExcel('month')">Экспорт за месяц</button>
        </div>
        <div class="stat-card">
          <div class="number">📁</div>
          <button class="btn-sm btn-export" style="margin-top:10px; width:100%;" onclick="exportToExcel('all')">Экспорт все</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО РЕДАКТИРОВАНИЯ -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>✏ Редактирование брони</h3>
      <span class="close-modal" onclick="closeEditModal()">✕</span>
    </div>
    <input type="text" id="editName" class="modal-input" placeholder="Имя">
    <input type="text" id="editPhone" class="modal-input" placeholder="Телефон">
    <input type="number" id="editGuests" class="modal-input" placeholder="Количество гостей">
    <select id="editTable" class="modal-input">
      <option value="1">Стол 1</option><option value="2">Стол 2</option><option value="3">Стол 3</option>
      <option value="4">Стол 4</option><option value="5">Стол 5</option><option value="6">Стол 6</option>
      <option value="VIP">VIP комната</option>
    </select>
    <input type="time" id="editTime" class="modal-input">
    <button class="modal-book-btn" onclick="saveEditBooking()">💾 Сохранить</button>
  </div>
</div>

<script>
// =====================================================
// НАСТРОЙКИ
// =====================================================
const API = "https://dubrovka-webapp-production.up.railway.app";
const ADMIN_LOGIN = "admin";
const ADMIN_PASSWORD = "dubrovka42";

let currentData = [];
let selectedBookings = new Set();
let currentEditId = null;

// =====================================================
// ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
// =====================================================
function getEndTime(startTime) {
  const [hours, minutes] = startTime.split(":").map(Number);
  let endHours = hours + 2;
  const displayHours = endHours >= 24 ? endHours - 24 : endHours;
  return `${String(displayHours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}`;
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return `${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}`;
}

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/[&<>]/g, function(m) {
    if (m === "&") return "&amp;";
    if (m === "<") return "&lt;";
    if (m === ">") return "&gt;";
    return m;
  });
}

// =====================================================
// ЗАГРУЗКА ДАННЫХ
// =====================================================
async function loadData() {
  try {
    const response = await fetch(`${API}/all_bookings`);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    currentData = data;
    renderCurrentPage();
  } catch (error) {
    console.error("Ошибка загрузки:", error);
    document.getElementById("bookingsList").innerHTML = `
      <div style="text-align:center;padding:40px;color:#e74c3c;">
        ❌ Ошибка загрузки данных<br>
        <small>${error.message}</small><br><br>
        <button onclick="refreshData()">Повторить</button>
      </div>
    `;
  }
}

// =====================================================
// ОТРИСОВКА СТРАНИЦ
// =====================================================
function renderCurrentPage() {
  const activePage = document.querySelector(".menu-item.active").dataset.page;
  if (activePage === "bookings") renderBookings();
  else if (activePage === "stats") renderStats();
  else if (activePage === "export") {}
}

function renderStats() {
  const active = currentData.filter(b => b.status === "active").length;
  const completed = currentData.filter(b => b.status === "completed").length;
  const cancelled = currentData.filter(b => b.status === "cancelled").length;
  
  document.getElementById("statsGrid").innerHTML = `
    <div class="stat-card">
      <div class="number">${currentData.length}</div>
      <div class="label">📋 Всего броней</div>
    </div>
    <div class="stat-card">
      <div class="number">${active}</div>
      <div class="label">🟡 Активных</div>
    </div>
    <div class="stat-card">
      <div class="number">${completed}</div>
      <div class="label">✅ Завершённых</div>
    </div>
    <div class="stat-card">
      <div class="number">${cancelled}</div>
      <div class="label">❌ Отменённых</div>
    </div>
  `;
}

function renderBookings() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const status = document.getElementById("statusFilter").value;
  const table = document.getElementById("tableFilter").value;
  const date = document.getElementById("dateFilter").value;
  
  let filtered = currentData.filter(b => {
    if (status && b.status !== status) return false;
    if (table && b.table !== table) return false;
    if (date && b.date !== date) return false;
    if (search && !b.name.toLowerCase().includes(search) && !b.phone.includes(search)) return false;
    return true;
  });
  
  filtered.sort((a, b) => a.time.localeCompare(b.time));
  
  if (filtered.length === 0) {
    document.getElementById("bookingsList").innerHTML = `
      <div style="text-align:center;padding:40px;color:#666;">📭 Нет броней по заданным критериям</div>
    `;
    document.getElementById("selectedCount").innerHTML = "";
    return;
  }
  
  document.getElementById("bookingsList").innerHTML = filtered.map(b => `
    <div class="booking-card ${selectedBookings.has(b.id) ? 'selected' : ''}" data-id="${b.id}">
      <input type="checkbox" class="checkbox" onchange="toggleSelectBooking(${b.id})" ${selectedBookings.has(b.id) ? 'checked' : ''}>
      <div class="status ${b.status}">
        ${b.status === 'active' ? '🟡 Активна' : b.status === 'completed' ? '✅ Завершена' : '❌ Отменена'}
      </div>
      <div class="time-badge">⏰ ${b.time}</div>
      <div class="time-interval">📆 ${b.time} — ${getEndTime(b.time)} (2 часа)</div>
      <div class="name">👤 ${escapeHtml(b.name)}</div>
      <div class="phone">📞 ${b.phone}</div>
      <div class="table-info">
        <span>🪑 Стол ${b.table}</span>
        <span>👥 ${b.guests} чел.</span>
      </div>
      <div>📅 ${formatDate(b.date)}</div>
      <div class="booking-actions">
        <button class="btn-sm btn-edit" onclick="openEditModal(${b.id})">✏ Редактировать</button>
        ${b.status === 'active' ? `
          <button class="btn-sm btn-extend" onclick="extendBooking(${b.id})">⏰ Продлить (+1 час)</button>
          <button class="btn-sm btn-complete" onclick="completeBooking(${b.id})">✅ Завершить</button>
          <button class="btn-sm btn-cancel" onclick="cancelBooking(${b.id})">❌ Отменить</button>
        ` : ''}
      </div>
    </div>
  `).join('');
  
  document.getElementById("selectedCount").innerHTML = `Выбрано: ${selectedBookings.size}`;
}

// =====================================================
// ДЕЙСТВИЯ С БРОНЯМИ
// =====================================================
function toggleSelectBooking(id) {
  if (selectedBookings.has(id)) selectedBookings.delete(id);
  else selectedBookings.add(id);
  renderBookings();
}

function selectAllBookings() {
  const filtered = getFilteredBookings();
  filtered.forEach(b => selectedBookings.add(b.id));
  renderBookings();
}

function getFilteredBookings() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const status = document.getElementById("statusFilter").value;
  const table = document.getElementById("tableFilter").value;
  const date = document.getElementById("dateFilter").value;
  
  return currentData.filter(b => {
    if (status && b.status !== status) return false;
    if (table && b.table !== table) return false;
    if (date && b.date !== date) return false;
    if (search && !b.name.toLowerCase().includes(search) && !b.phone.includes(search)) return false;
    return true;
  });
}

async function completeBooking(id) {
  try {
    const response = await fetch(`${API}/done/${id}`, { method: "POST" });
    if (response.ok) {
      await loadData();
    } else {
      alert("Ошибка при завершении брони");
    }
  } catch (error) {
    alert("Ошибка соединения");
  }
}

async function cancelBooking(id) {
  if (!confirm("❓ Вы уверены, что хотите отменить эту бронь?")) return;
  try {
    const response = await fetch(`${API}/cancel/${id}`, { method: "POST" });
    if (response.ok) {
      await loadData();
    } else {
      alert("Ошибка при отмене брони");
    }
  } catch (error) {
    alert("Ошибка соединения");
  }
}

async function extendBooking(id) {
  alert("⏰ Функция продления брони на +1 час\n(API в разработке)");
}

async function bulkComplete() {
  if (selectedBookings.size === 0) {
    alert("Выберите брони для завершения");
    return;
  }
  if (!confirm(`Завершить ${selectedBookings.size} бронь(ей)?`)) return;
  
  for (let id of selectedBookings) {
    await fetch(`${API}/done/${id}`, { method: "POST" });
  }
  selectedBookings.clear();
  await loadData();
}

async function bulkCancel() {
  if (selectedBookings.size === 0) {
    alert("Выберите брони для отмены");
    return;
  }
  if (!confirm(`Отменить ${selectedBookings.size} бронь(ей)?`)) return;
  
  for (let id of selectedBookings) {
    await fetch(`${API}/cancel/${id}`, { method: "POST" });
  }
  selectedBookings.clear();
  await loadData();
}

// =====================================================
// РЕДАКТИРОВАНИЕ
// =====================================================
function openEditModal(id) {
  const booking = currentData.find(b => b.id === id);
  if (!booking) return;
  
  currentEditId = id;
  document.getElementById("editName").value = booking.name;
  document.getElementById("editPhone").value = booking.phone;
  document.getElementById("editGuests").value = booking.guests;
  document.getElementById("editTable").value = booking.table;
  document.getElementById("editTime").value = booking.time;
  
  document.getElementById("editModal").classList.add("active");
}

function closeEditModal() {
  document.getElementById("editModal").classList.remove("active");
  currentEditId = null;
}

async function saveEditBooking() {
  alert("✏ Функция редактирования\n(API редактирования в разработке)");
  closeEditModal();
}

// =====================================================
// ЭКСПОРТ В EXCEL
// =====================================================
function exportToExcel(period) {
  let data = [...currentData];
  const today = new Date().toISOString().split('T')[0];
  
  if (period === 'day') {
    data = data.filter(b => b.date === today);
  } else if (period === 'week') {
    const weekAgo = new Date();
    weekAgo.setDate(weekAgo.getDate() - 7);
    data = data.filter(b => new Date(b.date) >= weekAgo);
  } else if (period === 'month') {
    const monthAgo = new Date();
    monthAgo.setMonth(monthAgo.getMonth() - 1);
    data = data.filter(b => new Date(b.date) >= monthAgo);
  }
  
  const exportData = data.map(b => ({
    'ID': b.id,
    'Имя': b.name,
    'Телефон': b.phone,
    'Стол': b.table,
    'Гостей': b.guests,
    'Дата': b.date,
    'Время': b.time,
    'Время окончания': getEndTime(b.time),
    'Статус': b.status === 'active' ? 'Активна' : b.status === 'completed' ? 'Завершена' : 'Отменена'
  }));
  
  const ws = XLSX.utils.json_to_sheet(exportData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Брони');
  XLSX.writeFile(wb, `dubrovka_brony_${period}_${today}.xlsx`);
  
  alert(`✅ Экспорт завершён!\nФайл: dubrovka_brony_${period}_${today}.xlsx`);
}

function attemptLogin() {
  const username = document.getElementById("loginUsername").value.trim();
  const password = document.getElementById("loginPassword").value;
  const errorDiv = document.getElementById("loginError");
  
  if (username === ADMIN_LOGIN && password === ADMIN_PASSWORD) {
    localStorage.setItem("admin_auth", "true");
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("adminPanel").style.display = "flex";
    loadData();
  } else {
    errorDiv.style.display = "block";
    errorDiv.innerHTML = "❌ Неверный логин или пароль";
    errorDiv.style.background = "rgba(231, 76, 60, 0.2)";
    errorDiv.style.padding = "12px";
    errorDiv.style.borderRadius = "12px";
    errorDiv.style.textAlign = "center";
    setTimeout(() => {
      errorDiv.style.display = "none";
    }, 3000);
  }
}

function logout() {
  localStorage.removeItem("admin_auth");
  document.getElementById("loginPage").style.display = "flex";
  document.getElementById("adminPanel").style.display = "none";
  selectedBookings.clear();
}

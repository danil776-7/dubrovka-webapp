<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Админ панель</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 20px;
}

h2 {
    text-align: center;
}

.card {
    background: #1e293b;
    padding: 15px;
    margin: 10px 0;
    border-radius: 12px;
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.ok {
    background: #22c55e;
}

.no {
    background: #ef4444;
}
</style>
</head>

<body>

<h2>📊 Брони</h2>

<div id="list">Загрузка...</div>

<script>
const API = "https://dubrovka-webapp-1.onrender.com";

async function load(){
    try {
        let res = await fetch(API + "/bookings");

        if (!res.ok) {
            throw new Error("API error");
        }

        let data = await res.json();

        let html = "";

        data.forEach(b=>{
            html += `
            <div class="card">
                <b>${b.name || "Без имени"}</b><br>
                📞 ${b.phone || "-"}<br>
                📅 ${b.date || "-"} ${b.time || "-"}<br>
                🪑 Стол: ${b.table || "-"}<br>
                Статус: ${b.status || "pending"}<br>

                <button class="ok" onclick="confirmBooking(${b.id})">✔ Подтвердить</button>
                <button class="no" onclick="rejectBooking(${b.id})">✖ Отклонить</button>
            </div>`;
        });

        document.getElementById("list").innerHTML = html || "Нет броней";

    } catch(e){
        document.getElementById("list").innerHTML = "❌ Ошибка API";
        console.error(e);
    }
}

async function confirmBooking(id){
    await fetch(API + "/confirm/" + id, {method:"POST"});
    load();
}

async function rejectBooking(id){
    await fetch(API + "/reject/" + id, {method:"POST"});
    load();
}

setInterval(load, 5000);
load();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka PRO Admin</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', Arial, sans-serif;
  background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
  color: #fff;
  min-height: 100vh;
}

/* Стили для страницы входа */
.login-container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
}

.login-card {
  background: rgba(20, 20, 30, 0.95);
  backdrop-filter: blur(10px);
  padding: 40px;
  border-radius: 24px;
  border: 1px solid rgba(212, 175, 55, 0.3);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  width: 100%;
  max-width: 400px;
  animation: fadeInUp 0.5s ease-out;
}

.login-logo {
  text-align: center;
  margin-bottom: 30px;
}

.login-logo h2 {
  color: #d4af37;
  font-size: 28px;
  margin-bottom: 5px;
}

.login-logo p {
  color: #888;
  font-size: 14px;
}

.login-input {
  width: 100%;
  padding: 14px 16px;
  margin: 10px 0;
  border-radius: 12px;
  border: 1px solid rgba(212, 175, 55, 0.3);
  background: rgba(30, 30, 40, 0.9);
  color: #fff;
  font-size: 15px;
  transition: all 0.3s ease;
}

.login-input:focus {
  outline: none;
  border-color: #d4af37;
  box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
}

.login-btn {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  background: linear-gradient(135deg, #d4af37 0%, #b88d2a 100%);
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 700;
  font-size: 16px;
  color: #0a0a0f;
  transition: all 0.3s ease;
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
}

.login-error {
  background: rgba(220, 53, 69, 0.2);
  border: 1px solid rgba(220, 53, 69, 0.3);
  color: #ff6b6b;
  padding: 12px;
  border-radius: 12px;
  margin-top: 15px;
  text-align: center;
  font-size: 14px;
  display: none;
  animation: shake 0.5s ease;
}

/* Стили для основной админки */
.admin-container {
  display: flex;
  height: 100vh;
  display: none;
}

.sidebar {
  width: 260px;
  background: rgba(10, 10, 15, 0.95);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-right: 1px solid rgba(212, 175, 55, 0.2);
}

.logo {
  color: #d4af37;
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 30px;
  text-align: center;
  padding-bottom: 15px;
  border-bottom: 1px solid rgba(212, 175, 55, 0.2);
}

.menu div {
  padding: 12px 15px;
  margin-bottom: 8px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
  font-weight: 500;
}

.menu div:hover {
  background: rgba(212, 175, 55, 0.15);
}

.menu .active {
  background: linear-gradient(135deg, #d4af37 0%, #b88d2a 100%);
  color: #0a0a0f;
}

.user-info {
  position: absolute;
  bottom: 30px;
  left: 20px;
  right: 20px;
  padding: 15px;
  background: rgba(30, 30, 40, 0.9);
  border-radius: 12px;
  font-size: 12px;
  color: #888;
}

.logout-btn {
  width: 100%;
  padding: 8px;
  margin-top: 10px;
  background: rgba(220, 53, 69, 0.2);
  border: 1px solid rgba(220, 53, 69, 0.3);
  border-radius: 8px;
  color: #ff6b6b;
  cursor: pointer;
  transition: all 0.2s ease;
}

.logout-btn:hover {
  background: rgba(220, 53, 69, 0.4);
}

.content {
  flex: 1;
  padding: 20px;
  overflow: auto;
}

.header {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  background: rgba(20, 20, 30, 0.8);
  padding: 15px;
  border-radius: 16px;
}

.header input, .header select {
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid rgba(212, 175, 55, 0.3);
  background: rgba(30, 30, 40, 0.9);
  color: #fff;
  font-size: 14px;
  flex: 1;
}

.header button {
  padding: 10px 20px;
  background: rgba(212, 175, 55, 0.2);
  border: 1px solid rgba(212, 175, 55, 0.3);
  border-radius: 12px;
  color: #d4af37;
  cursor: pointer;
  transition: all 0.2s ease;
}

.header button:hover {
  background: rgba(212, 175, 55, 0.4);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

.card {
  background: rgba(20, 20, 30, 0.9);
  padding: 18px;
  border-radius: 16px;
  border: 1px solid rgba(212, 175, 55, 0.2);
  transition: all 0.2s ease;
}

.card.new {
  border: 1px solid #d4af37;
  box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
}

.time {
  font-size: 20px;
  color: #d4af37;
  font-weight: 700;
  margin-bottom: 8px;
}

.time-interval {
  display: inline-block;
  background: rgba(212, 175, 55, 0.15);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  color: #d4af37;
  margin-bottom: 8px;
}

.name {
  font-size: 18px;
  font-weight: 600;
  margin: 8px 0 4px;
}

.phone {
  color: #888;
  font-size: 13px;
  margin-bottom: 8px;
}

.table-info {
  display: flex;
  gap: 12px;
  margin: 8px 0;
  font-size: 13px;
  color: #aaa;
}

.status {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  display: inline-block;
  margin-bottom: 10px;
  font-weight: 500;
}

.status.active {
  background: rgba(212, 175, 55, 0.2);
  color: #d4af37;
}

.status.completed {
  background: rgba(46, 204, 113, 0.2);
  color: #2ecc71;
}

.status.cancelled {
  background: rgba(231, 76, 60, 0.2);
  color: #e74c3c;
}

.done-btn {
  width: 100%;
  padding: 10px;
  margin-top: 12px;
  background: linear-gradient(135deg, #d4af37 0%, #b88d2a 100%);
  border: none;
  border-radius: 12px;
  color: #0a0a0f;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

.done-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 2px 10px rgba(212, 175, 55, 0.4);
}

.date-title {
  margin: 20px 0 12px;
  font-size: 18px;
  color: #d4af37;
  font-weight: 600;
  padding-left: 8px;
  border-left: 3px solid #d4af37;
}

.error-message {
  background: rgba(231, 76, 60, 0.2);
  padding: 20px;
  border-radius: 12px;
  color: #e74c3c;
  text-align: center;
  margin: 20px;
  border: 1px solid rgba(231, 76, 60, 0.3);
}

.loading {
  text-align: center;
  padding: 40px;
  color: #888;
}

.stats {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.stat-card {
  background: rgba(20, 20, 30, 0.8);
  padding: 12px 20px;
  border-radius: 12px;
  border: 1px solid rgba(212, 175, 55, 0.2);
}

.stat-card span {
  color: #d4af37;
  font-size: 20px;
  font-weight: 700;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

@media (max-width: 768px) {
  .sidebar {
    width: 200px;
  }
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<!-- Страница входа -->
<div id="loginPage" class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <h2>🍷 Dubrovka PRO</h2>
      <p>Административная панель</p>
    </div>
    <input type="text" id="loginUsername" class="login-input" placeholder="Логин" autocomplete="off">
    <input type="password" id="loginPassword" class="login-input" placeholder="Пароль">
    <button class="login-btn" onclick="attemptLogin()">Войти</button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<!-- Основная админка -->
<div id="adminPanel" class="admin-container">
  <div class="sidebar">
    <div class="logo">🍷 Dubrovka PRO</div>
    <div class="menu">
      <div class="active" onclick="showToday(this)">📅 Сегодня</div>
      <div onclick="showCalendar(this)">🗓 Календарь</div>
    </div>
    <div class="user-info">
      👤 Администратор
      <button class="logout-btn" onclick="logout()">Выйти</button>
    </div>
  </div>

  <div class="content">
    <div class="header">
      <input type="text" id="search" placeholder="🔍 Поиск (имя / телефон)">
      <select id="tableFilter">
        <option value="">Все столы</option>
        <option>1</option><option>2</option><option>3</option>
        <option>4</option><option>5</option><option>6</option>
        <option>VIP</option>
      </select>
      <input type="date" id="dateInput" style="display:none;">
      <button onclick="refresh()">🔄 Обновить</button>
    </div>
    <div id="stats" class="stats"></div>
    <div id="list"></div>
  </div>
</div>

<script>
// =====================================================
// 🔥 АВТОРИЗАЦИЯ
// =====================================================
const ADMIN_LOGIN = "admin";
const ADMIN_PASSWORD = "dubrovka42";

let isAuthenticated = false;

function attemptLogin() {
  const username = document.getElementById("loginUsername").value.trim();
  const password = document.getElementById("loginPassword").value;
  const errorDiv = document.getElementById("loginError");
  
  if (username === ADMIN_LOGIN && password === ADMIN_PASSWORD) {
    isAuthenticated = true;
    localStorage.setItem("admin_auth", "true");
    showAdminPanel();
  } else {
    errorDiv.style.display = "block";
    errorDiv.innerHTML = "❌ Неверный логин или пароль";
    setTimeout(() => {
      errorDiv.style.display = "none";
    }, 3000);
  }
}

function showAdminPanel() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("adminPanel").style.display = "flex";
  loadInitialData();
}

function logout() {
  isAuthenticated = false;
  localStorage.removeItem("admin_auth");
  document.getElementById("loginPage").style.display = "flex";
  document.getElementById("adminPanel").style.display = "none";
  document.getElementById("loginUsername").value = "";
  document.getElementById("loginPassword").value = "";
  currentData = [];
  previousIds.clear();
}

function checkAuth() {
  const savedAuth = localStorage.getItem("admin_auth");
  if (savedAuth === "true") {
    isAuthenticated = true;
    showAdminPanel();
  } else {
    document.getElementById("loginPage").style.display = "flex";
    document.getElementById("adminPanel").style.display = "none";
  }
}

// =====================================================
// ОСНОВНЫЕ ФУНКЦИИ АДМИНКИ
// =====================================================
const API = "https://dubrovka-webapp-production.up.railway.app";
const list = document.getElementById("list");
const statsDiv = document.getElementById("stats");

let currentData = [];
let previousIds = new Set();
let currentMode = "today";

// Функция для расчета времени окончания брони (+2 часа)
function getEndTime(startTime) {
  const [hours, minutes] = startTime.split(":").map(Number);
  let endHours = hours + 2;
  const endMinutes = minutes;
  const displayHours = endHours >= 24 ? endHours - 24 : endHours;
  return `${String(displayHours).padStart(2, "0")}:${String(endMinutes).padStart(2, "0")}`;
}

function getLocalDate() {
  let now = new Date();
  let tz = now.getTimezoneOffset() * 60000;
  return new Date(now - tz).toISOString().split("T")[0];
}

async function load(date) {
  if (!date) return;
  try {
    console.log(`🔄 Загрузка броней на ${date}...`);
    let res = await fetch(`${API}/bookings_by_date?date=${date}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    let data = await res.json();
    console.log(`✅ Загружено броней: ${data.length}`);
    handleNew(data);
    currentData = data;
    render();
    renderStats(data);
  } catch (e) {
    console.error("❌ Ошибка:", e);
    list.innerHTML = `<div class="error-message">
❌ Ошибка загрузки данных<br>
<small>${e.message}</small><br><br>
<button onclick="refresh()">Повторить</button>
</div>`;
  }
}

function handleNew(data) {
  let newIds = data.map(b => b.id);
  let hasNew = false;
  newIds.forEach(id => {
    if (!previousIds.has(id)) {
      hasNew = true;
      console.log("🔔 Новая бронь:", id);
    }
  });
  if (hasNew) {
    let sound = document.getElementById("notifySound");
    if (sound) sound.play().catch(e => console.log("Звук не воспроизведен"));
  }
  previousIds = new Set(newIds);
}

function applyFilters(data) {
  let search = document.getElementById("search").value.toLowerCase();
  let table = document.getElementById("tableFilter").value;
  return data.filter(b => {
    let matchSearch = b.name.toLowerCase().includes(search) || b.phone.includes(search);
    let matchTable = !table || b.table == table;
    return matchSearch && matchTable;
  });
}

function renderStats(data) {
  const activeCount = data.filter(b => b.status === "active").length;
  const completedCount = data.filter(b => b.status === "completed").length;
  const cancelledCount = data.filter(b => b.status === "cancelled").length;
  const totalCount = data.length;
  
  statsDiv.innerHTML = `
    <div class="stat-card">📊 Всего: <span>${totalCount}</span></div>
    <div class="stat-card">🟡 Активных: <span>${activeCount}</span></div>
    <div class="stat-card">✅ Завершено: <span>${completedCount}</span></div>
    <div class="stat-card">❌ Отменено: <span>${cancelledCount}</span></div>
  `;
}

function render() {
  let data = applyFilters(currentData);
  if (data.length === 0) {
    list.innerHTML = "<div style='text-align:center;padding:40px;color:#666;'>📭 Нет броней</div>";
    return;
  }
  
  data.sort((a, b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));
  
  let grouped = {};
  data.forEach(b => {
    if (!grouped[b.date]) grouped[b.date] = [];
    grouped[b.date].push(b);
  });
  
  let html = "";
  for (let date in grouped) {
    html += `<div class="date-title">📅 ${date}</div><div class="grid">`;
    grouped[date].forEach(b => {
      let isNew = !previousIds.has(b.id);
      let statusText = b.status === "active" ? "✅ Активна" : 
                       b.status === "completed" ? "✔ Завершена" : 
                       b.status === "cancelled" ? "❌ Отменена" : b.status;
      
      let endTime = getEndTime(b.time);
      let timeInterval = `${b.time} — ${endTime} (2 часа)`;
      
      html += `
        <div class="card ${isNew ? 'new' : ''}">
          <div class="status ${b.status}">${statusText}</div>
          <div class="time">⏰ ${b.time}</div>
          <div class="time-interval">📆 ${timeInterval}</div>
          <div class="name">👤 ${escapeHtml(b.name)}</div>
          <div class="phone">📞 ${b.phone}</div>
          <div class="table-info">
            <span>🪑 Стол ${b.table}</span>
            <span>👥 ${b.guests} чел.</span>
          </div>
      `;
      if (b.status === "active") {
        html += `<button class="done-btn" onclick="done(${b.id})">✅ Отметить как завершённую</button>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  }
  list.innerHTML = html;
}

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/[&<>]/g, function(m) {
    if (m === "&") return "&amp;";
    if (m === "<") return "&lt;";
    if (m === ">") return "&gt;";
    return m;
  });
}

async function done(id) {
  if (!confirm("Отметить что гость ушел? Бронь будет завершена.")) return;
  try {
    let res = await fetch(`${API}/done/${id}`, { method: "POST" });
    if (res.ok) {
      currentData = currentData.map(b => b.id === id ? { ...b, status: "completed" } : b);
      render();
      renderStats(currentData);
      console.log(`✅ Бронь ${id} завершена`);
    } else {
      throw new Error(`HTTP ${res.status}`);
    }
  } catch (e) {
    console.error("❌ Ошибка:", e);
    alert("Ошибка: " + e.message);
  }
}

function refresh() {
  let date = currentMode === "today" ? getLocalDate() : document.getElementById("dateInput").value;
  if (date) {
    list.innerHTML = '<div class="loading">🔄 Загрузка...</div>';
    load(date);
  }
}

function showToday(el) {
  currentMode = "today";
  setActive(el);
  document.getElementById("dateInput").style.display = "none";
  load(getLocalDate());
}

function showCalendar(el) {
  currentMode = "calendar";
  setActive(el);
  document.getElementById("dateInput").style.display = "block";
  let date = document.getElementById("dateInput").value || getLocalDate();
  load(date);
}

function setActive(el) {
  document.querySelectorAll(".menu div").forEach(e => e.classList.remove("active"));
  el.classList.add("active");
}

function loadInitialData() {
  const dateInput = document.getElementById("dateInput");
  dateInput.min = new Date().toISOString().split("T")[0];
  dateInput.value = getLocalDate();
  
  document.getElementById("dateInput").onchange = () => {
    if (currentMode === "calendar") load(dateInput.value);
  };
  document.getElementById("search").oninput = () => {
    render();
    renderStats(currentData);
  };
  document.getElementById("tableFilter").onchange = () => {
    render();
    renderStats(currentData);
  };
  
  // Автообновление каждые 10 секунд
  setInterval(() => {
    if (isAuthenticated) {
      let date = currentMode === "today" ? getLocalDate() : document.getElementById("dateInput").value;
      if (date) load(date);
    }
  }, 10000);
  
  load(getLocalDate());
}

// Запуск
checkAuth();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dubrovka PRO Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
}

.container{display:flex;height:100vh;}

/* sidebar */
.sidebar{
width:230px;
background:#111;
padding:20px;
}

.logo{
color:#ff2a2a;
font-size:20px;
margin-bottom:20px;
}

.menu div{
padding:10px;
margin-bottom:8px;
border-radius:8px;
cursor:pointer;
}

.menu div:hover{background:#1a1a1a;}
.active{background:#ff2a2a;}

/* content */
.content{
flex:1;
padding:20px;
overflow:auto;
}

.header{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

input, select{
padding:10px;
border-radius:8px;
border:none;
background:#111;
color:#fff;
}

/* grid */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:12px;
}

/* card */
.card{
background:#151515;
padding:15px;
border-radius:12px;
border:1px solid #222;
transition:0.3s;
}

.card.new{
border:1px solid #ff2a2a;
box-shadow:0 0 10px #ff2a2a55;
}

.time{
font-size:22px;
color:#ff2a2a;
}

.name{font-size:18px;}
.phone{color:#ccc;margin-bottom:8px;}

.status{
font-size:12px;
padding:3px 6px;
border-radius:6px;
display:inline-block;
margin-bottom:6px;
}

.pending{background:#444;}
.done{background:#0a7d3b;}

button{
padding:8px 12px;
border:none;
border-radius:8px;
background:#ff2a2a;
color:#fff;
cursor:pointer;
margin-top:10px;
}

.date-title{
margin:20px 0 10px;
font-size:18px;
color:#ff2a2a;
}
</style>
</head>

<body>

<audio id="notifySound">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<div class="container">

<div class="sidebar">
<div class="logo">Dubrovka PRO</div>

<div class="menu">
<div class="active" onclick="showToday(this)">Сегодня</div>
<div onclick="showCalendar(this)">Календарь</div>
</div>
</div>

<div class="content">

<div class="header">
<input type="text" id="search" placeholder="Поиск (имя / телефон)">
<select id="tableFilter">
<option value="">Все столы</option>
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
<option>VIP</option>
</select>
<input type="date" id="dateInput" style="display:none;">
</div>

<div id="list"></div>

</div>

</div>

<script>
const API = "https://dubrovka-webapp-production-a00c.up.railway.app";
const list = document.getElementById("list");

let currentData = [];
let previousIds = new Set();
let currentMode = "today";

/* дата */
function getLocalDate(){
let now=new Date();
let tz=now.getTimezoneOffset()*60000;
return new Date(now-tz).toISOString().split("T")[0];
}

/* загрузка */
async function load(date){
let res = await fetch(`${API}/bookings_by_date?date=${date}`);
let data = await res.json();

handleNew(data);
currentData = data;
render();
}

/* новые брони */
function handleNew(data){

let newIds = data.map(b=>b.id);
let hasNew = false;

newIds.forEach(id=>{
if(!previousIds.has(id)){
hasNew = true;
}
});

if(hasNew){
document.getElementById("notifySound").play();
}

previousIds = new Set(newIds);
}

/* фильтр */
function applyFilters(data){

let search = document.getElementById("search").value.toLowerCase();
let table = document.getElementById("tableFilter").value;

return data.filter(b=>{

let matchSearch =
b.name.toLowerCase().includes(search) ||
b.phone.includes(search);

let matchTable = !table || b.table == table;

return matchSearch && matchTable;

});
}

/* render */
function render(){

let data = applyFilters(currentData);

if(data.length === 0){
list.innerHTML = "Нет броней";
return;
}

data.sort((a,b)=> new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));

let grouped = {};
data.forEach(b=>{
if(!grouped[b.date]) grouped[b.date]=[];
grouped[b.date].push(b);
});

let html="";

for(let date in grouped){

html += `<div class="date-title">📅 ${date}</div><div class="grid">`;

grouped[date].forEach(b=>{

let isNew = !previousIds.has(b.id);

html += `
<div class="card ${isNew ? 'new':''}">

<div class="status ${b.status}">${b


s}</div>

<div class="time">${b.time}</div>

<div class="name">${b.name}</div>

<div class="phone">${b.phone}</div>

<div>🪑 ${b.table} | 👥 ${b.guests}</div>

<button onclick="done(${b.id})">Гость ушёл</button>

</div>
`;
});

html += `</div>`;
}

list.innerHTML = html;
}

/* done */
async function done(id){
await fetch(API+"/done/"+id,{method:"POST"});
currentData = currentData.map(b=> b.id===id ? {...b,status:"done"} : b);
render();
}

/* табы */
function showToday(el){
setActive(el);
dateInput.style.display="none";
load(getLocalDate());
}

function showCalendar(el){
setActive(el);
dateInput.style.display="block";
}

function setActive(el){
document.querySelectorAll(".menu div").forEach(e=>e.classList.remove("active"));
el.classList.add("active");
}

/* события */
dateInput.onchange=()=>load(dateInput.value);
search.oninput=render;
tableFilter.onchange=render;

/* автообновление */
setInterval(()=>{
let date = currentMode==="today" ? getLocalDate() : dateInput.value;
if(date) load(date);
},3000);

/* старт */
load(getLocalDate());
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka PRO Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:#e0e0e0;
}

.container{display:flex;height:100vh;}

/* sidebar */
.sidebar{
width:230px;
background:#111;
padding:20px;
border-right:1px solid #2a2a2a;
}

.logo{
color:#b89a4b;
font-size:20px;
margin-bottom:20px;
font-weight:500;
}

.menu div{
padding:10px;
margin-bottom:8px;
border-radius:12px;
cursor:pointer;
transition:all 0.2s;
}

.menu div:hover{background:#1a1a1a;}
.active{background:#b89a4b;color:#0a0a0a;}

/* content */
.content{
flex:1;
padding:20px;
overflow:auto;
}

.header{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

input, select{
padding:10px 12px;
border-radius:12px;
border:1px solid #2a2a2a;
background:#1a1a1a;
color:#e0e0e0;
font-size:14px;
}

input:focus, select:focus{
outline:none;
border-color:#b89a4b;
}

button{
padding:10px 16px;
border-radius:12px;
border:none;
background:#b89a4b;
color:#0a0a0a;
cursor:pointer;
font-weight:500;
transition:all 0.2s;
}

button:hover{
background:#c9aa5c;
}

/* grid */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:12px;
}

/* card */
.card{
background:#111;
padding:15px;
border-radius:16px;
border:1px solid #2a2a2a;
transition:0.2s;
}

.card.new{
border:1px solid #b89a4b;
box-shadow:0 0 10px rgba(184,154,75,0.2);
}

.time{
font-size:22px;
color:#b89a4b;
font-weight:500;
}

.name{font-size:18px;font-weight:500;margin:8px 0 4px;}
.phone{color:#8a8a8a;margin-bottom:8px;font-size:13px;}

.status{
font-size:11px;
padding:4px 8px;
border-radius:20px;
display:inline-block;
margin-bottom:6px;
font-weight:500;
}

.active{background:#2a5a2a;color:#a0e0a0;}
.completed{background:#3a5a3a;color:#a0c0a0;}
.cancelled{background:#5a3a3a;color:#e0a0a0;}
.pending{background:#3a3a3a;color:#c0c0c0;}

button.done-btn{
padding:8px 12px;
border:none;
border-radius:12px;
background:#b89a4b;
color:#0a0a0a;
cursor:pointer;
margin-top:10px;
width:100%;
font-size:13px;
font-weight:500;
}

button.done-btn:hover{
background:#c9aa5c;
}

.date-title{
margin:20px 0 10px;
font-size:16px;
color:#b89a4b;
font-weight:500;
}

.error-message{
background:#2a1a1a;
padding:15px;
border-radius:12px;
color:#e0a0a0;
text-align:center;
margin:20px;
border:1px solid #5a3a3a;
}

.loading{
text-align:center;
padding:40px;
color:#8a8a8a;
}
</style>
</head>

<body>

<audio id="notifySound">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<div class="container">

<div class="sidebar">
<div class="logo">🍷 Dubrovka PRO</div>

<div class="menu">
<div class="active" onclick="showToday(this)">📅 Сегодня</div>
<div onclick="showCalendar(this)">🗓 Календарь</div>
</div>
</div>

<div class="content">

<div class="header">
<input type="text" id="search" placeholder="🔍 Поиск (имя / телефон)">
<select id="tableFilter">
<option value="">Все столы</option>
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
<option>VIP</option>
</select>
<input type="date" id="dateInput" style="display:none;">
<button onclick="refresh()">🔄 Обновить</button>
</div>

<div id="list"></div>

</div>

</div>

<script>
const API = "https://dubrovka-webapp-production-a00c.up.railway.app";
const list = document.getElementById("list");

let currentData = [];
let previousIds = new Set();
let currentMode = "today";

function getLocalDate(){
let now=new Date();
let tz=now.getTimezoneOffset()*60000;
return new Date(now-tz).toISOString().split("T")[0];
}

async function load(date){
if(!date) return;
try {
console.log(`🔄 Загрузка броней на ${date}...`);
let res = await fetch(`${API}/bookings_by_date?date=${date}`);
if(!res.ok) throw new Error(`HTTP ${res.status}`);
let data = await res.json();
handleNew(data);
currentData = data;
render();
} catch(e) {
console.error("❌ Ошибка:", e);
list.innerHTML = `<div class="error-message">
❌ Ошибка загрузки: ${e.message}<br>
<button onclick="refresh()" style="margin-top:10px;">Повторить</button>
</div>`;
}
}

function handleNew(data){
let newIds = data.map(b=>b.id);
let hasNew = false;
newIds.forEach(id=>{
if(!previousIds.has(id)) hasNew = true;
});
if(hasNew){
let sound = document.getElementById("notifySound");
if(sound) sound.play().catch(e=>console.log("Звук заблокирован"));
}
previousIds = new Set(newIds);
}

function applyFilters(data){
let search = document.getElementById("search").value.toLowerCase();
let table = document.getElementById("tableFilter").value;
return data.filter(b=>{
let matchSearch = b.name.toLowerCase().includes(search) || b.phone.includes(search);
let matchTable = !table || b.table == table;
return matchSearch && matchTable;
});
}

function render(){
let data = applyFilters(currentData);
if(data.length === 0){
list.innerHTML = "<div style='text-align:center;padding:40px;color:#8a8a8a;'>📭 Нет броней</div>";
return;
}
data.sort((a,b)=> new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));
let grouped = {};
data.forEach(b=>{
if(!grouped[b.date]) grouped[b.date]=[];
grouped[b.date].push(b);
});
let html="";
for(let date in grouped){
html += `<div class="date-title">📅 ${date}</div><div class="grid">`;
grouped[date].forEach(b=>{
let isNew = !previousIds.has(b.id);
let statusText = b.status === "active" ? "✅ Активна" : 
                 b.status === "completed" ? "✔ Завершена" : 
                 b.status === "cancelled" ? "❌ Отменена" : b.status;
html += `
<div class="card ${isNew ? 'new':''}">
<div class="status ${b.status}">${statusText}</div>
<div class="time">⏰ ${b.time}</div>
<div class="name">👤 ${b.name}</div>
<div class="phone">📞 ${b.phone}</div>
<div>🪑 Стол ${b.table} | 👥 ${b.guests} чел.</div>
`;
if(b.status === "active"){
html += `<button class="done-btn" onclick="done(${b.id})">✅ Гость ушёл</button>`;
}
html += `</div>`;
});
html += `</div>`;
}
list.innerHTML = html;
}

async function done(id){
if(!confirm("Отметить что гость ушел?")) return;
try {
let res = await fetch(`${API}/done/${id}`, {method:"POST"});
if(res.ok){
currentData = currentData.map(b=> b.id===id ? {...b,status:"completed"} : b);
render();
} else {
throw new Error(`HTTP ${res.status}`);
}
} catch(e) {
alert("Ошибка: " + e.message);
}
}

function refresh(){
let date = currentMode === "today" ? getLocalDate() : dateInput.value;
if(date) load(date);
}

function showToday(el){
currentMode = "today";
setActive(el);
document.getElementById("dateInput").style.display="none";
load(getLocalDate());
}

function showCalendar(el){
currentMode = "calendar";
setActive(el);
document.getElementById("dateInput").style.display="block";
let date = document.getElementById("dateInput").value || getLocalDate();
load(date);
}

function setActive(el){
document.querySelectorAll(".menu div").forEach(e=>e.classList.remove("active"));
el.classList.add("active");
}

document.getElementById("dateInput").onchange=()=>{
if(currentMode === "calendar") load(dateInput.value);
};
document.getElementById("search").oninput=render;
document.getElementById("tableFilter").onchange=render;

setInterval(()=>{
let date = currentMode === "today" ? getLocalDate() : document.getElementById("dateInput").value;
if(date) load(date);
},5000);

console.log("🚀 Админ панель запущена");
console.log(`📡 API URL: ${API}`);
load(getLocalDate());
</script>

</body>
</html>

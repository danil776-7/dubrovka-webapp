<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Админ панель</title>

<style>
body{
background:#0d0d0d;
color:#fff;
font-family:Arial;
padding:20px;
}

.card{
background:#1c1c1c;
padding:15px;
margin-bottom:12px;
border-radius:12px;
}

button{
margin-top:10px;
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.done{background:#28a745;}
</style>
</head>

<body>

<h2>📊 Брони</h2>

<div id="list">Загрузка...</div>

<script>
const API = "https://dubrovka-webapp-9.onrender.com";

async function load(){

let res = await fetch(API + "/bookings");
let data = await res.json();

let html = "";

if(data.length === 0){
html = "Нет броней";
}else{

data.reverse().forEach(b=>{

html += `
<div class="card">
<b>${b.name}</b> (${b.phone})<br>
📅 ${b.date} ${b.time}<br>
🪑 Стол: ${b.table}<br>
👥 ${b.guests}<br>
📌 ${b.status}

<br>

<button class="done" onclick="done(${b.id})">
Гость ушёл
</button>
</div>
`;
});
}

document.getElementById("list").innerHTML = html;
}

async function done(id){
await fetch(API + "/done/" + id,{method:"POST"});
load();
}

setInterval(load, 2000);
load();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dubrovka Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
}

.container{
display:flex;
height:100vh;
}

/* sidebar */
.sidebar{
width:220px;
background:#111;
padding:20px;
}

.logo{
color:#ff2a2a;
font-size:18px;
margin-bottom:20px;
}

.menu div{
padding:10px;
margin-bottom:8px;
border-radius:8px;
cursor:pointer;
}

.menu div:hover{
background:#1a1a1a;
}

.active{
background:#ff2a2a;
}

/* content */
.content{
flex:1;
padding:20px;
overflow:auto;
}

/* header */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

input{
padding:10px;
border-radius:8px;
border:none;
background:#111;
color:#fff;
}

/* cards */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:12px;
}

.card{
background:#151515;
padding:15px;
border-radius:12px;
border:1px solid #222;
transition:0.2s;
}

.card:hover{
transform:scale(1.02);
}

.card h3{
margin:0 0 8px;
color:#ff2a2a;
}

.small{
color:#aaa;
font-size:13px;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
background:#ff2a2a;
color:#fff;
cursor:pointer;
margin-top:10px;
}

.status{
font-size:12px;
padding:3px 6px;
border-radius:6px;
background:#222;
display:inline-block;
margin-bottom:6px;
}

.date-title{
margin:20px 0 10px;
font-size:18px;
color:#ff2a2a;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<div class="logo">Dubrovka Admin</div>

<div class="menu">
<div class="active" onclick="showToday(this)">Сегодня</div>
<div onclick="showCalendar(this)">Календарь</div>
</div>
</div>

<div class="content">

<div class="header">
<h2>Брони</h2>
<input type="date" id="dateInput" style="display:none;">
</div>

<div id="list"></div>

</div>

</div>

<script>
const API = "https://dubrovka-webapp-production-a00c.up.railway.app";
const list = document.getElementById("list");

let currentMode = "today";
let currentData = [];

/* правильная дата (фикс таймзоны) */
function getLocalDate(){
    let now = new Date();
    let tzOffset = now.getTimezoneOffset() * 60000;
    let localISO = new Date(now - tzOffset).toISOString();
    return localISO.split("T")[0];
}

/* загрузка */
async function loadToday(){
    let today = getLocalDate();
    currentMode = "today";
    await loadByDate(today);
}

async function loadByDate(date){
    currentMode = "calendar";

    let res = await fetch(`${API}/bookings_by_date?date=${date}`);
    let data = await res.json();

    currentData = data;
    render();
}

/* рендер */
function render(){

    let html = "";

    if(currentData.length === 0){
        html = "<div>Нет броней</div>";
        list.innerHTML = html;
        return;
    }

    /* сортировка по дате + времени */
    currentData.sort((a,b)=>{
        let d1 = new Date(`${a.date}T${a.time}`);
        let d2 = new Date(`${b.date}T${b.time}`);
        return d1 - d2;
    });

    /* группировка по дате */
    let grouped = {};

    currentData.forEach(b=>{
        if(!grouped[b.date]) grouped[b.date] = [];
        grouped[b.date].push(b);
    });

    /* вывод */
    for(let date in grouped){

        html += `<div class="date-title">📅 ${date}</div>`;
        html += `<div class="grid">`;

        grouped[date]
        .sort((a,b)=>a.time.localeCompare(b.time))
        .forEach(b=>{

            html += `
            <div class="card">

            <div class="status">${b.status}</div>

            <h3>${b.name}</h3>

            <div class="small">
            📞 ${b.phone}<b
           👥 ${b.guests} гостей<br
          🪑 Стол: ${b.table}

         ⏰ ${b.time}
            </div>

            <button onclick="done(${b.id})">
            Гость ушёл
            </button>

            </div>
            `;
        });

        html += `</div>`;
    }

    list.innerHTML = html;
}

/* завершение */
async function done(id){

    await fetch(API+"/done/"+id,{method:"POST"});

    currentData = currentData.map(b => {


if(b.id === id){
            b.status = "done";
        }
        return b;
    });

    render();
}

/* вкладки */
function setActive(el){
    document.querySelectorAll(".menu div").forEach(e=>e.classList.remove("active"));
    el.classList.add("active");
}

function showToday(el){
    setActive(el);
    dateInput.style.display="none";
    loadToday();
}

function showCalendar(el){
    setActive(el);
    dateInput.style.display="block";
}

/* события */
dateInput.onchange = () => {
    loadByDate(dateInput.value);
};

/* автообновление */
async function refresh(){

    let date;

    if(currentMode === "today"){
        date = getLocalDate();
    }else{
        if(!dateInput.value) return;
        date = dateInput.value;
    }

    let res = await fetch(`${API}/bookings_by_date?date=${date}`);
    let data = await res.json();

    currentData = data;
    render();
}

setInterval(refresh, 3000);

/* старт */
loadToday();
</script>

</body>
</html>

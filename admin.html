<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka PRO Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:#fff;
}

.container{display:flex;height:100vh;}

/* sidebar */
.sidebar{
width:230px;
background:#111;
padding:20px;
}

.logo{
color:#ff2a2a;
font-size:20px;
margin-bottom:20px;
}

.menu div{
padding:10px;
margin-bottom:8px;
border-radius:8px;
cursor:pointer;
}

.menu div:hover{background:#1a1a1a;}
.active{background:#ff2a2a;}

/* content */
.content{
flex:1;
padding:20px;
overflow:auto;
}

.header{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

input, select{
padding:10px;
border-radius:8px;
border:none;
background:#111;
color:#fff;
}

/* grid */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:12px;
}

/* card */
.card{
background:#151515;
padding:15px;
border-radius:12px;
border:1px solid #222;
transition:0.3s;
}

.card.new{
border:1px solid #ff2a2a;
box-shadow:0 0 10px #ff2a2a55;
}

.time{
font-size:22px;
color:#ff2a2a;
font-weight:bold;
}

.name{font-size:18px;font-weight:bold;margin:8px 0 4px;}
.phone{color:#ccc;margin-bottom:8px;}

.status{
font-size:12px;
padding:3px 6px;
border-radius:6px;
display:inline-block;
margin-bottom:6px;
}

.active{background:#2a7f2a;color:#fff;}
.completed{background:#0a7d3b;color:#fff;}
.cancelled{background:#666;color:#fff;}
.pending{background:#444;color:#fff;}

button{
padding:8px 12px;
border:none;
border-radius:8px;
background:#ff2a2a;
color:#fff;
cursor:pointer;
margin-top:10px;
width:100%;
font-size:14px;
}

button:hover{
background:#ff5555;
}

.date-title{
margin:20px 0 10px;
font-size:18px;
color:#ff2a2a;
font-weight:bold;
}
</style>
</head>

<body>

<audio id="notifySound">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<div class="container">

<div class="sidebar">
<div class="logo">🍷 Dubrovka PRO</div>

<div class="menu">
<div class="active" onclick="showToday(this)">📅 Сегодня</div>
<div onclick="showCalendar(this)">🗓 Календарь</div>
</div>
</div>

<div class="content">

<div class="header">
<input type="text" id="search" placeholder="🔍 Поиск (имя / телефон)">
<select id="tableFilter">
<option value="">Все столы</option>
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
<option>VIP</option>
</select>
<input type="date" id="dateInput" style="display:none;">
<button onclick="refresh()" style="background:#333; width:auto;">🔄 Обновить</button>
</div>

<div id="list"></div>

</div>

</div>

<script>
const API = "https://dubrovka-webapp-production-a00c.up.railway.app";
const list = document.getElementById("list");

let currentData = [];
let previousIds = new Set();
let currentMode = "today";

/* дата */
function getLocalDate(){
let now=new Date();
let tz=now.getTimezoneOffset()*60000;
return new Date(now-tz).toISOString().split("T")[0];
}

/* загрузка */
async function load(date){
if(!date) return;
try {
let res = await fetch(`${API}/bookings_by_date?date=${date}`);
if(!res.ok) throw new Error(`HTTP ${res.status}`);
let data = await res.json();
console.log("Loaded bookings:", data);
handleNew(data);
currentData = data;
render();
} catch(e) {
console.error("Load error:", e);
list.innerHTML = `<div style="color:red;">❌ Ошибка загрузки: ${e.message}</div>`;
}
}

/* новые брони */
function handleNew(data){
let newIds = data.map(b=>b.id);
let hasNew = false;

newIds.forEach(id=>{
if(!previousIds.has(id)){
hasNew = true;
console.log("🔔 New booking detected:", id);
}
});

if(hasNew){
document.getElementById("notifySound").play();
}

previousIds = new Set(newIds);
}

/* фильтр */
function applyFilters(data){
let search = document.getElementById("search").value.toLowerCase();
let table = document.getElementById("tableFilter").value;

return data.filter(b=>{
let matchSearch = 
b.name.toLowerCase().includes(search) ||
b.phone.includes(search);
let matchTable = !table || b.table == table;
return matchSearch && matchTable;
});
}

/* render */
function render(){
let data = applyFilters(currentData);

if(data.length === 0){
list.innerHTML = "<div style='text-align:center;padding:40px;color:#666;'>📭 Нет броней</div>";
return;
}

data.sort((a,b)=> new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));

let grouped = {};
data.forEach(b=>{
if(!grouped[b.date]) grouped[b.date]=[];
grouped[b.date].push(b);
});

let html="";

for(let date in grouped){
html += `<div class="date-title">📅 ${date}</div><div class="grid">`;

grouped[date].forEach(b=>{
let isNew = !previousIds.has(b.id);
let statusText = b.status === "active" ? "✅ Активна" : 
                 b.status === "completed" ? "✔ Завершена" : 
                 b.status === "cancelled" ? "❌ Отменена" : b.status;

html += `
<div class="card ${isNew ? 'new':''}">
<div class="status ${b.status}">${statusText}</div>
<div class="time">⏰ ${b.time}</div>
<div class="name">👤 ${b.name}</div>
<div class="phone">📞 ${b.phone}</div>
<div>🪑 Стол ${b.table} | 👥 ${b.guests} чел.</div>
`;

if(b.status === "active"){
html += `<button onclick="done(${b.id})">✅ Гость ушёл</button>`;
} else if(b.status === "active"){
html += `<button onclick="cancel(${b.id})" style="background:#666;">❌ Отменить</button>`;
}

html += `</div>`;
});

html += `</div>`;
}

list.innerHTML = html;
}

/* done */
async function done(id){
if(!confirm("Отметить что гость ушел?")) return;
try {
let res = await fetch(`${API}/done/${id}`,{method:"POST"});
if(res.ok){
currentData = currentData.map(b=> b.id===id ? {...b,status:"completed"} : b);
render();
console.log("✅ Booking marked as completed");
}
} catch(e) {
console.error("Error:", e);
alert("Ошибка: " + e.message);
}
}

/* cancel */
async function cancel(id){
if(!confirm("Отменить бронь?")) return;
try {
let res = await fetch(`${API}/cancel/${id}`,{method:"POST"});
if(res.ok){
currentData = currentData.map(b=> b.id===id ? {...b,status:"cancelled"} : b);
render();
console.log("❌ Booking cancelled");
}
} catch(e) {
console.error("Error:", e);
alert("Ошибка: " + e.message);
}
}

/* refresh */
function refresh(){
let date = currentMode === "today" ? getLocalDate() : dateInput.value;
if(date) load(date);
}

/* табы */
function showToday(el){
currentMode = "today";
setActive(el);
document.getElementById("dateInput").style.display="none";
load(getLocalDate());
}

function showCalendar(el){
currentMode = "calendar";
setActive(el);
document.getElementById("dateInput").style.display="block";
let date = document.getElementById("dateInput").value || getLocalDate();
load(date);
}

function setActive(el){
document.querySelectorAll(".menu div").forEach(e=>e.classList.remove("active"));
el.classList.add("active");
}

/* события */
document.getElementById("dateInput").onchange=()=>{
if(currentMode === "calendar") load(dateInput.value);
};
document.getElementById("search").oninput=render;
document.getElementById("tableFilter").onchange=render;

/* автообновление каждые 5 секунд */
setInterval(()=>{
let date = currentMode === "today" ? getLocalDate() : document.getElementById("dateInput").value;
if(date) load(date);
},5000);

/* старт */
console.log("Admin panel started, API:", API);
load(getLocalDate());
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka PRO Admin - Полная версия</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', Arial, sans-serif;
  background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
  color: #fff;
  min-height: 100vh;
}

/* Логин */
.login-container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
}

.login-card {
  background: rgba(20, 20, 30, 0.95);
  backdrop-filter: blur(10px);
  padding: 40px;
  border-radius: 24px;
  border: 1px solid rgba(212, 175, 55, 0.3);
  width: 100%;
  max-width: 400px;
}

.login-logo h2 {
  color: #d4af37;
  font-size: 28px;
  margin-bottom: 5px;
}

.login-input {
  width: 100%;
  padding: 14px 16px;
  margin: 10px 0;
  border-radius: 12px;
  border: 1px solid rgba(212, 175, 55, 0.3);
  background: rgba(30, 30, 40, 0.9);
  color: #fff;
}

.login-btn {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  background: linear-gradient(135deg, #d4af37 0%, #b88d2a 100%);
  border: none;
  border-radius: 12px;
  color: #0a0a0f;
  font-weight: 700;
  cursor: pointer;
}

/* Админ панель */
.admin-container {
  display: flex;
  height: 100vh;
  display: none;
}

.sidebar {
  width: 260px;
  background: rgba(10, 10, 15, 0.95);
  padding: 20px;
  border-right: 1px solid rgba(212, 175, 55, 0.2);
  overflow-y: auto;
}

.logo {
  color: #d4af37;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 30px;
  text-align: center;
  padding-bottom: 15px;
  border-bottom: 1px solid rgba(212, 175, 55, 0.2);
}

.menu-item {
  padding: 12px 15px;
  margin-bottom: 8px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.menu-item:hover {
  background: rgba(212, 175, 55, 0.15);
}

.menu-item.active {
  background: linear-gradient(135deg, #d4af37 0%, #b88d2a 100%);
  color: #0a0a0f;
}

.content {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.header-bar {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  background: rgba(20, 20, 30, 0.8);
  padding: 15px;
  border-radius: 16px;
}

.header-bar input, .header-bar select {
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid rgba(212, 175, 55, 0.3);
  background: rgba(30, 30, 40, 0.9);
  color: #fff;
  flex: 1;
}

.header-bar button {
  padding: 10px 20px;
  background: rgba(212, 175, 55, 0.2);
  border: 1px solid rgba(212, 175, 55, 0.3);
  border-radius: 12px;
  color: #d4af37;
  cursor: pointer;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
  margin-bottom: 20px;
}

.stat-card {
  background: rgba(20, 20, 30, 0.8);
  padding: 15px;
  border-radius: 16px;
  text-align: center;
  border: 1px solid rgba(212, 175, 55, 0.2);
}

.stat-card .number {
  font-size: 28px;
  color: #d4af37;
  font-weight: 700;
}

.charts-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
  gap: 20px;
  margin-bottom: 20px;
}

.chart-container {
  background: rgba(20, 20, 30, 0.8);
  padding: 15px;
  border-radius: 16px;
  border: 1px solid rgba(212, 175, 55, 0.2);
}

.bookings-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  gap: 16px;
}

.booking-card {
  background: rgba(20, 20, 30, 0.9);
  padding: 16px;
  border-radius: 16px;
  border: 1px solid rgba(212, 175, 55, 0.2);
  transition: all 0.2s;
}

.booking-card.selected {
  border: 2px solid #d4af37;
  background: rgba(212, 175, 55, 0.1);
}

.booking-card.new {
  border: 1px solid #d4af37;
  box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
}

.time-badge {
  font-size: 20px;
  color: #d4af37;
  font-weight: 700;
}

.status {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  margin: 8px 0;
}

.status.active { background: rgba(212, 175, 55, 0.2); color: #d4af37; }
.status.completed { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
.status.cancelled { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }

.booking-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.btn-sm {
  padding: 8px 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 12px;
}

.btn-edit { background: rgba(52, 152, 219, 0.2); color: #3498db; border: 1px solid #3498db; }
.btn-extend { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
.btn-complete { background: rgba(212, 175, 55, 0.2); color: #d4af37; border: 1px solid #d4af37; }
.btn-cancel { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }

.table-editor {
  background: rgba(20, 20, 30, 0.8);
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 20px;
}

.table-list {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 10px;
}

.table-editor-item {
  background: rgba(30, 30, 40, 0.9);
  padding: 10px;
  border-radius: 12px;
  display: flex;
  gap: 10px;
  align-items: center;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  visibility: hidden;
  transition: 0.2s;
}

.modal.active {
  opacity: 1;
  visibility: visible;
}

.modal-content {
  background: #1a1a1f;
  border-radius: 24px;
  width: 90%;
  max-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
  border: 1px solid rgba(212, 175, 55, 0.3);
  padding: 20px;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.modal-input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  border: 1px solid rgba(212, 175, 55, 0.3);
  background: rgba(30, 30, 40, 0.9);
  color: #fff;
}

.bulk-actions {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
  flex-wrap: wrap;
}

.checkbox {
  width: 20px;
  height: 20px;
  cursor: pointer;
  margin-right: 10px;
}

.scheme-container {
  background: #1a1a1f;
  border-radius: 16px;
  padding: 20px;
  overflow-x: auto;
}

.hall-scheme {
  display: flex;
  flex-direction: column;
  gap: 20px;
  min-width: 500px;
}

.scheme-row {
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
}

.scheme-table {
  width: 100px;
  height: 100px;
  background: rgba(30,30,40,0.9);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 2px solid rgba(212,175,55,0.3);
  cursor: pointer;
  transition: all 0.2s;
}

.scheme-table.free { border-color: #2ecc71; background: rgba(46,204,113,0.1); }
.scheme-table.busy { border-color: #e74c3c; background: rgba(231,76,60,0.1); }
.scheme-table:hover { transform: scale(1.05); }

@media (max-width: 768px) {
  .sidebar { width: 200px; }
  .charts-row { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div id="loginPage" class="login-container">
  <div class="login-card">
    <div class="login-logo"><h2>🍷 Dubrovka PRO</h2><p>Административная панель</p></div>
    <input type="text" id="loginUsername" class="login-input" placeholder="Логин">
    <input type="password" id="loginPassword" class="login-input" placeholder="Пароль">
    <button class="login-btn" onclick="attemptLogin()">Войти</button>
    <div id="loginError" style="color:#e74c3c; margin-top:10px; text-align:center;"></div>
  </div>
</div>

<div id="adminPanel" class="admin-container">
  <div class="sidebar">
    <div class="logo">🍷 Dubrovka PRO</div>
    <div class="menu-item active" data-page="dashboard">📊 Дашборд</div>
    <div class="menu-item" data-page="bookings">📅 Бронирования</div>
    <div class="menu-item" data-page="scheme">🗺 Схема зала</div>
    <div class="menu-item" data-page="tables">🪑 Управление столами</div>
    <div class="menu-item" data-page="analytics">📈 Аналитика</div>
    <div class="menu-item" data-page="export">📎 Экспорт</div>
    <div class="user-info" style="margin-top: 30px; padding: 15px; background: rgba(30,30,40,0.8); border-radius: 12px;">
      👤 Администратор<br>
      <button class="logout-btn" onclick="logout()" style="width:100%; margin-top:10px; padding:8px; background:rgba(231,76,60,0.2); border:none; border-radius:8px; color:#e74c3c; cursor:pointer;">Выйти</button>
    </div>
  </div>

  <div class="content">
    <div class="header-bar">
      <input type="text" id="searchInput" placeholder="🔍 Поиск по имени или телефону">
      <select id="statusFilter"><option value="">Все статусы</option><option value="active">Активные</option><option value="completed">Завершённые</option><option value="cancelled">Отменённые</option></select>
      <select id="tableFilter"><option value="">Все столы</option></select>
      <input type="date" id="dateFilter">
      <button onclick="refreshData()">🔄 Обновить</button>
    </div>

    <div id="dashboardPage" class="page">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="charts-row">
        <div class="chart-container"><canvas id="hourlyChart"></canvas></div>
        <div class="chart-container"><canvas id="popularTablesChart"></canvas></div>
      </div>
      <div class="chart-container"><canvas id="weeklyChart"></canvas></div>
    </div>

    <div id="bookingsPage" class="page" style="display:none;">
      <div class="bulk-actions">
        <button class="btn-sm" onclick="selectAllBookings()">✓ Выбрать все</button>
        <button class="btn-sm btn-complete" onclick="bulkComplete()">✅ Завершить выбранные</button>
        <button class="btn-sm btn-cancel" onclick="bulkCancel()">❌ Отменить выбранные</button>
      </div>
      <div id="bookingsList" class="bookings-grid"></div>
    </div>

    <div id="schemePage" class="page" style="display:none;">
      <div class="scheme-container" id="hallScheme"></div>
    </div>

    <div id="tablesPage" class="page" style="display:none;">
      <div class="table-editor">
        <h3>🪑 Управление столами</h3>
        <div class="table-list" id="tablesList"></div>
        <button class="btn-sm btn-edit" onclick="addTable()" style="margin-top:15px;">+ Добавить стол</button>
      </div>
      <div class="table-editor">
        <h3>🔧 Блокировка столов (ремонт/обслуживание)</h3>
        <div id="blockedTablesList"></div>
      </div>
    </div>

    <div id="analyticsPage" class="page" style="display:none;">
      <div class="stats-grid" id="analyticsStats"></div>
      <div class="chart-container"><canvas id="topClientsChart"></canvas></div>
      <div id="topClientsList" style="margin-top:20px;"></div>
    </div>

    <div id="exportPage" class="page" style="display:none;">
      <div class="stats-grid">
        <div class="stat-card"><button class="btn-sm" onclick="exportToExcel('day')">📊 Экспорт за день</button></div>
        <div class="stat-card"><button class="btn-sm" onclick="exportToExcel('week')">📊 Экспорт за неделю</button></div>
        <div class="stat-card"><button class="btn-sm" onclick="exportToExcel('month')">📊 Экспорт за месяц</button></div>
        <div class="stat-card"><button class="btn-sm" onclick="exportToExcel('all')">📊 Экспорт все</button></div>
      </div>
    </div>
  </div>
</div>

<!-- Модалка редактирования брони -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <div class="modal-header"><h3>✏ Редактирование брони</h3><span onclick="closeEditModal()" style="cursor:pointer;">✕</span></div>
    <input type="text" id="editName" class="modal-input" placeholder="Имя">
    <input type="text" id="editPhone" class="modal-input" placeholder="Телефон">
    <input type="number" id="editGuests" class="modal-input" placeholder="Количество гостей">
    <select id="editTable" class="modal-input"></select>
    <input type="time" id="editTime" class="modal-input">
    <button class="login-btn" onclick="saveEditBooking()">Сохранить</button>
  </div>
</div>

<script>
const API = "https://dubrovka-webapp-production.up.railway.app";
const ADMIN_LOGIN = "admin";
const ADMIN_PASSWORD = "dubrovka42";

let isAuthenticated = false;
let currentData = [];
let selectedBookings = new Set();
let charts = {};
let customTables = JSON.parse(localStorage.getItem("customTables") || JSON.stringify([
  { id: "1", number: 1, capacity: 7, blocked: false },
  { id: "2", number: 2, capacity: 5, blocked: false },
  { id: "3", number: 3, capacity: 5, blocked: false },
  { id: "4", number: 4, capacity: 5, blocked: false },
  { id: "5", number: 5, capacity: 5, blocked: false },
  { id: "6", number: 6, capacity: 3, blocked: false },
  { id: "VIP", number: "VIP", capacity: 20, blocked: false }
]));

function getEndTime(startTime, duration = 2) {
  const [h, m] = startTime.split(":").map(Number);
  let endH = h + duration;
  const displayH = endH >= 24 ? endH - 24 : endH;
  return `${String(displayH).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}

async function loadData() {
  try {
    const res = await fetch(`${API}/all_bookings`);
    const data = await res.json();
    currentData = data;
    renderCurrentPage();
  } catch(e) { console.error(e); }
}

function renderCurrentPage() {
  const activePage = document.querySelector(".menu-item.active").dataset.page;
  if (activePage === "dashboard") renderDashboard();
  else if (activePage === "bookings") renderBookings();
  else if (activePage === "scheme") renderScheme();
  else if (activePage === "tables") renderTablesManagement();
  else if (activePage === "analytics") renderAnalytics();
  else if (activePage === "export") {}
}

function renderDashboard() {
  const active = currentData.filter(b => b.status === "active").length;
  const completed = currentData.filter(b => b.status === "completed").length;
  const cancelled = currentData.filter(b => b.status === "cancelled").length;
  const noShow = currentData.filter(b => b.status === "no_show").length;
  document.getElementById("statsGrid").innerHTML = `
    <div class="stat-card"><div class="number">${active}</div><div>Активных</div></div>
    <div class="stat-card"><div class="number">${completed}</div><div>Завершённых</div></div>
    <div class="stat-card"><div class="number">${cancelled}</div><div>Отменённых</div></div>
    <div class="stat-card"><div class="number">${noShow}</div><div>No-Show</div></div>
    <div class="stat-card"><div class="number">${currentData.length}</div><div>Всего</div></div>
  `;
  
  const hourly = {};
  currentData.forEach(b => { if(b.status === "active") { hourly[b.time] = (hourly[b.time] || 0) + 1; } });
  const hourlyLabels = Object.keys(hourly).sort();
  const hourlyData = hourlyLabels.map(l => hourly[l]);
  
  if (charts.hourly) charts.hourly.destroy();
  charts.hourly = new Chart(document.getElementById("hourlyChart"), {
    type: 'bar', data: { labels: hourlyLabels, datasets: [{ label: 'Брони по часам', data: hourlyData, backgroundColor: '#d4af37' }] }
  });
  
  const tableCount = {};
  currentData.forEach(b => { if(b.status === "active") { tableCount[`Стол ${b.table}`] = (tableCount[`Стол ${b.table}`] || 0) + 1; } });
  if (charts.popular) charts.popular.destroy();
  charts.popular = new Chart(document.getElementById("popularTablesChart"), {
    type: 'pie', data: { labels: Object.keys(tableCount), datasets: [{ data: Object.values(tableCount), backgroundColor: '#d4af37' }] }
  });
  
  const weekly = [0,0,0,0,0,0,0];
  currentData.forEach(b => { const d = new Date(b.date); weekly[d.getDay()]++; });
  if (charts.weekly) charts.weekly.destroy();
  charts.weekly = new Chart(document.getElementById("weeklyChart"), {
    type: 'line', data: { labels: ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'], datasets: [{ label: 'Брони по дням недели', data: weekly, borderColor: '#d4af37', fill: false }] }
  });
}

function renderBookings() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const status = document.getElementById("statusFilter").value;
  const table = document.getElementById("tableFilter").value;
  const date = document.getElementById("dateFilter").value;
  
  let filtered = currentData.filter(b => {
    if (status && b.status !== status) return false;
    if (table && b.table !== table) return false;
    if (date && b.date !== date) return false;
    if (search && !b.name.toLowerCase().includes(search) && !b.phone.includes(search)) return false;
    return true;
  });
  
  document.getElementById("bookingsList").innerHTML = filtered.map(b => `
    <div class="booking-card ${selectedBookings.has(b.id) ? 'selected' : ''}" data-id="${b.id}">
      <input type="checkbox" class="checkbox" onchange="toggleSelectBooking(${b.id})" ${selectedBookings.has(b.id) ? 'checked' : ''}>
      <div class="status ${b.status}">${b.status === 'active' ? '✅ Активна' : b.status === 'completed' ? '✔ Завершена' : '❌ Отменена'}</div>
      <div class="time-badge">⏰ ${b.time} — ${getEndTime(b.time)} (2 часа)</div>
      <div><strong>👤 ${b.name}</strong></div>
      <div>📞 ${b.phone}</div>
      <div>🪑 Стол ${b.table} | 👥 ${b.guests} чел.</div>
      <div>📅 ${b.date}</div>
      <div class="booking-actions">
        <button class="btn-sm btn-edit" onclick="openEditModal(${b.id})">✏ Редактировать</button>
        <button class="btn-sm btn-extend" onclick="extendBooking(${b.id})">⏰ Продлить (+1 час)</button>
        ${b.status === 'active' ? `<button class="btn-sm btn-complete" onclick="completeBooking(${b.id})">✅ Завершить</button>` : ''}
        ${b.status === 'active' ? `<button class="btn-sm btn-cancel" onclick="cancelBooking(${b.id})">❌ Отменить</button>` : ''}
      </div>
    </div>
  `).join('');
}

function renderScheme() {
  const tables = customTables.filter(t => !t.blocked);
  const bookingsToday = currentData.filter(b => b.date === new Date().toISOString().split('T')[0] && b.status === "active");
  
  const schemeHtml = `
    <div class="hall-scheme">
      <div class="scheme-row">
        ${tables.filter(t => !isNaN(t.number) && t.number <= 3).map(t => {
          const isBusy = bookingsToday.some(b => b.table == t.id);
          return `<div class="scheme-table ${isBusy ? 'busy' : 'free'}" onclick="showTableInfo('${t.id}')">
            <strong>Стол ${t.number}</strong>
            <small>${t.capacity} чел.</small>
            <small>${isBusy ? '🔴 Занят' : '🟢 Свободен'}</small>
          </div>`;
        }).join('')}
      </div>
      <div class="scheme-row">
        ${tables.filter(t => !isNaN(t.number) && t.number > 3 && t.number <= 6).map(t => {
          const isBusy = bookingsToday.some(b => b.table == t.id);
          return `<div class="scheme-table ${isBusy ? 'busy' : 'free'}" onclick="showTableInfo('${t.id}')">
            <strong>Стол ${t.number}</strong>
            <small>${t.capacity} чел.</small>
            <small>${isBusy ? '🔴 Занят' : '🟢 Свободен'}</small>
          </div>`;
        }).join('')}
      </div>
      <div class="scheme-row">
        ${tables.filter(t => t.id === "VIP").map(t => {
          const isBusy = bookingsToday.some(b => b.table == t.id);
          return `<div class="scheme-table ${isBusy ? 'busy' : 'free'}" style="width:200px;" onclick="showTableInfo('${t.id}')">
            <strong>VIP комната</strong>
            <small>${t.capacity} чел.</small>
            <small>${isBusy ? '🔴 Занят' : '🟢 Свободен'}</small>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
  document.getElementById("hallScheme").innerHTML = schemeHtml;
}

function renderTablesManagement() {
  document.getElementById("tablesList").innerHTML = customTables.map(t => `
    <div class="table-editor-item">
      <span>Стол ${t.number}</span>
      <input type="number" value="${t.capacity}" style="width:60px;" onchange="updateTableCapacity('${t.id}', this.value)">
      <button class="btn-sm btn-cancel" onclick="toggleBlockTable('${t.id}')">${t.blocked ? '🔓 Разблокировать' : '🔒 Заблокировать'}</button>
      <button class="btn-sm" onclick="deleteTable('${t.id}')">🗑 Удалить</button>
    </div>
  `).join('');
  
  document.getElementById("blockedTablesList").innerHTML = customTables.filter(t => t.blocked).map(t => `
    <div class="table-editor-item">Стол ${t.number} — заблокирован (ремонт/обслуживание)</div>
  `).join('');
}

function renderAnalytics() {
  const clientStats = {};
  currentData.forEach(b => {
    if (!clientStats[b.phone]) clientStats[b.phone] = { name: b.name, count: 0 };
    clientStats[b.phone].count++;
  });
  const topClients = Object.entries(clientStats).sort((a,b) => b[1].count - a[1].count).slice(0,5);
  
  document.getElementById("analyticsStats").innerHTML = `
    <div class="stat-card"><div class="number">${currentData.filter(b => b.status === "no_show").length}</div><div>No-Show (не пришли)</div></div>
    <div class="stat-card"><div class="number">${(currentData.filter(b => b.status === "no_show").length / (currentData.length || 1) * 100).toFixed(1)}%</div><div>Процент No-Show</div></div>
  `;
  
  if (charts.topClients) charts.topClients.destroy();
  charts.topClients = new Chart(document.getElementById("topClientsChart"), {
    type: 'bar', data: { labels: topClients.map(c => c[1].name), datasets: [{ label: 'Количество броней', data: topClients.map(c => c[1].count), backgroundColor: '#d4af37' }] }
  });
  
  document.getElementById("topClientsList").innerHTML = `<h3>🏆 Самые активные гости</h3>` + topClients.map((c,i) => `
    <div class="booking-card" style="margin-bottom:10px;">${i+1}. ${c[1].name} — ${c[1].count} бронирований</div>
  `).join('');
}

function toggleSelectBooking(id) { if (selectedBookings.has(id)) selectedBookings.delete(id); else selectedBookings.add(id); renderBookings(); }
function selectAllBookings() { document.querySelectorAll('.booking-card').forEach(c => selectedBookings.add(parseInt(c.dataset.id))); renderBookings(); }
async function bulkComplete() { for (let id of selectedBookings) await fetch(`${API}/done/${id}`, { method: "POST" }); selectedBookings.clear(); await loadData(); }
async function bulkCancel() { for (let id of selectedBookings) await fetch(`${API}/cancel/${id}`, { method: "POST" }); selectedBookings.clear(); await loadData(); }
async function completeBooking(id) { await fetch(`${API}/done/${id}`, { method: "POST" }); await loadData(); }
async function cancelBooking(id) { if(confirm("Отменить бронь?")) { await fetch(`${API}/cancel/${id}`, { method: "POST" }); await loadData(); } }
async function extendBooking(id) { alert("Функция продления: +1 час к брони"); }

function openEditModal(id) {
  const booking = currentData.find(b => b.id === id);
  document.getElementById("editName").value = booking.name;
  document.getElementById("editPhone").value = booking.phone;
  document.getElementById("editGuests").value = booking.guests;
  document.getElementById("editTime").value = booking.time;
  document.getElementById("editTable").innerHTML = customTables.map(t => `<option value="${t.id}" ${t.id == booking.table ? 'selected' : ''}>Стол ${t.number}</option>`).join('');
  window.editBookingId = id;
  document.getElementById("editModal").classList.add("active");
}
function closeEditModal() { document.getElementById("editModal").classList.remove("active"); }
async function saveEditBooking() { alert("Сохранение... (API редактирования пока в разработке)"); closeEditModal(); }

function updateTableCapacity(id, capacity) { const t = customTables.find(t => t.id === id); if(t) t.capacity = parseInt(capacity); localStorage.setItem("customTables", JSON.stringify(customTables)); renderTablesManagement(); }
function toggleBlockTable(id) { const t = customTables.find(t => t.id === id); if(t) t.blocked = !t.blocked; localStorage.setItem("customTables", JSON.stringify(customTables)); renderTablesManagement(); renderScheme(); }
function addTable() { const newId = (Math.max(...customTables.filter(t => !isNaN(t.number)).map(t => t.number), 0) + 1).toString(); customTables.push({ id: newId, number: parseInt(newId), capacity: 4, blocked: false }); localStorage.setItem("customTables", JSON.stringify(customTables)); renderTablesManagement(); renderScheme(); }
function deleteTable(id) { customTables = customTables.filter(t => t.id !== id); localStorage.setItem("customTables", JSON.stringify(customTables)); renderTablesManagement(); renderScheme(); }
function showTableInfo(id) { alert(`Стол ${customTables.find(t => t.id === id)?.number}`); }

function exportToExcel(period) {
  let data = currentData;
  if (period === 'day') data = currentData.filter(b => b.date === new Date().toISOString().split('T')[0]);
  else if (period === 'week') { const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7); data = currentData.filter(b => new Date(b.date) >= weekAgo); }
  else if (period === 'month') { const monthAgo = new Date(); monthAgo.setMonth(monthAgo.getMonth() - 1); data = currentData.filter(b => new Date(b.date) >= monthAgo); }
  
  const ws = XLSX.utils.json_to_sheet(data.map(b => ({ ID: b.id, Имя: b.name, Телефон: b.phone, Стол: b.table, Гостей: b.guests, Дата: b.date, Время: b.time, Статус: b.status })));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Брони');
  XLSX.writeFile(wb, `brovki_${period}_${new Date().toISOString().split('T')[0]}.xlsx`);
}

async function refreshData() { await loadData(); }

document.querySelectorAll(".menu-item").forEach(item => {
  item.addEventListener("click", () => {
    document.querySelectorAll(".menu-item").forEach(i => i.classList.remove("active"));
    item.classList.add("active");
    document.querySelectorAll(".page").forEach(p => p.style.display = "none");
    document.getElementById(`${item.dataset.page}Page`).style.display = "block";
    renderCurrentPage();
  });
});

function attemptLogin() {
  if (document.getElementById("loginUsername").value === ADMIN_LOGIN && document.getElementById("loginPassword").value === ADMIN_PASSWORD) {
    isAuthenticated = true;
    localStorage.setItem("admin_auth", "true");
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("adminPanel").style.display = "flex";
    loadData();
  } else { document.getElementById("loginError").innerText = "Неверный логин или пароль"; }
}

function logout() { isAuthenticated = false; localStorage.removeItem("admin_auth"); document.getElementById("loginPage").style.display = "flex"; document.getElementById("adminPanel").style.display = "none"; }

if (localStorage.getItem("admin_auth") === "true") { document.getElementById("loginPage").style.display = "none"; document.getElementById("adminPanel").style.display = "flex"; loadData(); }
</script>

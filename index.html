<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka Lounge</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:-apple-system;
  background:#0a0a0f;
  color:#fff;
}

/* VIDEO */
.video-background{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  opacity:0.5;
}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

/* LOGO */
.logo-container{
  text-align:center;
  margin-bottom:20px;
}

.logo-img{
  width:80px;
  height:80px;
  border-radius:50%;
  border:2px solid #d4af37;
}

.logo-text{
  font-size:24px;
  color:#d4af37;
  font-weight:700;
}

.logo-subtitle{
  font-size:11px;
  color:#d4af37;
}

/* CARD */
.card{
  background:rgba(10,10,15,0.85);
  padding:20px;
  border-radius:20px;
  border:1px solid rgba(212,175,55,0.3);
}

/* TABLE CARDS */
.tables-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  margin-bottom:15px;
}

.table-card{
  background:rgba(20,20,30,0.9);
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
}

.table-card.selected{
  border:2px solid #d4af37;
}

.table-card.booked{
  opacity:0.4;
}

.card-img{
  height:100px;
  background:linear-gradient(135deg,#333,#111);
}

.status{
  position:absolute;
  top:8px;
  left:8px;
  background:rgba(0,0,0,0.6);
  padding:4px 8px;
  border-radius:8px;
  font-size:11px;
}

.dot{
  position:absolute;
  top:8px;
  right:8px;
  width:8px;
  height:8px;
  border-radius:50%;
  background:#2ecc71;
}

.table-card.booked .dot{background:red;}

.card-body{
  padding:10px;
  font-size:13px;
}

/* TIME */
.time-slots{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:10px;
}

.time-slot{
  padding:8px 10px;
  background:#222;
  border-radius:10px;
  cursor:pointer;
}

.time-slot.selected{
  background:#d4af37;
  color:black;
}

.time-slot.busy{
  opacity:0.3;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#d4af37;
  color:black;
  font-weight:700;
}
</style>
</head>

<body>

<video class="video-background" autoplay muted loop playsinline>
  <source src="bg.mp4">
</video>

<div class="container">

<div class="logo-container">
  <img src="logo.png" class="logo-img">
  <div class="logo-text">DUBROVKA</div>
  <div class="logo-subtitle">LOUNGE & BAR</div>
</div>

<div class="card">

<div id="tablesGrid" class="tables-grid"></div>

<div id="tableInfo">Выберите стол</div>

<input id="date" type="date">
<div id="timeSlotsContainer" class="time-slots"></div>

<input id="guests" type="number" value="1">
<input id="name" placeholder="Имя">
<input id="phone" placeholder="+7XXXXXXXXXX">

<button id="bookBtn">Забронировать</button>

</div>
</div>

<script>
const API="https://dubrovka-webapp-production.up.railway.app";

const TABLE_CAPACITY={
 "1":7,"2":5,"3":5,"4":5,"5":5,"6":3
};

const tableDescriptions={
 "1":"Приватная зона 👥7",
 "2":"Приватная зона 👥5",
 "3":"Приватная зона 👥5",
 "4":"Приватная зона 👥5",
 "5":"Открытая зона 👥5",
 "6":"Компакт 👥3"
};

let selectedTable=null;
let selectedTime=null;
let busyTimes=[];
let currentDate=new Date().toISOString().split("T")[0];

document.getElementById("date").value=currentDate;

// TABLES
function renderTables(){
 let grid=document.getElementById("tablesGrid");
 grid.innerHTML="";

 for(let i=1;i<=6;i++){
  let el=document.createElement("div");
  el.className="table-card";

  el.innerHTML=`
   <div class="card-img">
    <div class="status">Свободен</div>
    <div class="dot"></div>
   </div>
   <div class="card-body">
    Стол ${i}<br>👥 ${TABLE_CAPACITY[i]}
   </div>
  `;

  el.onclick=()=>{
   selectedTable=String(i);
   document.getElementById("tableInfo").innerText=tableDescriptions[i];

   document.querySelectorAll(".table-card").forEach(t=>t.classList.remove("selected"));
   el.classList.add("selected");

   loadTimes();
  };

  grid.appendChild(el);
 }
}

// TIMES
async function loadTimes(){
 let res=await fetch(`${API}/busy_times?date=${currentDate}&table=${selectedTable}`);
 busyTimes=await res.json();

 let container=document.getElementById("timeSlotsContainer");
 container.innerHTML="";

 for(let h=12;h<24;h++){
  let t=`${h}:00`;

  let el=document.createElement("div");
  el.className="time-slot";
  el.innerText=t;

  if(busyTimes.includes(t)){
   el.classList.add("busy");
  }

  el.onclick=()=>{
   if(el.classList.contains("busy")) return;
   selectedTime=t;

   document.querySelectorAll(".time-slot").forEach(x=>x.classList.remove("selected"));
   el.classList.add("selected");
  };

  container.appendChild(el);
 }
}

// BOOK
document.getElementById("bookBtn").onclick=async()=>{
 if(!selectedTable||!selectedTime) return alert("Выбери стол и время");

 await fetch(API+"/booking",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
   table:selectedTable,
   time:selectedTime,
   date:currentDate,
   guests:2
  })
 });

 alert("Бронь создана");
};

// INIT
renderTables();
</script>

</body>
</html>

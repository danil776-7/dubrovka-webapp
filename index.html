<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka PRO</title>

<style>
/* ================= RESET ================= */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
  background:#2b1208;color:#fff;
  overflow-x:hidden;
}

/* ================= HEADER ================= */
.header{
  background:#eee;color:#000;
  padding:12px 16px;
  display:flex;justify-content:space-between;align-items:center;
}

/* ================= TIMELINE ================= */
.timeline{
  background:#3b1509;
  padding:16px;
}
.timeline-bar{
  position:relative;
  height:40px;
}
.timeline-track{
  height:4px;
  background:#6b3a2a;
  border-radius:4px;
  position:absolute;top:18px;left:0;right:0;
}
.timeline-pointer{
  position:absolute;
  top:10px;
  width:16px;height:16px;
  background:#fff;border-radius:50%;
  transform:translateX(-50%);
  cursor:pointer;
}
.timeline-label{
  text-align:center;
  margin-bottom:8px;
  font-weight:600;
}

/* ================= GRID ================= */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px;
  padding:16px;
}

/* ================= CARD ================= */
.card{
  position:relative;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:.25s;
}
.card:hover{transform:scale(1.03)}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.overlay{
  position:absolute;
  inset:0;
  padding:10px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  background:linear-gradient(transparent,rgba(0,0,0,.85));
}

.badge{
  font-size:12px;
  padding:4px 8px;
  border-radius:8px;
  width:max-content;
}
.free{background:#1faa5c}
.partial{background:#cfa72a}
.busy{background:#c0392b}

/* ================= MODAL ================= */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.25s;
}
.modal.active{
  opacity:1;
  pointer-events:auto;
}

.box{
  width:420px;
  background:#111;
  border-radius:14px;
  overflow:hidden;
  transform:translateY(20px);
  transition:.25s;
}
.modal.active .box{
  transform:translateY(0);
}

/* ================= MODAL HEADER ================= */
.modal-header{
  padding:14px;
  background:#1c1c1c;
  display:flex;
  justify-content:space-between;
}

/* ================= TIME ================= */
.time-header{
  padding:12px;
}

.tabs{
  display:flex;
  margin:10px;
}
.tab{
  flex:1;
  padding:10px;
  text-align:center;
  background:#222;
  cursor:pointer;
}
.tab.active{
  background:#fff;
  color:#000;
}

.time-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  padding:12px;
}

.cell{
  padding:14px;
  text-align:center;
  border-radius:8px;
  border:1px solid #333;
  cursor:pointer;
}
.cell:hover{background:#2a2a2a}
.cell.active{background:#fff;color:#000}
.cell.busy{
  opacity:.3;
  pointer-events:none;
}

/* ================= BUTTON ================= */
.btn{
  margin:12px;
  padding:14px;
  text-align:center;
  border-radius:10px;
  background:#fff;
  color:#000;
  cursor:pointer;
}
.btn.disabled{
  background:#555;
  color:#aaa;
  pointer-events:none;
}

/* ================= INPUT ================= */
input{
  width:calc(100% - 24px);
  margin:8px 12px;
  padding:14px;
  border-radius:10px;
  border:1px solid #333;
  background:#1c1c1c;
  color:#fff;
}

/* ================= MOBILE ================= */
@media(max-width:500px){
  .box{width:95%}
}
</style>
</head>

<body>

<div class="header">
  <b>DUBROVKA</b>
  <div>+7‒913‒432‒01‒01</div>
</div>

<!-- TIMELINE -->
<div class="timeline">
  <div class="timeline-label" id="timelineLabel">с 12:00 ч.</div>
  <div class="timeline-bar">
    <div class="timeline-track"></div>
    <div id="pointer" class="timeline-pointer" style="left:0%"></div>
  </div>
</div>

<!-- TABLES -->
<div id="grid" class="grid"></div>

<!-- TIME MODAL -->
<div id="timeModal" class="modal">
  <div class="box">

    <div class="modal-header">
      <div>Дата и время</div>
      <div onclick="closeTime()">✕</div>
    </div>

    <div class="time-header">
      С: <b id="from">--</b><br>
      До: <b id="to">--</b>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="setMode('hour')">Часы</div>
      <div class="tab" onclick="setMode('minute')">Минуты</div>
    </div>

    <div id="timeGrid" class="time-grid"></div>

    <div id="continueBtn" class="btn disabled">Продолжить</div>

  </div>
</div>

<!-- FORM -->
<div id="formModal" class="modal">
  <div class="box">

    <div class="modal-header">
      <div>Бронирование</div>
      <div onclick="closeForm()">✕</div>
    </div>

    <input placeholder="Имя">

    <input id="phone" placeholder="+7 XXX XXX XX XX" maxlength="18">

    <input id="guests" type="number" min="1" max="8" value="2">

    <div class="btn" onclick="book()">Подтвердить</div>

  </div>
</div>

<script>

/* ================= TABLES ================= */
const TABLES=[1,2,3,4,5,6,"VIP"];

/* ================= BUSY ================= */
const BUSY={
 1:[["18:00","20:00"]],
 2:[["17:30","19:00"]],
 3:[["19:00","23:00"]],
 4:[],
 5:[["16:00","18:00"]],
 6:[["20:00","23:00"]],
 VIP:[["18:00","23:00"]]
};

/* ================= STATE ================= */
let selectedTable=null;
let selectedFrom=null;
let selectedTo=null;
let tempHour=null;
let mode="hour";

/* ================= UTILS ================= */
function toMin(t){
 let[a,b]=t.split(":").map(Number);
 return a*60+b;
}

/* ================= STATUS ================= */
function getStatus(t){
 let now=12*60;
 let busy=BUSY[t]||[];

 if(!busy.length){
  return ["free","Свободно"];
 }

 let current=busy.find(([s,e])=>{
  return toMin(s)<=now && toMin(e)>now;
 });

 if(current){
  return ["busy","Занято"];
 }

 return ["partial","Свободно до "+busy[0][0]];
}

/* ================= RENDER ================= */
function render(){
 grid.innerHTML="";

 TABLES.forEach(t=>{
  let [cls,text]=getStatus(t);

  let el=document.createElement("div");
  el.className="card";

  el.innerHTML=`
    <img src="https://images.unsplash.com/photo-1552566626-52f8b828add9">
    <div class="overlay">
      <div class="badge ${cls}">${text}</div>
      <div>Стол ${t}</div>
    </div>
  `;

  el.onclick=()=>{
    selectedTable=t;
    openTime();
  };

  grid.appendChild(el);
 });
}

/* ================= TIME ================= */
function openTime(){
 timeModal.classList.add("active");

 selectedFrom=null;
 selectedTo=null;

 from.innerText="--";
 to.innerText="--";

 setMode("hour");
}

function closeTime(){
 timeModal.classList.remove("active");
}

/* ================= MODE ================= */
function setMode(m){
 mode=m;

 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 document.querySelectorAll(".tab")[m==="hour"?0:1].classList.add("active");

 renderGrid();
}

/* ================= GRID ================= */
function renderGrid(){
 timeGrid.innerHTML="";

 if(mode==="hour"){
  for(let h=12;h<24;h++){
    let el=document.createElement("div");
    el.className="cell";
    el.innerText=h;

    el.onclick=()=>{
      tempHour=h;
      setMode("minute");
    };

    timeGrid.appendChild(el);
  }
 }else{
  [0,15,30,45].forEach(m=>{
    let t=`${tempHour}:${String(m).padStart(2,'0')}`;

    let el=document.createElement("div");
    el.className="cell";
    el.innerText=String(m).padStart(2,'0');

    if(isBusy(t)){
      el.classList.add("busy");
    }

    el.onclick=()=>selectTime(t);

    timeGrid.appendChild(el);
  });
 }
}

/* ================= BUSY CHECK ================= */
function isBusy(t){
 let busy=BUSY[selectedTable]||[];
 return busy.some(([s,e])=>{
   return toMin(t)>=toMin(s) && toMin(t)<toMin(e);
 });
}

/* ================= SELECT ================= */
function selectTime(t){

 if(!selectedFrom){
  selectedFrom=t;
  from.innerText=t;
  return;
 }

 if(selectedFrom && !selectedTo){

  if(toMin(t)<=toMin(selectedFrom)){
    selectedFrom=t;
    from.innerText=t;
    return;
  }

  selectedTo=t;
  to.innerText=t;

  continueBtn.classList.remove("disabled");
  return;
 }

 selectedFrom=t;
 selectedTo=null;

 from.innerText=t;
 to.innerText="--";

 continueBtn.classList.add("disabled");
}

/* ================= CONTINUE ================= */
continueBtn.onclick=()=>{
 if(!selectedFrom || !selectedTo) return;

 timeModal.classList.remove("active");
 formModal.classList.add("active");
};

/* ================= FORM ================= */
function closeForm(){
 formModal.classList.remove("active");
}

/* ================= PHONE ================= */
phone.oninput=()=>{
 let v=phone.value.replace(/\D/g,"").substring(0,11);
 if(!v.startsWith("7")) v="7"+v;

 let f="+7";
 if(v.length>1) f+=" "+v.slice(1,4);
 if(v.length>4) f+=" "+v.slice(4,7);
 if(v.length>7) f+=" "+v.slice(7,9);
 if(v.length>9) f+=" "+v.slice(9,11);

 phone.value=f;
};

/* ================= GUEST LIMIT ================= */
guests.oninput=()=>{
 if(guests.value>8) guests.value=8;
 if(guests.value<1) guests.value=1;
};

/* ================= BOOK ================= */
function book(){
 alert(`Стол ${selectedTable}\n${selectedFrom}-${selectedTo}`);
}

/* ================= TIMELINE DRAG ================= */
let pointer=document.getElementById("pointer");
let bar=document.querySelector(".timeline-bar");

pointer.onmousedown=(e)=>{
 document.onmousemove=(e2)=>{
  let rect=bar.getBoundingClientRect();
  let x=e2.clientX-rect.left;

  if(x<0)x=0;
  if(x>rect.width)x=rect.width;

  let percent=x/rect.width;

  pointer.style.left=(percent*100)+"%";

  let hour=12+Math.floor(percent*12);
  timelineLabel.innerText="с "+hour+":00 ч.";
 };
 document.onmouseup=()=>document.onmousemove=null;
};

/* ================= INIT ================= */
render();

</script>

</body>
</html>

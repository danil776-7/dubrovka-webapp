<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka Booking</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#0a0a0f;
  color:white;
}

/* VIDEO */
.video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  opacity:0.4;
}

/* HEADER */
.header{
  padding:15px;
  text-align:center;
}

.logo{
  font-size:24px;
  color:#d4af37;
}

/* TIME */
.times{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.time{
  padding:10px;
  background:#1a1a22;
  border-radius:10px;
  cursor:pointer;
}

.time.active{
  background:#d4af37;
  color:black;
}

/* TABLES */
.tables{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:15px;
}

.table{
  background:#1a1a22;
  border-radius:14px;
  padding:15px;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
}

.modal.active{display:block;}

.back{
  padding:15px;
  cursor:pointer;
}
</style>
</head>

<body>

<video class="video" autoplay muted loop>
  <source src="bg.mp4">
</video>

<div class="header">
  <div class="logo">DUBROVKA</div>
</div>

<!-- TIME -->
<div id="times" class="times"></div>

<!-- TABLES -->
<div id="tables" class="tables"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="back" onclick="closeModal()">← Назад</div>
  <div id="modalContent"></div>
</div>

<script>
const API="https://dubrovka-webapp-production.up.railway.app";

const TABLES=[
 {id:"1",cap:7},
 {id:"2",cap:5},
 {id:"3",cap:5},
 {id:"4",cap:5},
 {id:"5",cap:5},
 {id:"6",cap:3}
];

let selectedTime=null;
let selectedTable=null;
let busyTimes=[];

/* TIMES */
function renderTimes(){
 let c=document.getElementById("times");

 for(let h=12;h<24;h++){
  let t=h+":00";

  let el=document.createElement("div");
  el.className="time";
  el.innerText=t;

  el.onclick=()=>{
   selectedTime=t;
   document.querySelectorAll(".time").forEach(x=>x.classList.remove("active"));
   el.classList.add("active");
  };

  c.appendChild(el);
 }
}

/* TABLES */
function renderTables(){
 let c=document.getElementById("tables");

 TABLES.forEach(t=>{
  let el=document.createElement("div");
  el.className="table";
  el.innerText=`Стол ${t.id} 👥 ${t.cap}`;

  el.onclick=()=>openTable(t.id);

  c.appendChild(el);
 });
}

/* OPEN TABLE */
async function openTable(id){
 if(!selectedTime) return alert("Сначала выбери время");

 selectedTable=id;

 let res=await fetch(`${API}/busy_times?date=${getDate()}&table=${id}`);
 busyTimes=await res.json();

 let html=`<h2>Стол ${id}</h2>`;

 html+=`<div>`;
 for(let h=12;h<24;h++){
  let t=h+":00";

  let busy=busyTimes.includes(t);

  html+=`<div onclick="selectTime('${t}')" style="
    padding:8px;
    margin:5px;
    background:${busy?'#333':'#d4af37'};
    color:${busy?'#888':'black'};
  ">${t}</div>`;
 }
 html+=`</div>`;

 html+=`
  <input id="name" placeholder="Имя">
  <input id="phone" placeholder="+7">
  <button onclick="book()">Забронировать</button>
 `;

 document.getElementById("modalContent").innerHTML=html;
 document.getElementById("modal").classList.add("active");
}

function closeModal(){
 document.getElementById("modal").classList.remove("active");
}

/* BOOK */
async function book(){
 await fetch(API+"/booking",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
   table:selectedTable,
   time:selectedTime,
   date:getDate(),
   guests:2
  })
 });

 alert("Готово");
 closeModal();
}

function getDate(){
 return new Date().toISOString().split("T")[0];
}

renderTimes();
renderTables();
</script>

</body>
</html>

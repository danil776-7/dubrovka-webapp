<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dubrovka</title>

<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<!-- 🎥 ВИДЕО -->
<video autoplay muted loop playsinline class="video-bg">
    <source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

<div class="card">

<img src="logo.png" class="logo">

<h2>Бронирование столов</h2>

<div class="worktime">
🕒 Вс–Чт: 11:00 – 01:00<br>
🕒 Пт–Сб: 11:00 – 02:00
</div>

<label>Дата</label>
<input type="date" id="date">

<label>Время</label>
<select id="time">
<option>18:00</option>
<option>19:00</option>
<option>20:00</option>
<option>21:00</option>
</select>

<h3>Выберите стол</h3>

<div class="tables">
<div class="table" data-table="1">1</div>
<div class="table" data-table="2">2</div>
<div class="table" data-table="3">3</div>
<div class="table vip" data-table="VIP">VIP</div>
</div>

<div id="tableInfo" class="desc">
Выберите стол
</div>

<label>Гости</label>
<input type="number" id="guests">

<label>Имя</label>
<input type="text" id="name">

<label>Телефон</label>
<input type="tel" id="phone" value="+7" maxlength="12">

<button id="bookBtn">Забронировать</button>

</div>
</div>

<script src="script.js"></script>

</body>
</html>

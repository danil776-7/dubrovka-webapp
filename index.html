<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka PRO FULL</title>

<style>

/* ================= RESET ================= */
*{margin:0;padding:0;box-sizing:border-box}
body{
 font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
 background:#2b1208;color:#fff;
 overflow-x:hidden;
 user-select:none;
}

/* ================= HEADER ================= */
.header{
 background:#eee;color:#000;
 padding:12px 16px;
 display:flex;justify-content:space-between;
 align-items:center;
}

/* ================= TIMELINE ================= */
.timeline{
 background:#3b1509;
 padding:20px;
}

.timeline-label{
 text-align:center;
 font-weight:600;
 margin-bottom:10px;
}

.timeline-track{
 position:relative;
 height:6px;
 background:#6b3a2a;
 border-radius:10px;
}

.timeline-fill{
 position:absolute;
 height:100%;
 background:#fff;
 border-radius:10px;
 width:0%;
}

.timeline-pointer{
 position:absolute;
 top:-5px;
 width:16px;height:16px;
 background:#fff;
 border-radius:50%;
 cursor:pointer;
}

/* ================= GRID ================= */
.grid{
 display:grid;
 grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
 gap:12px;padding:16px;
}

/* ================= CARD ================= */
.card{
 position:relative;
 border-radius:14px;
 overflow:hidden;
 cursor:pointer;
 transition:.2s;
}
.card:hover{transform:scale(1.02)}
.card.disabled{
 opacity:.35;
 pointer-events:none;
}

.card img{
 width:100%;
 height:160px;
 object-fit:cover;
}

.overlay{
 position:absolute;
 inset:0;
 padding:10px;
 display:flex;
 flex-direction:column;
 justify-content:space-between;
 background:linear-gradient(transparent,rgba(0,0,0,.85));
}

.badge{
 padding:4px 8px;
 border-radius:8px;
 font-size:12px;
 width:max-content;
}

.free{background:#1faa5c}
.partial{background:#cfa72a}
.busy{background:#c0392b}

/* ================= MODAL ================= */
.modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.85);
 display:flex;
 justify-content:center;
 align-items:center;
 opacity:0;
 pointer-events:none;
 transition:.25s;
}
.modal.active{
 opacity:1;
 pointer-events:auto;
}

.box{
 width:420px;
 background:#111;
 border-radius:14px;
 overflow:hidden;
 transform:translateY(20px);
 transition:.25s;
}
.modal.active .box{
 transform:translateY(0);
}

.modal-header{
 padding:14px;
 background:#1c1c1c;
 display:flex;
 justify-content:space-between;
}

/* ================= FORM ================= */
input{
 width:calc(100% - 24px);
 margin:8px 12px;
 padding:14px;
 border-radius:10px;
 border:1px solid #333;
 background:#1c1c1c;
 color:#fff;
}

.btn{
 margin:12px;
 padding:14px;
 text-align:center;
 border-radius:10px;
 background:#fff;
 color:#000;
 cursor:pointer;
}
.btn.disabled{
 background:#555;color:#aaa;
 pointer-events:none;
}

/* ================= MOBILE ================= */
@media(max-width:500px){
 .box{width:95%}
}

</style>
</head>

<body>

<div class="header">
 <b>DUBROVKA</b>
 <div>+7‒913‒432‒01‒01</div>
</div>

<!-- TIMELINE -->
<div class="timeline">
 <div id="timeLabel" class="timeline-label">12:00</div>

 <div id="track" class="timeline-track">
   <div id="fill" class="timeline-fill"></div>
   <div id="pointer" class="timeline-pointer"></div>
 </div>
</div>

<!-- TABLES -->
<div id="grid" class="grid"></div>

<!-- FORM -->
<div id="formModal" class="modal">
 <div class="box">
   <div class="modal-header">
     <div>Бронирование</div>
     <div onclick="closeForm()">✕</div>
   </div>

   <input placeholder="Имя">

   <input id="phone" placeholder="+7 XXX XXX XX XX" maxlength="18">

   <input id="guests" type="number" min="1" max="8" value="2">

   <div class="btn" onclick="book()">Подтвердить</div>
 </div>
</div>

<script>

/* ================= DATA ================= */
const TABLES=[1,2,3,4,5,6,"VIP"];

const BUSY={
 1:[["18:00","20:00"]],
 2:[["17:30","19:00"]],
 3:[["19:00","23:00"]],
 4:[],
 5:[["16:00","18:00"]],
 6:[["20:00","23:00"]],
 VIP:[["18:00","23:00"]]
};

/* ================= STATE ================= */
let selectedTime="12:00";
let selectedTable=null;

/* ================= UTILS ================= */
function toMin(t){
 let[a,b]=t.split(":").map(Number);
 return a*60+b;
}

/* ================= STATUS ================= */
function getStatus(table,time){

 let busy=BUSY[table]||[];

 if(!busy.length){
  return ["free","Свободно"];
 }

 let current=busy.find(([s,e])=>{
  return toMin(time)>=toMin(s) && toMin(time)<toMin(e);
 });

 if(current){
  return ["busy","Занято"];
 }

 let next=busy.find(([s])=>toMin(s)>toMin(time));

 if(next){
  return ["partial","Свободно до "+next[0]];
 }

 return ["free","Свободно"];
}

/* ================= RENDER ================= */
function render(){
 grid.innerHTML="";

 TABLES.forEach(t=>{

  let [cls,text]=getStatus(t,selectedTime);

  let el=document.createElement("div");
  el.className="card "+(cls==="busy"?"disabled":"");

  el.innerHTML=`
    <img src="https://images.unsplash.com/photo-1552566626-52f8b828add9">
    <div class="overlay">
      <div class="badge ${cls}">${text}</div>
      <div>Стол ${t}</div>
    </div>
  `;

  if(cls!=="busy"){
    el.onclick=()=>{
      selectedTable=t;
      openForm();
    };
  }

  grid.appendChild(el);
 });
}

/* ================= TIMELINE ================= */
let pointer=document.getElementById("pointer");
let track=document.getElementById("track");
let fill=document.getElementById("fill");

function updateTime(percent){

 let total=12*60 + percent*12*60;

 let h=Math.floor(total/60);
 let m=Math.floor((total%60)/30)*30;

 selectedTime=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;

 timeLabel.innerText=selectedTime;

 render();
}

function setPointer(x){

 let rect=track.getBoundingClientRect();
 let pos=x-rect.left;

 if(pos<0)pos=0;
 if(pos>rect.width)pos=rect.width;

 let percent=pos/rect.width;

 pointer.style.left=(percent*100)+"%";
 fill.style.width=(percent*100)+"%";

 updateTime(percent);
}

pointer.onmousedown=()=>{
 document.onmousemove=(e)=>setPointer(e.clientX);
 document.onmouseup=()=>document.onmousemove=null;
};

track.onclick=(e)=>setPointer(e.clientX);

/* ================= FORM ================= */
function openForm(){
 formModal.classList.add("active");
}
function closeForm(){
 formModal.classList.remove("active");
}

/* ================= PHONE ================= */
phone.oninput=()=>{
 let v=phone.value.replace(/\D/g,"").substring(0,11);
 if(!v.startsWith("7")) v="7"+v;

 let f="+7";
 if(v.length>1) f+=" "+v.slice(1,4);
 if(v.length>4) f+=" "+v.slice(4,7);
 if(v.length>7) f+=" "+v.slice(7,9);
 if(v.length>9) f+=" "+v.slice(9,11);

 phone.value=f;
};

/* ================= LIMIT ================= */
guests.oninput=()=>{
 if(guests.value>8) guests.value=8;
 if(guests.value<1) guests.value=1;
};

/* ================= BOOK ================= */
function book(){
 alert(`Стол ${selectedTable}\nВремя ${selectedTime}`);
}

/* ================= INIT ================= */
setPointer(track.getBoundingClientRect().left);
render();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<title>Dubrovka Lounge</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
color:#fff;
overflow-x:hidden;
}

/* 🎥 ВИДЕО ФОН */
.video-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(180deg,#000000dd,#000000);
z-index:-1;
}

/* 💎 КОНТЕЙНЕР */
.container{
padding:15px;
max-width:500px;
margin:auto;
animation:fade 0.5s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(15px);}
to{opacity:1;}
}

/* 🧿 ЛОГО */
.logo{
width:150px;
margin:10px auto;
display:block;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{filter:drop-shadow(0 0 5px #ff2a2a);}
to{filter:drop-shadow(0 0 20px #ff0000);}
}

.title{
text-align:center;
font-size:20px;
color:#ff2a2a;
}

.subtitle{
text-align:center;
color:#aaa;
margin-bottom:15px;
}

/* GLASS */
.card{
background:rgba(20,20,20,0.6);
backdrop-filter:blur(12px);
border-radius:20px;
padding:15px;
box-shadow:0 0 25px rgba(255,0,0,0.2);
}

/* СТОЛЫ */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.table{
padding:14px;
border-radius:12px;
background:#1a1a1a;
text-align:center;
cursor:pointer;
transition:0.25s;
}

.table:hover{
transform:scale(1.05);
}

.active{
background:#ff2a2a;
box-shadow:0 0 15px #ff2a2a;
}

.vip{
grid-column:1/-1;
background:linear-gradient(90deg,#ff2a2a,#8b0000);
}

/* ОПИСАНИЕ */
.info{
margin:12px 0;
font-size:14px;
color:#ddd;
line-height:1.5;
min-height:40px;
}

/* INPUT */
input,select{
width:100%;
padding:12px;
border-radius:12px;
border:none;
margin-top:8px;
background:#111;
color:#fff;
}

/* КНОПКА */
button{
width:100%;
padding:14px;
margin-top:12px;
background:linear-gradient(90deg,#ff2a2a,#b80000);
border:none;
border-radius:12px;
font-size:16px;
box-shadow:0 0 15px #ff2a2a80;
}

/* RULES */
.rules{
margin-top:10px;
font-size:12px;
color:#777;
}

/* FOOTER */
.footer{
margin-top:15px;
font-size:12px;
color:#aaa;
text-align:center;
}
</style>
</head>

<body>

<!-- 🎥 ВИДЕО ФОН -->
<video autoplay muted loop playsinline class="video-bg">
<source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

<!-- 🧿 ЛОГО -->
<img src="logo.png" class="logo">

<div class="title">Дубровка Lounge</div>
<div class="subtitle">Выберите стол</div>

<div class="card">

<div class="grid">
<div class="table" onclick="selectTable('1')">1</div>
<div class="table" onclick="selectTable('2')">2</div>
<div class="table" onclick="selectTable('3')">3</div>
<div class="table" onclick="selectTable('4')">4</div>
<div class="table" onclick="selectTable('5')">5</div>
<div class="table" onclick="selectTable('6')">6</div>
<div class="table vip" onclick="selectTable('VIP')">VIP</div>
</div>

<div id="info" class="info"></div>

<input type="date" id="date">
<select id="time"></select>

<input id="name" placeholder="Имя">
<input id="phone" placeholder="Телефон">

<button onclick="book()">Забронировать</button>

</div>

<div class="rules">
• От 5 гостей — 2 кальяна обязательны<br>
• VIP — депозит (уточнять у администратора)
</div>

<div class="footer">
📍 Ермакова 11<br>
<a href="https://2gis.ru" target="_blank" style="color:#ff2a2a;">Открыть в 2GIS</a><br>
🕐 Вс–Чт: 13:00–23:00<br>
🕐 Пт–Сб: 13:00–00:00
</div>

</div>

<script>
const API="https://dubrovka-webapp-9.onrender.com";
const tg=window.Telegram.WebApp;
tg.expand();

let selectedTable=null;

const tableInfo={
"1":"🛋 Приватная зона • до 7 гостей<br>🎮 PlayStation • 🔒 Шторки • 💨 Кальяны",
"2":"🛋 Приватная зона • до 5 гостей<br>🎮 PlayStation • 🔒 Шторки",
"3":"🛋 Приватная зона • до 5 гостей<br>🎮 PlayStation • 🔒 Шторки",
"4":"🛋 Приватная зона • до 5 гостей<br>🎮 PlayStation • 🔒 Шторки",
"5":"🍷 Открытая зона • до 5 гостей<br>💨 Кальяны • 🎶 Атмосфера",
"6":"👥 Компактный стол • 2–3 гостя<br>💨 Кальяны",
"VIP":"💎 VIP комната<br>🔒 Полная приватность • 🎮 PlayStation • 💼 Депозит"
};

function selectTable(t){
selectedTable=t;
document.querySelectorAll(".table").forEach(el=>el.classList.remove("active"));
event.target.classList.add("active");
info.innerHTML=tableInfo[t];
loadTimes();
}

function getTimes(){
let d=new Date(date.value);
let day=d.getDay();
let end=(day===5||day===6)?24:23;
let arr=[];
for(let h=13;h<=end;h++){
arr.push((h+"").padStart(2,"0")+":00");
}
return arr;
}

async function loadTimes(){
if(!selectedTable||!date.value)return;

let res=await fetch(`${API}/busy_times?date=${date.value}&table=${selectedTable}`);
let busy=await res.json();

let html="";
getTimes().forEach(t=>{
if(busy.includes(t)){
html+=`<option disabled>${t} (занято)</option>`;
}else{
html+=`<option>${t}</option>`;
}
});

time.innerHTML=html;
}

date.onchange=loadTimes;

async function book(){

if(!selectedTable){
alert("Выберите стол");
return;
}

if(selectedTable==="VIP"){
alert("VIP через администратора");
return;
}

let data={
name:name.value,
phone:phone.value,
guests:1,
table:selectedTable,
date:date.value,
time:time.value
};

let res=await fetch(API+"/booking",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

let r=await res.json();

if(r.error==="busy"){
alert("Стол занят");
return;
}

alert("Бронь создана");

tg.sendData(JSON.stringify(data));

loadTimes();
}

setInterval(loadTimes,4000);
</script>

</body>
</html>

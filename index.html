<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dubrovka — Booking PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  background:#2b1208;color:#fff;min-height:100vh;
}

/* BG */
.video-bg{
  position:fixed;inset:0;width:100%;height:100%;object-fit:cover;
  opacity:.35;z-index:-1;
}

/* TOP */
.top{
  background:#eee;color:#111;padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
}

/* TIMELINE */
.timeline{
  background:#3b1509;padding:14px 12px 10px;
}
.slider{
  display:flex;gap:8px;overflow-x:auto;
}
.time-chip{
  min-width:80px;text-align:center;padding:10px;border-radius:10px;
  background:#0003;border:1px solid #ffffff20;cursor:pointer;
}
.time-chip.active{background:#fff;color:#000}

/* GRID */
.grid{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:12px;padding:12px
}
@media(min-width:768px){.grid{grid-template-columns:repeat(3,1fr)}}

/* CARD */
.card{
  position:relative;border-radius:16px;overflow:hidden;
}
.card img{width:100%;height:170px;object-fit:cover}
.overlay{position:absolute;inset:0;background:linear-gradient(to top,#000c,transparent)}
.badge{
  position:absolute;top:10px;left:10px;padding:6px 10px;border-radius:8px;
  font-size:12px;background:#000a
}
.green{background:#1f7a1f}
.red{background:#a02020}
.yellow{background:#ffc107;color:#000}
.card-info{
  position:absolute;bottom:0;left:0;right:0;padding:10px;
}

/* MODALS */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.9);
  opacity:0;pointer-events:none;
  transition:.3s;
}
.modal.active{opacity:1;pointer-events:auto}

/* BOX */
.box{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-40%) scale(.95);
  opacity:0;transition:.3s;
  width:380px;max-width:95vw;background:#111;border-radius:14px;overflow:hidden;
}
.modal.active .box{
  transform:translate(-50%,-50%) scale(1);
  opacity:1;
}

.header{
  display:flex;justify-content:space-between;padding:14px;background:#1a1a1a;
}

/* TIME GRID */
.time-grid{
  display:flex;flex-wrap:wrap;gap:8px;padding:12px;
}
.slot{
  width:70px;padding:12px;text-align:center;border-radius:8px;
  border:1px solid #555;background:#1c1c1c;cursor:pointer;
  transition:.2s;
}
.slot:hover{transform:scale(1.05)}
.slot.active{background:#fff;color:#000}
.slot.busy{opacity:.3;pointer-events:none}

/* BUTTON */
.btn{
  margin:12px;padding:16px;border-radius:12px;
  text-align:center;font-weight:600;cursor:pointer;
  background:#fff;color:#000;transition:.25s;
}
.btn.disabled{
  background:#555;color:#aaa;cursor:not-allowed;
}
.btn:hover:not(.disabled){transform:translateY(-2px)}

.warn{
  display:none;margin:10px;padding:10px;background:#ffc10722;color:#ffc107
}

/* FORM */
input{
  width:calc(100% - 24px);margin:10px 12px;padding:14px;
  border-radius:10px;border:1px solid #444;background:#1c1c1c;color:#fff
}
</style>
</head>

<body>

<video class="video-bg" autoplay muted loop>
  <source src="bg.mp4">
</video>

<div class="top">
  <b>Dubrovka</b>
  <div>+7‒913‒432‒01‒01</div>
</div>

<div class="timeline">
  <div id="slider" class="slider"></div>
</div>

<div id="grid" class="grid"></div>

<!-- TABLE -->
<div id="tableModal" class="modal">
  <div class="box">
    <div class="header">
      <div>СТОЛ №<span id="t"></span></div>
      <div onclick="closeTable()">✕</div>
    </div>
    <img id="img" style="width:100%;height:200px;object-fit:cover">
    <div class="btn" onclick="openTime()">Забронировать →</div>
  </div>
</div>

<!-- TIME -->
<div id="timeModal" class="modal">
  <div class="box">
    <div class="header">
      <div>Дата и время</div>
      <div onclick="closeTime()">✕</div>
    </div>

    <div style="padding:12px">
      <div>С: <b id="from">--</b></div>
      <div>До: <b id="to">--</b></div>
    </div>

    <div id="warn" class="warn"></div>

    <div id="timeGrid" class="time-grid"></div>

    <div id="continueBtn" class="btn disabled">Продолжить →</div>
  </div>
</div>

<!-- FORM -->
<div id="formModal" class="modal">
  <div class="box">
    <div class="header">
      <div>Бронирование</div>
      <div onclick="closeForm()">✕</div>
    </div>

    <input id="name" placeholder="Имя">
    <input id="phone" placeholder="+7XXXXXXXXXX">
    <input id="guests" value="2">

    <div class="btn" onclick="book()">Подтвердить</div>
  </div>
</div>

<script>
const API="https://dubrovka-webapp-production.up.railway.app";

const TABLES=[
 {id:"1",cap:7,img:"https://images.unsplash.com/photo-1552566626-52f8b828add9"},
 {id:"2",cap:5,img:"https://images.unsplash.com/photo-1555396273-367ea4eb4db5"},
 {id:"3",cap:5,img:"https://images.unsplash.com/photo-1565299624946-b28f40a0ae38"},
 {id:"4",cap:5,img:"https://images.unsplash.com/photo-1541542684-4a0f6a1d1a66"},
 {id:"5",cap:5,img:"https://images.unsplash.com/photo-1559339352-11d035aa65de"},
 {id:"6",cap:3,img:"https://images.unsplash.com/photo-1559339352-11d035aa65de"},
 {id:"vip",cap:"VIP",img:"https://images.unsplash.com/photo-1517248135467-4c7edcad34c4"}
];

let selectedTable=null;
let selectedTime=null;
let busyMap={};

/* timeline */
const slider=document.getElementById("slider");
for(let h=12;h<24;h++){
  ["00","30"].forEach(m=>{
    let t=`${h}:${m}`;
    let el=document.createElement("div");
    el.className="time-chip";
    el.innerText=t;
    el.onclick=()=>{
      selectedTime=t;
      document.querySelectorAll(".time-chip").forEach(x=>x.classList.remove("active"));
      el.classList.add("active");
      render();
    }
    slider.appendChild(el);
  });
}

/* render */
function render(){
  let g=document.getElementById("grid");
  g.innerHTML="";
  TABLES.forEach(t=>{
    let el=document.createElement("div");
    el.className="card";
    el.innerHTML=`
      <img src="${t.img}">
      <div class="overlay"></div>
      <div class="card-info">№${t.id} 👥 ${t.cap}</div>
    `;
    el.onclick=()=>openTable(t);
    g.appendChild(el);
  });
}

/* modals */
function openTable(t){
  selectedTable=t.id;
  document.getElementById("t").innerText=t.id;
  document.getElementById("img").src=t.img;
  tableModal.classList.add("active");
}
function closeTable(){tableModal.classList.remove("active")}

function openTime(){
  tableModal.classList.remove("active");
  timeModal.classList.add("active");
  renderTimeGrid();
}
function closeTime(){timeModal.classList.remove("active")}

/* time select */
function renderTimeGrid(){
  let g=document.getElementById("timeGrid");
  g.innerHTML="";
  for(let h=12;h<24;h++){
    ["00","30"].forEach(m=>{
      let t=`${h}:${m}`;
      let el=document.createElement("div");
      el.className="slot";
      el.innerText=t;

      el.onclick=()=>{
        selectedTime=t;

        document.querySelectorAll(".slot").forEach(x=>x.classList.remove("active"));
        el.classList.add("active");

        document.getElementById("from").innerText=t;
        document.getElementById("to").innerText=(h+1)+":"+m;

        document.getElementById("continueBtn").classList.remove("disabled");
      }

      g.appendChild(el);
    });
  }
}

/* continue */
continueBtn.onclick=()=>{
  if(!selectedTime) return;
  timeModal.classList.remove("active");
  formModal.classList.add("active");
}

/* form */
function closeForm(){formModal.classList.remove("active")}

async function book(){
  alert("Бронь отправлена");
  formModal.classList.remove("active");
}

/* init */
render();
</script>

</body>
</html>

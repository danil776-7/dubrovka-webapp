<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dubrovka Lounge</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{margin:0;font-family:Arial;background:#000;color:#e7d9c0;}
.container{max-width:420px;margin:auto;padding:20px;}
.card{background:#111;padding:20px;border-radius:15px;}

.tables{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.table{
padding:15px;
background:#222;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.table.selected{background:#d6b36a;color:black;}

.desc{
background:#1a1a1a;
padding:10px;
border-radius:10px;
margin:10px 0;
white-space:pre-line;
}

input, select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:14px;
background:#d6b36a;
border:none;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>🍽 Dubrovka Lounge</h2>

<div class="tables">
<div class="table" data-table="1">1</div>
<div class="table" data-table="2">2</div>
<div class="table" data-table="3">3</div>
<div class="table" data-table="4">4</div>
<div class="table" data-table="5">5</div>
<div class="table" data-table="6">6</div>
<div class="table" data-table="VIP">VIP</div>
</div>

<div id="tableInfo" class="desc">Выберите стол</div>

<input id="date" type="date">

<select id="time">
<option value="">Выберите время</option>
</select>

<input id="guests" placeholder="Количество гостей">
<input id="name" placeholder="Имя">
<input id="phone" placeholder="+7999">

<button id="bookBtn">Забронировать</button>

</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const API = "https://dubrovka-webapp-9.onrender.com";

const tg = window.Telegram.WebApp;
tg.expand();

const phoneInput = document.getElementById("phone");
const nameInput = document.getElementById("name");
const guestsInput = document.getElementById("guests");
const dateInput = document.getElementById("date");
const timeSelect = document.getElementById("time");
const tableInfo = document.getElementById("tableInfo");
const bookBtn = document.getElementById("bookBtn");

let selectedTable = null;

const tables = {
"1": "Приватная зона\nДо 7 гостей",
"2": "Приватная зона\nДо 5 гостей",
"3": "Приватная зона\nДо 5 гостей",
"4": "Приватная зона\nДо 5 гостей",
"5": "Открытая зона\nДо 5 гостей",
"6": "Компактный стол",
"VIP": "VIP комната"
};

dateInput.min = new Date().toISOString().split("T")[0];

document.querySelectorAll(".table").forEach(el=>{
el.onclick=()=>{
document.querySelectorAll(".table").forEach(t=>t.classList.remove("selected"));
el.classList.add("selected");

selectedTable = el.dataset.table;
tableInfo.innerText = tables[selectedTable];

loadTimes();
};
});

function generateTimes(date){
let times = [];
let day = new Date(date).getDay();

let end = 23;
if(day === 5 || day === 6) end = 24;

for(let h=13;h<end;h++){
times.push(`${String(h).padStart(2,'0')}:00`);
times.push(`${String(h).padStart(2,'0')}:30`);
}

return times;
}

async function loadTimes(){

if(!dateInput.value || !selectedTable) return;

console.log("Загрузка времени...");

try{

let res = await fetch(`${API}/busy_times?date=${dateInput.value}&table=${selectedTable}`);
let busy = await res.json();

if(!Array.isArray(busy)) busy = [];

console.log("busy:", busy);

let allTimes = generateTimes(dateInput.value);

timeSelect.innerHTML = '<option value="">Выберите время</option>';

let now = new Date();
let today = new Date().toISOString().split("T")[0];

allTimes.forEach(t=>{
let [h,m]=t.split(":");

let slot=new Date(dateInput.value);
slot.setHours(h,m);

if(dateInput.value === today && slot < now) return;

if(!busy.includes(t)){
let option=document.createElement("option");
option.value=t;
option.innerText=t;
timeSelect.appendChild(option);
}
});

}catch(e){
console.error("Ошибка:", e);
}
}

dateInput.addEventListener("change", loadTimes);

phoneInput.addEventListener("input",()=>{
let v=phoneInput.value.replace(/\D/g,"");
if(!v.startsWith("7")) v="7"+v;
v=v.slice(0,11);
phoneInput.value="+"+v;
});

bookBtn.onclick = async ()=>{

if(!selectedTable) return alert("Выберите стол");
if(selectedTable==="VIP") return alert("VIP через администратора");
if(!dateInput.value) return alert("Выберите дату");
if(!timeSelect.value) return alert("Выберите время");

let data={
name:nameInput.value,
phone:phoneInput.value,
guests:guestsInput.value,
table:selectedTable,
date:dateInput.value,
time:timeSelect.value,
user_id: tg.initDataUnsafe?.user?.id||0
};

let res = await fetch(API+"/booking",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

let result = await res.json();

if(result.error){
alert("❌ Уже занято");
return;
}

tg.sendData(JSON.stringify(data));

alert("✅ Бронь отправлена");
};

});
</script>

</body>
</html>

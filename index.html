<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka Lounge</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}

video.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
    opacity: 0.25;
}

.container {
    padding: 20px;
    max-width: 500px;
    margin: auto;
}

.tables {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.table {
    padding: 20px;
    text-align: center;
    background: #1a1a1a;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
    position: relative;
}

.table.active {
    background: gold;
    color: black;
}

.table.busy {
    background: #5a0000;
}

.table small {
    display: block;
    font-size: 12px;
    margin-top: 5px;
    color: #ccc;
}

.vip {
    grid-column: span 2;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border-radius: 12px;
    border: none;
    background: gold;
    font-size: 16px;
}
</style>
</head>

<body>

<video class="bg" autoplay muted loop>
    <source src="bg.mp4" type="video/mp4">
</video>

<div class="container">

<h2>🍽 Dubrovka Lounge</h2>

<div class="tables" id="tables">
    <div class="table" data-table="1">1<small></small></div>
    <div class="table" data-table="2">2<small></small></div>
    <div class="table" data-table="3">3<small></small></div>
    <div class="table" data-table="4">4<small></small></div>
    <div class="table" data-table="5">5<small></small></div>
    <div class="table" data-table="6">6<small></small></div>
    <div class="table vip" data-table="VIP">VIP<small></small></div>
</div>

<input id="date" type="date">
<select id="time"></select>
<input id="guests" type="number" placeholder="Количество гостей">
<input id="name" placeholder="Имя">
<input id="phone" placeholder="+7999">

<button onclick="book()">Забронировать</button>

</div>

<script>
const API = "https://dubrovka-webapp-9.onrender.com";

let selectedTable = null;

// =================
// ВЫБОР СТОЛА
// =================
document.querySelectorAll(".table").forEach(el => {
    el.onclick = () => {
        document.querySelectorAll(".table").forEach(t => t.classList.remove("active"));
        el.classList.add("active");
        selectedTable = el.dataset.table;
    };
});

// =================
// ДАТА
// =================
const dateInput = document.getElementById("date");

function today() {
    const d = new Date();
    return d.toISOString().split("T")[0];
}

dateInput.min = today();
dateInput.value = today();

// =================
// ВРЕМЯ
// =================
const timeSelect = document.getElementById("time");

function generateTimes() {
    timeSelect.innerHTML = "";

    for (let h = 13; h <= 23; h++) {
        ["00","30"].forEach(m=>{
            const t = `${String(h).padStart(2,"0")}:${m}`;
            const opt = document.createElement("option");
            opt.value = t;
            opt.textContent = t;
            timeSelect.appendChild(opt);
        });
    }
}
generateTimes();

// =================
// ЗАГРУЗКА ЗАНЯТОСТИ
// =================
async function loadBusyAll() {

    const date = dateInput.value;

    const res = await fetch(`${API}/bookings_by_date?date=${date}`);
    const bookings = await res.json();

    // очистка
    document.querySelectorAll(".table").forEach(el=>{
        el.classList.remove("busy");
        el.querySelector("small").textContent = "";
    });

    // группируем по столам
    const grouped = {};

    bookings.forEach(b=>{
        if (!grouped[b.table]) grouped[b.table] = [];
        grouped[b.table].push(b.time);
    });

    // отображаем
    for (let table in grouped) {
        const el = document.querySelector(`.table[data-table="${table}"]`);
        if (!el) continue;

        el.classList.add("busy");

        const times = grouped[table].join(",


);
        el.querySelector("small").textContent = "Занято: " + times;
    }
}

// =================
// БРОНИРОВАНИЕ
// =================
async function book() {

    const data = {
        name: document.getElementById("name").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        guests: document.getElementById("guests").value,
        table: selectedTable,
        date: dateInput.value,
        time: document.getElementById("time").value
    };

    if (!data.name) return alert("Введите имя");
    if (!data.phone) return alert("Введите телефон");
    if (!data.table) return alert("Выберите стол");

    const res = await fetch(`${API}/booking`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
    });

    const result = await res.json();

    if (result.error === "busy") {
        alert("Стол занят на это время");
        return;
    }

    if (result.error === "guests_limit") {
        alert("Слишком много гостей");
        return;
    }

    alert("Бронь создана");

    loadBusyAll();
}

// =================
// АВТООБНОВЛЕНИЕ
// =================
setInterval(loadBusyAll, 5000);

// загрузка при старте
loadBusyAll();

dateInput.addEventListener("change", loadBusyAll);

</script>

</body>
</html>"

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka Lounge</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,Arial;
  background:#0a0a0f;
  color:#fff;
}

/* VIDEO */
.video-bg{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  opacity:0.4;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}

/* LOGO */
.logo{
  text-align:center;
  margin-bottom:20px;
}

.logo h1{
  color:#d4af37;
  font-size:28px;
}

.logo p{
  font-size:12px;
  color:#d4af37;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

@media(min-width:768px){
  .grid{grid-template-columns:repeat(3,1fr);}
}

/* CARD */
.card{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  background:#111;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#000b,transparent);
}

/* STATUS */
.status{
  position:absolute;
  top:10px;
  left:10px;
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
}

.green{background:#1f7a1f}
.red{background:#a02020}
.yellow{background:#ffc107;color:#000}

.dot{
  position:absolute;
  top:10px;
  right:10px;
  width:8px;height:8px;border-radius:50%;
}

.dot.green{background:#4cff4c}
.dot.red{background:#ff4c4c}
.dot.yellow{background:#ffc107}

/* INFO */
.info{
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  font-size:14px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  z-index:9999;
}

.modal.active{display:block}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111;
}

/* GALLERY */
.gallery{
  display:flex;
  overflow:hidden;
}

.gallery img{
  width:100%;
  height:240px;
  object-fit:cover;
}

/* TIME */
.time-grid{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding:15px;
}

.slot{
  padding:10px;
  border-radius:10px;
  border:1px solid #444;
  cursor:pointer;
  min-width:65px;
  text-align:center;
}

.slot.active{background:#d4af37;color:#000}
.slot.busy{opacity:0.3;pointer-events:none;text-decoration:line-through}
.slot.warning{background:#ffc107;color:#000}

/* WARNING */
.warning{
  display:none;
  margin:10px;
  padding:10px;
  background:#ffc10722;
  border-left:3px solid #ffc107;
}

/* INPUT */
input{
  width:90%;
  margin:10px;
  padding:12px;
  border-radius:10px;
  border:none;
}

/* BTN */
.btn{
  margin:15px;
  padding:15px;
  background:#d4af37;
  color:#000;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}
</style>
</head>

<body>

<video class="video-bg" autoplay muted loop>
  <source src="bg.mp4">
</video>

<div class="container">

<div class="logo">
  <h1>DUBROVKA</h1>
  <p>LOUNGE & BAR</p>
</div>

<div id="grid" class="grid"></div>

</div>

<!-- TABLE -->
<div id="tableModal" class="modal">
<div class="header">
  <div onclick="closeTable()">←</div>
  <div id="tableTitle"></div>
  <div onclick="closeTable()">✕</div>
</div>

<div class="gallery" id="gallery"></div>

<div class="btn" onclick="openTime()">Забронировать</div>
</div>

<!-- TIME -->
<div id="timeModal" class="modal">
<div class="header">
  <div onclick="backToTable()">←</div>
  <div>Дата и время</div>
  <div onclick="closeTime()">✕</div>
</div>

<div id="warning" class="warning"></div>
<div id="timeGrid" class="time-grid"></div>
</div>

<!-- FORM -->
<div id="formModal" class="modal">
<div class="header">
  <div onclick="backToTime()">←</div>
  <div>Бронирование</div>
  <div onclick="closeForm()">✕</div>
</div>

<input id="name" placeholder="Имя">
<input id="phone" placeholder="+7XXXXXXXXXX">
<input id="guests" type="number" value="2">

<div class="btn" onclick="book()">Подтвердить</div>
</div>

<script>
const API="https://dubrovka-webapp-production.up.railway.app";

/* TABLES */
const TABLES=[
 {id:"1",cap:7,img:["table1.jpg"]},
 {id:"2",cap:5,img:["table2.jpg"]},
 {id:"3",cap:5,img:["table3.jpg"]},
 {id:"4",cap:5,img:["table4.jpg"]},
 {id:"5",cap:5,img:["table5.jpg"]},
 {id:"6",cap:3,img:["table6.jpg"]},
 {id:"vip",cap:"VIP",img:["vip.jpg"]}
];

let selectedTable=null;
let selectedTime=null;
let busy={};

/* UTILS */
const toMin=t=>{let[a,b]=t.split(":");return a*60+ +b}
const minToTime=m=>`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`
const duration=g=>g<=2?90:g<=4?120:240;

/* STATUS */
function getStatus(id){
 if(!selectedTime)return {text:"Выберите время",cls:""};

 let times=busy[id]||[];
 let start=toMin(selectedTime);
 let end=start+duration(2);

 for(let bt of times){
  let s=toMin(bt),e=s+120;
  if(start<e && end>s){
    return {text:"Занят",cls:"red"};
  }
 }

 let next=null;
 for(let bt of times){
  let s=toMin(bt);
  if(s>start && (!next||s<toMin(next))) next=bt;
 }

 if(next){
  let gap=toMin(next)-end;
  if(gap<90) return {text:"⚠ до "+next,cls:"yellow"};
  return {text:"Свободно до "+next,cls:"green"};
 }

 return {text:"Свободно",cls:"green"};
}

/* LOAD */
async function load(){
 for(let t of TABLES){
  try{
   let r=await fetch(`${API}/busy_times?table=${t.id}`);
   busy[t.id]=await r.json();
  }catch{busy[t.id]=[]}
 }
 render();
}

/* GRID */
function render(){
 grid.innerHTML="";
 TABLES.forEach(t=>{
  let st=getStatus(t.id);
  let el=document.createElement("div");
  el.className="card";
  el.innerHTML=`
    <img src="${t.img[0]}">
    <div class="overlay"></div>
    <div class="status ${st.cls}">${st.text}</div>
    <div class="dot ${st.cls}"></div>
    <div class="info">Стол ${t.id} 👥 ${t.cap}</div>
  `;
  el.onclick=()=>openTable(t);
  grid.appendChild(el);
 });
}

/* TABLE */
function openTable(t){
 selectedTable=t.id;
 tableModal.classList.add("active");
 tableTitle.innerText="Стол "+t.id;
 gallery.innerHTML=t.img.map(i=>`<img src="${i}">`).join("");
}

function closeTable(){tableModal.classList.remove("active")}

/* TIME */
async function openTime(){
 tableModal.classList.remove("active");
 timeModal.classList.add("active");

 renderTime();
}

function renderTime(){
 timeGrid.innerHTML="";
 warning.style.display="none";

 let times=[];
 for(let h=12;h<24;h++){
  times.push(`${String(h).padStart(2,'0')}:00`);
  times.push(`${String(h).padStart(2,'0')}:30`);
 }

 let busyTimes=busy[selectedTable]||[];

 times.forEach(t=>{
  let el=document.createElement("div");
  el.className="slot";
  el.innerText=t;

  if(busyTimes.includes(t)) el.classList.add("busy");

  el.onclick=()=>{
    selectedTime=t;

    document.querySelectorAll(".slot").forEach(x=>x.classList.remove("active","warning"));
    el.classList.add("active");

    let st=getStatus(selectedTable);

    if(st.cls==="yellow"){
      warning.style.display="block";
      warning.innerText="Освободите до "+t;
      el.classList.add("warning");
    }

    setTimeout(()=>{
      timeModal.classList.remove("active");
      formModal.classList.add("active");
    },200);
  };

  timeGrid.appendChild(el);
 });
}

function closeTime(){timeModal.classList.remove("active")}
function backToTable(){closeTime();tableModal.classList.add("active")}

/* FORM */
function backToTime(){formModal.classList.remove("active");timeModal.classList.add("active")}
function closeForm(){formModal.classList.remove("active")}

/* BOOK */
async function book(){
 let data={
  table:selectedTable,
  time:selectedTime,
  date:new Date().toISOString().split("T")[0],
  name:name.value,
  phone:phone.value,
  guests:parseInt(guests.value)
 };

 await fetch(API+"/booking",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify(data)
 });

 alert("Бронь создана");
 location.reload();
}

/* AUTO REFRESH */
setInterval(load,10000);

/* INIT */
load();
</script>

</body>
</html>

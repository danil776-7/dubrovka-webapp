<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#2b1208;color:#fff;font-family:sans-serif}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;padding:12px
}
.card{
  border-radius:16px;overflow:hidden;cursor:pointer;
  position:relative
}
.card img{width:100%;height:150px;object-fit:cover}
.card-info{position:absolute;bottom:0;padding:10px}

/* MODAL */
.modal{
  position:fixed;inset:0;background:#000c;
  opacity:0;pointer-events:none;transition:.3s
}
.modal.active{opacity:1;pointer-events:auto}

.box{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-40%) scale(.95);
  opacity:0;background:#111;border-radius:14px;width:380px;
  transition:.3s
}
.modal.active .box{
  transform:translate(-50%,-50%) scale(1);
  opacity:1
}

.header{
  padding:14px;background:#1a1a1a;
  display:flex;justify-content:space-between
}

/* TIME */
.time-grid{
  display:flex;flex-wrap:wrap;gap:8px;padding:12px
}
.slot{
  width:70px;padding:12px;text-align:center;
  border-radius:8px;border:1px solid #555;
  background:#1c1c1c;cursor:pointer;
  transition:.2s
}
.slot:hover{transform:scale(1.05)}
.slot.active{background:#fff;color:#000}
.slot.range{background:#444}
.slot.busy{opacity:.35}

/* BTN */
.btn{
  margin:12px;padding:16px;border-radius:12px;
  text-align:center;background:#fff;color:#000;
  font-weight:600;cursor:pointer
}
.btn.disabled{
  background:#555;color:#aaa;cursor:not-allowed
}

/* FORM */
input{
  width:calc(100% - 24px);margin:10px 12px;padding:14px;
  border-radius:10px;border:1px solid #444;
  background:#1c1c1c;color:#fff
}
</style>
</head>

<body>

<div id="grid" class="grid"></div>

<!-- TABLE -->
<div id="tableModal" class="modal">
  <div class="box">
    <div class="header">
      <div>СТОЛ №<span id="tableId"></span></div>
      <div onclick="closeTable()">✕</div>
    </div>
    <img id="tableImg" style="width:100%;height:200px;object-fit:cover">
    <div class="btn" onclick="openTime()">Забронировать</div>
  </div>
</div>

<!-- TIME -->
<div id="timeModal" class="modal">
  <div class="box">

    <div class="header">
      <div>Дата и время</div>
      <div onclick="closeTime()">✕</div>
    </div>

    <input type="date" id="dateInput">

    <div style="padding:12px">
      С: <b id="from">--</b><br>
      До: <b id="to">--</b>
    </div>

    <div id="timeGrid" class="time-grid"></div>

    <div id="continueBtn" class="btn disabled">Продолжить</div>
  </div>
</div>

<!-- FORM -->
<div id="formModal" class="modal">
  <div class="box">
    <div class="header">
      <div>Бронирование</div>
      <div onclick="closeForm()">✕</div>
    </div>

    <input id="name" placeholder="Имя">
    <input id="phone" placeholder="+7 XXX XXX XX XX" maxlength="18">
    <input id="guests" value="2">

    <div class="btn" onclick="book()">Подтвердить</div>
  </div>
</div>

<script>
const API="https://dubrovka-webapp-production.up.railway.app";

/* TABLES */
const TABLES=[
 {id:"1",img:"https://images.unsplash.com/photo-1552566626-52f8b828add9"},
 {id:"2",img:"https://images.unsplash.com/photo-1555396273-367ea4eb4db5"},
 {id:"3",img:"https://images.unsplash.com/photo-1565299624946-b28f40a0ae38"},
 {id:"4",img:"https://images.unsplash.com/photo-1541542684-4a0f6a1d1a66"},
 {id:"5",img:"https://images.unsplash.com/photo-1559339352-11d035aa65de"},
 {id:"6",img:"https://images.unsplash.com/photo-1559339352-11d035aa65de"}
];

let selectedTable=null;
let selectedFrom=null;
let selectedTo=null;
let busyMap={};

/* FAST LOAD */
async function loadBusy(){
  let res=await Promise.all(
    TABLES.map(t=>fetch(`${API}/busy_times?table=${t.id}`).then(r=>r.json()).catch(()=>[]))
  );
  TABLES.forEach((t,i)=>busyMap[t.id]=res[i]);
}

/* UTILS */
function toMin(t){
  let [h,m]=t.split(":").map(Number);
  return h*60+m;
}

/* RENDER */
function render(){
  grid.innerHTML="";
  TABLES.forEach(t=>{
    let el=document.createElement("div");
    el.className="card";
    el.innerHTML=`<img src="${t.img}"><div class="card-info">№${t.id}</div>`;
    el.onclick=()=>openTable(t);
    grid.appendChild(el);
  });
}

/* TABLE */
function openTable(t){
  selectedTable=t.id;
  tableId.innerText=t.id;
  tableImg.src=t.img;
  tableModal.classList.add("active");
}
function closeTable(){tableModal.classList.remove("active")}

/* TIME */
function openTime(){
  tableModal.classList.remove("active");
  timeModal.classList.add("active");

  selectedFrom=null;
  selectedTo=null;

  from.innerText="--";
  to.innerText="--";

  continueBtn.classList.add("disabled");

  dateInput.value=new Date().toISOString().split("T")[0];

  renderTimeGrid();
}
function closeTime(){timeModal.classList.remove("active")}

/* TIME GRID FIXED */
function renderTimeGrid(){
  timeGrid.innerHTML="";

  for(let h=12;h<24;h++){
    ["00","30"].forEach(m=>{
      let t=`${String(h).padStart(2,'0')}:${m}`;
      let el=document.createElement("div");
      el.className="slot";
      el.innerText=t;

      // busy только визуально
      if(busyMap[selectedTable]?.includes(t)){
        el.classList.add("busy");
      }

      el.onclick=()=>{

        // НОВЫЙ ВЫБОР
        if(!selectedFrom){
          selectedFrom=t;
          from.innerText=t;
          reset();
          el.classList.add("active");
          return;
        }

        if(selectedFrom && !selectedTo){

          if(toMin(t) <= toMin(selectedFrom)){
            selectedFrom=t;
            from.innerText=t;
            reset();
            el.classList.add("active");
            return;
          }

          selectedTo=t;
          to.innerText=t;
          highlight();
          continueBtn.classList.remove("disabled");
          return;
        }

        // ПЕРЕВЫБОР
        selectedFrom=t;
        selectedTo=null;

        from.innerText=t;
        to.innerText="--";

        continueBtn.classList.add("disabled");

        reset();
        el.classList.add("active");
      };

      timeGrid.appendChild(el);
    });
  }
}

function reset(){
  document.querySelectorAll(".slot").forEach(x=>{
    x.classList.remove("active","range");
  });
}

function highlight(){
  document.querySelectorAll(".slot").forEach(el=>{
    let t=el.innerText;

    if(toMin(t)>toMin(selectedFrom) && toMin(t)<toMin(selectedTo)){
      el.classList.add("range");
    }

    if(t===selectedTo){
      el.classList.add("active");
    }
  });
}

/* CONTINUE */
continueBtn.onclick=()=>{
  if(!selectedFrom || !selectedTo) return;
  timeModal.classList.remove("active");
  formModal.classList.add("active");
}

/* FORM */
function closeForm(){formModal.classList.remove("active")}

/* PHONE FIX */
phone.oninput=()=>{
  let v=phone.value.replace(/\D/g,"").substring(0,11);
  if(!v.startsWith("7")) v="7"+v;

  let f="+7";
  if(v.length>1) f+=" "+v.substring(1,4);
  if(v.length>4) f+=" "+v.substring(4,7);
  if(v.length>7) f+=" "+v.substring(7,9);
  if(v.length>9) f+=" "+v.substring(9,11);

  phone.value=f;
}

/* BOOK */
async function book(){
  if(!selectedFrom || !selectedTo){
    alert("Выберите время");
    return;
  }

  if(phone.value.length < 16){
    alert("Введите номер");
    return;
  }

  try{
    await fetch(API+"/booking",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        table:selectedTable,
        date:dateInput.value,
        time:selectedFrom,
        end:selectedTo
      })
    });

    alert("Бронь создана");
    formModal.classList.remove("active");

  }catch{
    alert("Ошибка");
  }
}

/* INIT */
(async()=>{
  await loadBusy();
  render();
})();
</script>

</body>
</html>

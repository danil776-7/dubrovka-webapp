<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Бронь</title>
</head>

<body>

<h2>Бронирование</h2>

<select id="table">
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
</select>

<input type="date" id="date">
<select id="time"></select>

<input id="name" placeholder="Имя">
<input id="phone" placeholder="Телефон">
<input id="guests" placeholder="Гости">

<button onclick="book()">Забронировать</button>

<script>
const API = "https://dubrovka-webapp-9.onrender.com";

async function loadTimes(){
let res = await fetch(`${API}/busy_times?date=${date.value}&table=${table.value}`);
let busy = await res.json();

let times=["13:00","14:00","15:00","16:00","17:00","18:00"];
let html="";

times.forEach(t=>{
if(!busy.includes(t)){
html+=`<option>${t}</option>`;
}
});

time.innerHTML=html;
}

date.onchange=loadTimes;
table.onchange=loadTimes;

async function book(){

let res = await fetch(API+"/booking",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
name:name.value,
phone:phone.value,
guests:guests.value,
table:table.value,
date:date.value,
time:time.value
})
});

let r = await res.json();

if(r.error==="busy"){
alert("Стол занят");
return;
}

if(r.error==="guests_limit"){
alert(r.message);
return;
}

alert("Готово");
loadTimes();
}
</script>

</body>
</html>

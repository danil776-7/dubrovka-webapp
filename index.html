<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka Lounge</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,Arial;
  background:#3b1509;
  color:#fff;
}

/* TOP BAR */
.top{
  background:#eee;color:#111;
  padding:10px 14px;
  display:flex;justify-content:space-between;
}

/* TIMELINE */
.timeline{
  background:#4a1c0c;
  padding:12px;
}

.slider{
  display:flex;
  gap:8px;
  overflow-x:auto;
}

.time{
  min-width:70px;
  padding:10px;
  border-radius:10px;
  background:#0003;
  text-align:center;
  cursor:pointer;
}

.time.active{
  background:#fff;
  color:#000;
}

/* FILTERS */
.filters{
  display:flex;
  gap:8px;
  padding:10px;
}

.filter{
  padding:8px 12px;
  border-radius:20px;
  border:1px solid #fff2;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px;
  padding:12px;
}

/* CARD */
.card{
  background:#2c1d18;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.status{
  position:absolute;
  top:8px;
  left:8px;
  background:#000a;
  padding:5px 8px;
  border-radius:6px;
  font-size:12px;
}

.dot{
  position:absolute;
  top:10px;
  right:10px;
  width:8px;height:8px;border-radius:50%;
}

.green{background:#4cff4c}
.red{background:#ff4c4c}
.yellow{background:#ffc107}

.bottom{
  padding:10px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.active{display:flex}

.box{
  width:360px;
  background:#111;
  border-radius:14px;
  overflow:hidden;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#1a1a1a;
}

.btn{
  margin:15px;
  padding:14px;
  background:#eee;
  color:#000;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

/* TIME GRID */
.time-grid{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding:12px;
}

.slot{
  padding:10px;
  border-radius:8px;
  border:1px solid #444;
  cursor:pointer;
  width:70px;
  text-align:center;
}

.slot.active{background:#fff;color:#000}
.slot.busy{opacity:.3;pointer-events:none;text-decoration:line-through}
.slot.warning{background:#ffc107;color:#000}

/* INPUT */
input{
  width:90%;
  margin:10px;
  padding:12px;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<div class="top">
  <div>Dubrovka</div>
  <div>+7‒913‒432‒01‒01</div>
</div>

<div class="timeline">
  <div class="slider" id="slider"></div>
</div>

<div class="filters">
  <div class="filter">Все</div>
</div>

<div id="grid" class="grid"></div>

<!-- TABLE -->
<div id="tableModal" class="modal">
  <div class="box">
    <div class="header">
      <div>Стол <span id="title"></span></div>
      <div onclick="closeTable()">✕</div>
    </div>
    <img id="img" style="width:100%;height:200px;object-fit:cover">
    <div style="padding:12px">Нет броней</div>
    <div class="btn" onclick="openTime()">Забронировать →</div>
  </div>
</div>

<!-- TIME -->
<div id="timeModal" class="modal">
  <div class="box">
    <div class="header">
      <div>Выбор времени</div>
      <div onclick="closeTime()">✕</div>
    </div>
    <div id="timeGrid" class="time-grid"></div>
  </div>
</div>

<!-- FORM -->
<div id="formModal" class="modal">
  <div class="box">
    <div class="header">
      <div>Бронь</div>
      <div onclick="closeForm()">✕</div>
    </div>

    <input id="name" placeholder="Имя">
    <input id="phone" placeholder="+7XXXXXXXXXX">
    <input id="guests" value="2">

    <div class="btn" onclick="book()">Подтвердить</div>
  </div>
</div>

<script>
const API="https://dubrovka-webapp-production.up.railway.app";

/* TABLES */
const TABLES=[
 {id:"1",cap:7,img:"https://images.unsplash.com/photo-1552566626-52f8b828add9"},
 {id:"2",cap:5,img:"https://images.unsplash.com/photo-1550966871-3ed3cdb5ed0c"},
 {id:"3",cap:5,img:"https://images.unsplash.com/photo-1559339352-11d035aa65de"},
 {id:"4",cap:5,img:"https://images.unsplash.com/photo-1559339352-11d035aa65de"},
 {id:"5",cap:5,img:"https://images.unsplash.com/photo-1559339352-11d035aa65de"},
 {id:"6",cap:3,img:"https://images.unsplash.com/photo-1559339352-11d035aa65de"}
];

let selectedTime=null;
let selectedTable=null;
let busy={};

/* TIME SLIDER */
for(let h=12;h<24;h++){
 let t=h+":00";
 let el=document.createElement("div");
 el.className="time";
 el.innerText=t;
 el.onclick=()=>{
  selectedTime=t;
  document.querySelectorAll(".time").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
  render();
 };
 slider.appendChild(el);
}

/* LOAD */
async function load(){
 for(let t of TABLES){
  let r=await fetch(`${API}/busy_times?table=${t.id}`);
  busy[t.id]=await r.json();
 }
 render();
}

/* STATUS */
function getStatus(id){
 if(!selectedTime) return {text:"Выберите время"};

 let times=busy[id]||[];

 if(times.includes(selectedTime)){
  return {text:"Занят",cls:"red"};
 }

 return {text:"Свободно",cls:"green"};
}

/* GRID */
function render(){
 grid.innerHTML="";
 TABLES.forEach(t=>{
  let st=getStatus(t.id);

  let el=document.createElement("div");
  el.className="card";

  el.innerHTML=`
    <div style="position:relative">
      <img src="${t.img}">
      <div class="status">${st.text}</div>
      <div class="dot ${st.cls}"></div>
    </div>
    <div class="bottom">№${t.id} 👥 ${t.cap}</div>
  `;

  el.onclick=()=>openTable(t);

  grid.appendChild(el);
 });
}

/* TABLE */
function openTable(t){
 selectedTable=t.id;
 title.innerText=t.id;
 img.src=t.img;
 tableModal.classList.add("active");
}

function closeTable(){tableModal.classList.remove("active")}

/* TIME */
function openTime(){
 tableModal.classList.remove("active");
 timeModal.classList.add("active");

 timeGrid.innerHTML="";
 for(let h=12;h<24;h++){
  let t=h+":00";

  let el=document.createElement("div");
  el.className="slot";
  el.innerText=t;

  if((busy[selectedTable]||[]).includes(t)){
    el.classList.add("busy");
  }

  el.onclick=()=>{
    selectedTime=t;
    formModal.classList.add("active");
    timeModal.classList.remove("active");
  };

  timeGrid.appendChild(el);
 }
}

function closeTime(){timeModal.classList.remove("active")}

/* FORM */
function closeForm(){formModal.classList.remove("active")}

/* BOOK */
async function book(){
 await fetch(API+"/booking",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    table:selectedTable,
    time:selectedTime,
    name:name.value,
    phone:phone.value,
    guests:guests.value,
    date:new Date().toISOString().split("T")[0]
  })
 });
 alert("Бронь создана");
 location.reload();
}

load();
</script>

</body>
</html>

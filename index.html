<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka Lounge</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}

video.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.25;
    z-index: -1;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 15px;
}

.logo {
    text-align: center;
}
.logo img {
    width: 150px;
}

/* столы */
.tables {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.table {
    padding: 15px;
    background: #1e1e1e;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
}

.table.active {
    background: gold;
    color: black;
}

.table.busy {
    background: #5a0000;
}

.vip {
    grid-column: span 2;
}

#tableInfo {
    margin-top: 10px;
    font-size: 13px;
}

/* форма */
input, select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}

/* кнопка */
button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    background: gold;
    border: none;
    border-radius: 10px;
}

/* уведомление */
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: black;
    padding: 10px 20px;
    border-radius: 8px;
    display: none;
}
</style>
</head>

<body>

<video class="bg" autoplay muted loop>
    <source src="bg.mp4" type="video/mp4">
</video>

<div class="container">

<div class="logo">
    <img src="logo.png">
</div>

<h3>Выберите стол</h3>

<div class="tables">
    <div class="table" data-table="1">1</div>
    <div class="table" data-table="2">2</div>
    <div class="table" data-table="3">3</div>
    <div class="table" data-table="4">4</div>
    <div class="table" data-table="5">5</div>
    <div class="table" data-table="6">6</div>
    <div class="table vip" data-table="VIP">VIP</div>
</div>

<div id="tableInfo"></div>

<input id="date" type="date">
<select id="time"></select>

<input id="guests" type="number" min="1" max="11" step="1" placeholder="Количество гостей">
<input id="name" placeholder="Имя">
<input id="phone" placeholder="+7999">

<button onclick="book()">Забронировать</button>

<div class="toast" id="toast"></div>

</div>

<script>
const API = "https://dubrovka-webapp-9.onrender.com";

let selectedTable = null;

// уведомление
function show(msg){
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.style.display = "block";
    setTimeout(()=>t.style.display="none",2000);
}

// описание столов
const desc = {
    "1":"🎮 PS • шторки • 6-11",
    "2":"🎮 PS • шторки • 4-6",
    "3":"🎮 PS • шторки • 4-6",
    "4":"🎮 PS • шторки • 4-6",
    "5":"без PS • без шторок",
    "6":"2-3 человека",
    "VIP":"VIP комната"
};

// выбор стола (ИСПРАВЛЕНО)
document.querySelectorAll(".table").forEach(el=>{
    el.addEventListener("click", ()=>{
        document.querySelectorAll(".table").forEach(t=>t.classList.remove("active"));
        el.classList.add("active");
        selectedTable = el.dataset.table;
        document.getElementById("tableInfo").innerText = desc[selectedTable];
    });
});

// дата (ИСПРАВЛЕНО)
const dateInput = document.getElementById("date");
const today = new Date().toISOString().split("T")[0];

dateInput.min = today;
dateInput.value = today;

// время (ИСПРАВЛЕНО)
const timeSelect = document.getElementById("time");

function generateTimes(){
    timeSelect.innerHTML = "";

    for(let h=13; h<=23; h++){
        ["00","30"].forEach(m=>{
            const t = `${String(h).padStart(2,"0")}:${m}`;

            const option = document.createElement("option");
            option.value = t;
            option.textContent = t;

            timeSelect.appendChild(option);
        });
    }
}

generateTimes();

// телефон
document.getElementById("phone").addEventListener("input", e=>{
    e.target.value = e.target.value.replace(/[^0-9+]/g,"").slice(0,12);
});

// бронь
async function book(){

    const data =


{
        name: document.getElementById("name").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        guests: document.getElementById("guests").value,
        table: selectedTable,
        date: dateInput.value,
        time: timeSelect.value
    };

    if(!data.name) return show("Введите имя");
    if(!data.phone) return show("Введите телефон");
    if(!data.table) return show("Выберите стол");

    const res = await fetch(`${API}/booking`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify(data)
    });

    show("Бронь создана");
}
</script>

</body>
</html>

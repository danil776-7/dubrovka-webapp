<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka FULL FIX</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a0d07;color:#fff;font-family:sans-serif}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px;padding:12px
}
.card{
  border-radius:12px;overflow:hidden;cursor:pointer;
  position:relative
}
.card img{width:100%;height:160px;object-fit:cover}
.card span{position:absolute;bottom:10px;left:10px}

/* MODAL */
.modal{
  position:fixed;inset:0;background:#000c;
  display:none;justify-content:center;align-items:center
}
.modal.active{display:flex}

.box{
  width:380px;background:#111;border-radius:14px
}

.header{
  padding:14px;background:#222;
  display:flex;justify-content:space-between
}

/* TIME GRID */
.time-grid{
  display:flex;flex-wrap:wrap;gap:8px;padding:12px
}
.slot{
  width:70px;padding:12px;text-align:center;
  border-radius:8px;background:#222;
  cursor:pointer;transition:.2s
}
.slot:hover{transform:scale(1.05)}
.slot.active{background:#fff;color:#000}
.slot.range{background:#444}

/* BUTTON */
.btn{
  margin:12px;padding:14px;text-align:center;
  background:#fff;color:#000;border-radius:10px;
  cursor:pointer
}
.btn.disabled{
  background:#555;color:#aaa;cursor:not-allowed
}
</style>
</head>

<body>

<div id="grid" class="grid"></div>

<!-- TABLE -->
<div id="tableModal" class="modal">
  <div class="box">
    <div class="header">
      <div>Стол №<span id="tableId"></span></div>
      <div onclick="closeTable()">✕</div>
    </div>
    <img id="tableImg" style="width:100%;height:200px">
    <div class="btn" onclick="openTime()">Забронировать</div>
  </div>
</div>

<!-- TIME -->
<div id="timeModal" class="modal">
  <div class="box">
    <div class="header">
      <div>Дата и время</div>
      <div onclick="closeTime()">✕</div>
    </div>

    <input type="date" id="dateInput" style="margin:10px">

    <div style="padding:10px">
      С: <b id="from">--</b><br>
      До: <b id="to">--</b>
    </div>

    <!-- 🔥 ВАЖНО: ЭТО БЫЛО СЛОМАНО У ТЕБЯ -->
    <div id="timeGrid" class="time-grid"></div>

    <div id="continueBtn" class="btn disabled">Продолжить</div>
  </div>
</div>

<script>

/* TABLES */
const TABLES=[
 {id:1,img:"https://images.unsplash.com/photo-1552566626-52f8b828add9"},
 {id:2,img:"https://images.unsplash.com/photo-1555396273-367ea4eb4db5"},
 {id:3,img:"https://images.unsplash.com/photo-1565299624946-b28f40a0ae38"},
 {id:4,img:"https://images.unsplash.com/photo-1541542684-4a0f6a1d1a66"},
 {id:5,img:"https://images.unsplash.com/photo-1559339352-11d035aa65de"},
 {id:6,img:"https://images.unsplash.com/photo-1559339352-11d035aa65de"},
 {id:"vip",img:"https://images.unsplash.com/photo-1559339352-11d035aa65de"}
];

let selectedTable=null;
let selectedFrom=null;
let selectedTo=null;

/* RENDER TABLES */
function renderTables(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  TABLES.forEach(t=>{
    let el=document.createElement("div");
    el.className="card";
    el.innerHTML=`<img src="${t.img}"><span>Стол ${t.id}</span>`;
    el.onclick=()=>openTable(t);
    grid.appendChild(el);
  });
}

/* TABLE */
function openTable(t){
  selectedTable=t.id;
  document.getElementById("tableId").innerText=t.id;
  document.getElementById("tableImg").src=t.img;
  document.getElementById("tableModal").classList.add("active");
}
function closeTable(){
  document.getElementById("tableModal").classList.remove("active");
}

/* TIME */
function openTime(){
  closeTable();

  selectedFrom=null;
  selectedTo=null;

  document.getElementById("from").innerText="--";
  document.getElementById("to").innerText="--";

  document.getElementById("continueBtn").classList.add("disabled");

  document.getElementById("timeModal").classList.add("active");

  document.getElementById("dateInput").value =
    new Date().toISOString().split("T")[0];

  renderTimeGrid(); // 🔥 ГЛАВНОЕ
}

function closeTime(){
  document.getElementById("timeModal").classList.remove("active");
}

/* 🔥 ГЛАВНАЯ ФУНКЦИЯ (ПОЛНОСТЬЮ РАБОЧАЯ) */
function renderTimeGrid(){

  const grid=document.getElementById("timeGrid");

  if(!grid){
    alert("timeGrid не найден");
    return;
  }

  grid.innerHTML="";

  for(let h=12;h<24;h++){
    ["00","30"].forEach(m=>{

      let time=`${String(h).padStart(2,'0')}:${m}`;

      let el=document.createElement("div");
      el.className="slot";
      el.innerText=time;

      el.onclick=()=>{

        console.log("CLICK",time);

        // 1 выбор
        if(!selectedFrom){
          selectedFrom=time;
          document.getElementById("from").innerText=time;

          resetSlots();
          el.classList.add("active");
          return;
        }

        // 2 выбор
        if(selectedFrom && !selectedTo){

          if(time <= selectedFrom){
            selectedFrom=time;
            document.getElementById("from").innerText=time;

            resetSlots();
            el.classList.add("active");
            return;
          }

          selectedTo=time;
          document.getElementById("to").innerText=time;

          highlightRange();

          document.getElementById("continueBtn")
            .classList.remove("disabled");

          return;
        }

        // перевыбор
        selectedFrom=time;
        selectedTo=null;

        document.getElementById("from").innerText=time;
        document.getElementById("to").innerText="--";

        document.getElementById("continueBtn")
          .classList.add("disabled");

        resetSlots();
        el.classList.add("active");
      };

      grid.appendChild(el);
    });
  }
}

function resetSlots(){
  document.querySelectorAll(".slot").forEach(x=>{
    x.classList.remove("active","range");
  });
}

function highlightRange(){
  document.querySelectorAll(".slot").forEach(el=>{
    let t=el.innerText;

    if(t > selectedFrom && t < selectedTo){
      el.classList.add("range");
    }

    if(t === selectedTo){
      el.classList.add("active");
    }
  });
}

/* INIT */
renderTables();

</script>

</body>
</html>

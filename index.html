<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka Lounge & Bar</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#2b1208;
  color:white;
}

/* HEADER */
.top{
  background:#eee;
  color:black;
  padding:10px 15px;
  display:flex;
  justify-content:space-between;
}

/* TIMELINE */
.timeline{
  background:#3b1509;
  padding:15px;
}

.times{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.time{
  padding:8px 14px;
  background:#0003;
  border-radius:10px;
  cursor:pointer;
}

.time.active{
  background:white;
  color:black;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}

/* CARD */
.card{
  position:relative;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#000a,transparent);
}

.status{
  position:absolute;
  top:8px;
  left:8px;
  background:#000a;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

.dot{
  position:absolute;
  top:10px;
  right:10px;
  width:8px;
  height:8px;
  background:#4cff4c;
  border-radius:50%;
}

.info{
  position:absolute;
  bottom:0;
  padding:10px;
  font-size:13px;
}

/* MODAL */
.table-modal{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  z-index:9999;
}

.table-modal.active{
  display:block;
}

/* HEADER MODAL */
.table-header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#111;
}

/* IMAGE */
.table-gallery{
  position:relative;
}

.table-gallery img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.table-status{
  position:absolute;
  top:10px;
  left:10px;
  background:#000a;
  padding:5px 10px;
  border-radius:6px;
}

.table-dot{
  position:absolute;
  top:12px;
  right:12px;
  width:8px;
  height:8px;
  background:#4cff4c;
  border-radius:50%;
}

.table-capacity{
  position:absolute;
  bottom:10px;
  left:10px;
  background:#000a;
  padding:5px 10px;
  border-radius:6px;
}

/* BODY */
.table-body{
  padding:15px;
}

.book-btn{
  margin-top:15px;
  background:#ddd;
  color:black;
  padding:16px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
  <div>Dubrovka Lounge</div>
  <div>+7‒913‒432‒01‒01</div>
</div>

<!-- TIME -->
<div class="timeline">
  <div>Забронировать с 12:00</div>
  <div class="times" id="times"></div>
</div>

<!-- TABLES -->
<div id="grid" class="grid"></div>

<!-- MODAL -->
<div id="tableModal" class="table-modal">

  <div class="table-header">
    <div onclick="closeTable()">←</div>
    <div id="tableTitle"></div>
    <div onclick="closeTable()">✕</div>
  </div>

  <div class="table-gallery">
    <img id="tableImage" src="https://via.placeholder.com/400x250">

    <div class="table-status">Свободно</div>
    <div class="table-dot"></div>
    <div class="table-capacity">👥 <span id="tableCap"></span></div>
  </div>

  <div class="table-body">
    <div>Нет броней</div>

    <div class="book-btn">
      Забронировать →
    </div>
  </div>

</div>

<script>
const TABLES=[
 {id:"1",cap:7},
 {id:"2",cap:5},
 {id:"3",cap:5},
 {id:"4",cap:5},
 {id:"5",cap:5},
 {id:"6",cap:3}
];

const DESCRIPTIONS={
 "1":"Приватная зона со шторками и PlayStation",
 "2":"Приватная зона со шторками и PlayStation",
 "3":"Приватная зона со шторками и PlayStation",
 "4":"Приватная зона со шторками и PlayStation",
 "5":"Открытая зона",
 "6":"Компактный стол"
};

/* TIMES */
for(let h=12;h<24;h++){
 let el=document.createElement("div");
 el.className="time";
 el.innerText=h+":00";

 el.onclick=()=>{
  document.querySelectorAll(".time").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
 };

 document.getElementById("times").appendChild(el);
}

/* TABLES */
const grid=document.getElementById("grid");

TABLES.forEach(t=>{
 let el=document.createElement("div");
 el.className="card";

 el.innerHTML=`
  <img src="https://via.placeholder.com/300x200">
  <div class="overlay"></div>
  <div class="status">Свободно</div>
  <div class="dot"></div>
  <div class="info">
    №${t.id} стол<br>👥 ${t.cap}
  </div>
 `;

 el.onclick=()=>openTable(t.id);

 grid.appendChild(el);
});

/* OPEN */
function openTable(id){
 document.getElementById("tableModal").classList.add("active");
 document.getElementById("tableTitle").innerText="СТОЛ №"+id;
 document.getElementById("tableCap").innerText=TABLES.find(t=>t.id==id).cap;
 document.getElementById("tableImage").src="https://via.placeholder.com/400x250";
}

/* CLOSE */
function closeTable(){
 document.getElementById("tableModal").classList.remove("active");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dubrovka</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
margin:0;
font-family:Arial;
background:#000;
color:#e7d9c0;
}

/* видео */
video{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* затемнение */
.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:-1;
}

/* контейнер */
.container{
max-width:420px;
margin:auto;
padding:20px;
}

/* карточка */
.card{
background:rgba(20,20,20,0.85);
padding:20px;
border-radius:20px;
}

/* карта столов */
.tables{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.table{
padding:15px;
background:#222;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.table.selected{
background:#d6b36a;
color:black;
}

.vip{
border:2px solid gold;
}

/* описание */
.desc{
background:#111;
padding:10px;
border-radius:10px;
margin:10px 0;
}

/* поля */
input, select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
}

/* кнопка */
button{
width:100%;
padding:14px;
background:#d6b36a;
border:none;
border-radius:10px;
}

/* футер */
.footer{
margin-top:20px;
text-align:center;
font-size:14px;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
<source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">
<div class="card">

<h2>Бронирование</h2>

<div class="tables">
<div class="table" data-table="1">1</div>
<div class="table" data-table="2">2</div>
<div class="table" data-table="3">3</div>
<div class="table" data-table="4">4</div>
<div class="table" data-table="5">5</div>
<div class="table" data-table="6">6</div>
<div class="table vip" data-table="VIP">VIP</div>
</div>

<div id="tableInfo" class="desc">Выберите стол</div>

<input id="guests" placeholder="Гости">
<input id="name" placeholder="Имя">
<input id="phone" placeholder="+7999" maxlength="12">

<input type="date" id="date">
<input type="time" id="time">

<button id="bookBtn">Забронировать</button>

<div class="footer">
📍 Ермакова 11<br>
📞 +7 999 123 45 67
</div>

</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const tg = window.Telegram.WebApp;
tg.expand();

const API = "https://dubrovka-webapp-1.onrender.com";

const phone = document.getElementById("phone");
const name = document.getElementById("name");
const guests = document.getElementById("guests");
const date = document.getElementById("date");
const time = document.getElementById("time");
const bookBtn = document.getElementById("bookBtn");
const tableInfo = document.getElementById("tableInfo");

let selectedTable = null;

const tables = {
"1": {text:"Приватная зона + PlayStation (до 7)",max:7},
"2": {text:"Приватная зона (до 5)",max:5},
"3": {text:"Приватная зона (до 5)",max:5},
"4": {text:"Приватная зона (до 5)",max:5},
"5": {text:"Открытая зона (до 5)",max:5},
"6": {text:"Компактный стол (до 3)",max:3},
"VIP": {text:"VIP депозитная, через администратора",max:10}
};

document.querySelectorAll(".table").forEach(el=>{
el.onclick=()=>{
document.querySelectorAll(".table").forEach(t=>t.classList.remove("selected"));
el.classList.add("selected");

selectedTable=el.dataset.table;
tableInfo.innerText=tables[selectedTable].text;
};
});

phone.addEventListener("input",()=>{
let v=phone.value.replace(/\D/g,"");
if(!v.startsWith("7")) v="7"+v;
v=v.slice(0,11);
phone.value="+"+v;
});

bookBtn.onclick=async()=>{

let nameVal=name.value.trim();
let phoneVal=phone.value;
let guestsVal=parseInt(guests.value);

if(!selectedTable) return alert("Выберите стол");

if(selectedTable==="VIP"){
return alert("VIP бронируется через администратора");
}

if(!nameVal) return alert("Введите имя");
if(phoneVal.length!==12) return alert("Введите номер");
if(!date.value) return alert("Дата?");
if(!time.value) return alert("Время?");

if(guestsVal>tables[selectedTable].max){
return alert("Слишком много гостей");
}

if(guestsVal>=5){
if(!confirm("От 5 гостей — 2 кальяна")) return;
}

let data = {
name:nameVal,
phone:phoneVal,
guests:guestsVal,
table:selectedTable,
date:date.value,
time:time.value
};

/* отправка в бота */
tg.sendData(JSON.stringify(data));

/* отправка в API */
await fetch(API+"/booking",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

document.body.innerHTML="<h2 style='text-align:center;margin-top:100px;'>Бронь отправлена</h2>";
};

});
</script>

</body>
</html>

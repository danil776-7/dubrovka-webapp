<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="google" content="notranslate">
<title>Dubrovka Lounge & Bar</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
  background: #0a0a0f;
  color: #ffffff;
  min-height: 100vh;
}

.video-background {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  opacity: 0.5;
}

.container {
  max-width: 500px;
  margin: 0 auto;
  padding: 20px;
  position: relative;
  z-index: 1;
}

@media (min-width: 768px) {
  .container {
    max-width: 800px;
    padding: 40px;
  }
  .card {
    padding: 35px;
  }
  .tables-grid {
    grid-template-columns: repeat(4, 1fr) !important;
  }
  .time-slots {
    gap: 12px;
  }
  .time-slot {
    padding: 12px 16px;
    font-size: 16px;
    min-width: 85px;
  }
  input, select, button {
    padding: 16px 18px;
    font-size: 16px;
  }
  h2 {
    font-size: 26px;
  }
  .logo-img {
    width: 120px;
    height: 120px;
  }
  .logo-text {
    font-size: 32px;
  }
  .logo-subtitle {
    font-size: 14px;
  }
}

@media (min-width: 1024px) {
  .container {
    max-width: 1000px;
  }
  .tables-grid {
    grid-template-columns: repeat(5, 1fr) !important;
  }
}

.logo-container {
  text-align: center;
  margin-bottom: 20px;
  animation: fadeInDown 0.8s ease-out;
}

.logo-img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 12px;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
  transition: transform 0.3s ease;
  border: 2px solid #d4af37;
}

.logo-img:hover {
  transform: scale(1.02);
}

.logo-text {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 1px;
  background: linear-gradient(135deg, #d4af37 0%, #f5e5a3 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}

.logo-subtitle {
  font-size: 11px;
  color: #d4af37;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 500;
}

.card {
  background: rgba(10, 10, 15, 0.85);
  backdrop-filter: blur(12px);
  padding: 24px;
  border-radius: 24px;
  border: 1px solid rgba(212, 175, 55, 0.25);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  animation: fadeInUp 0.8s ease-out;
}

.working-hours {
  background: rgba(212, 175, 55, 0.1);
  padding: 10px;
  border-radius: 16px;
  text-align: center;
  margin-bottom: 20px;
  font-size: 12px;
  color: #d4af37;
  font-weight: 500;
  border: 1px solid rgba(212, 175, 55, 0.2);
}

.working-hours span {
  font-weight: 600;
  color: #f5e5a3;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 20px;
  color: #ffffff;
  letter-spacing: 0.5px;
  font-weight: 600;
}

/* Схема зала */
.hall-title {
  font-size: 18px;
  color: #d4af37;
  margin: 20px 0 15px;
  padding-bottom: 5px;
  border-bottom: 1px solid rgba(212, 175, 55, 0.3);
}

.tables-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.table-card {
  background: rgba(20, 20, 30, 0.9);
  border-radius: 16px;
  padding: 15px;
  cursor: pointer;
  transition: all 0.2s ease;
  border: 1px solid rgba(212, 175, 55, 0.2);
  position: relative;
}

.table-card:hover {
  background: rgba(212, 175, 55, 0.15);
  transform: translateY(-2px);
  border-color: rgba(212, 175, 55, 0.5);
}

.table-card.selected {
  background: linear-gradient(135deg, #d4af37 0%, #b88d2a 100%);
  color: #0a0a0f;
  border-color: #d4af37;
  box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
}

.table-card.booked {
  opacity: 0.6;
  cursor: not-allowed;
  background: rgba(50, 50, 60, 0.9);
  border-color: rgba(220, 53, 69, 0.3);
}

.table-card.booked:hover {
  transform: none;
  background: rgba(50, 50, 60, 0.9);
}

.table-number {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 8px;
}

.table-capacity {
  font-size: 12px;
  color: #888;
  margin-bottom: 5px;
}

.table-status {
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 20px;
  display: inline-block;
  margin-top: 8px;
}

.status-free {
  background: rgba(46, 204, 113, 0.2);
  color: #2ecc71;
}

.status-booked {
  background: rgba(220, 53, 69, 0.2);
  color: #ff6b6b;
}

.status-until {
  font-size: 10px;
  color: #ffc107;
  margin-top: 5px;
}

/* Выбор времени */
.time-select-container {
  margin: 15px 0;
}

.time-select {
  width: 100%;
  padding: 14px 15px;
  border-radius: 16px;
  border: 1px solid rgba(212, 175, 55, 0.3);
  background: rgba(20, 20, 30, 0.9);
  color: #ffffff;
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
}

.time-select:focus {
  outline: none;
  border-color: #d4af37;
  box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
}

/* Предупреждение */
.warning-message {
  background: rgba(255, 193, 7, 0.15);
  padding: 12px;
  border-radius: 12px;
  margin: 10px 0;
  display: none;
  color: #ffc107;
  text-align: center;
  font-size: 12px;
  border-left: 3px solid #ffc107;
}

input {
  width: 100%;
  padding: 14px 15px;
  margin: 8px 0;
  border-radius: 16px;
  border: 1px solid rgba(212, 175, 55, 0.3);
  background: rgba(20, 20, 30, 0.9);
  color: #ffffff;
  font-size: 15px;
  transition: all 0.2s ease;
  font-family: inherit;
}

input:focus {
  outline: none;
  border-color: #d4af37;
  box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
}

input::placeholder {
  color: #6b6b7a;
}

button {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #d4af37 0%, #b88d2a 100%);
  border: none;
  border-radius: 16px;
  cursor: pointer;
  font-weight: 700;
  font-size: 15px;
  margin-top: 15px;
  color: #0a0a0f;
  transition: all 0.2s ease;
  letter-spacing: 0.5px;
  font-family: inherit;
}

button:hover {
  background: linear-gradient(135deg, #e5c14a 0%, #c99f32 100%);
  transform: translateY(-1px);
  box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
}

button:active {
  transform: translateY(0);
}

.hookah-warning {
  background: rgba(212, 175, 55, 0.1);
  padding: 12px;
  border-radius: 12px;
  margin-top: 10px;
  display: none;
  color: #d4af37;
  text-align: center;
  font-size: 12px;
  border-left: 3px solid #d4af37;
}

.footer {
  margin-top: 25px;
  text-align: center;
  font-size: 11px;
  color: #6b6b7a;
  border-top: 1px solid rgba(212, 175, 55, 0.2);
  padding-top: 18px;
}

.footer p {
  margin: 4px 0;
}

.map-btn {
  display: inline-block;
  margin-top: 8px;
  padding: 6px 18px;
  background: rgba(20, 20, 30, 0.9);
  border-radius: 20px;
  text-decoration: none;
  color: #d4af37;
  font-size: 11px;
  transition: all 0.2s ease;
  border: 1px solid rgba(212, 175, 55, 0.3);
}

.map-btn:hover {
  background: #d4af37;
  color: #0a0a0f;
}

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-15px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.loading {
  text-align: center;
  padding: 20px;
  color: #d4af37;
}

@media (max-width: 480px) {
  .container { padding: 15px; }
  .card { padding: 18px; }
  .logo-img { width: 70px; height: 70px; }
  .logo-text { font-size: 22px; }
  .table-card { padding: 12px; }
  .table-number { font-size: 16px; }
  .time-select { font-size: 14px; padding: 12px; }
  input, button { font-size: 14px; padding: 12px; }
}

::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-track {
  background: rgba(30, 30, 40, 0.5);
  border-radius: 10px;
}

::-webkit-scrollbar-thumb {
  background: #d4af37;
  border-radius: 10px;
}
</style>
</head>

<body>
<video class="video-background" autoplay muted loop playsinline>
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="container">
  <div class="logo-container">
    <img src="logo.png" alt="Dubrovka Lounge & Bar" class="logo-img" onerror="this.style.display='none'">
    <div class="logo-text">DUBROVKA</div>
    <div class="logo-subtitle">LOUNGE & BAR</div>
  </div>

  <div class="card">
    <div class="working-hours">
      🕐 РЕЖИМ РАБОТЫ: <span>ВС-ЧТ: 12:00 - 01:00 | ПТ-СБ: 12:00 - 02:00</span>
    </div>
    
    <h2>🍷 БРОНИРОВАНИЕ СТОЛОВ</h2>

    <!-- Схема зала -->
    <div class="hall-title">📍 ОСНОВНОЙ ЗАЛ</div>
    <div id="tablesGrid" class="tables-grid">
      <!-- Столы будут загружены динамически -->
      <div class="loading">Загрузка схемы столов...</div>
    </div>

    <!-- Выбор даты -->
    <input id="date" type="date">

    <!-- Выбор времени с шагом 10 минут -->
    <div class="time-select-container">
      <select id="timeSelect" class="time-select">
        <option value="">⏰ ВЫБЕРИТЕ ВРЕМЯ</option>
      </select>
    </div>

    <div id="warningMessage" class="warning-message"></div>
    
    <input id="guests" type="number" placeholder="👥 КОЛИЧЕСТВО ГОСТЕЙ" min="1" max="20" step="1" autocomplete="off" value="1">
    <input id="name" placeholder="👤 ВАШЕ ИМЯ" autocomplete="name">
    <input id="phone" placeholder="📞 ТЕЛЕФОН (+7XXXXXXXXXX)" maxlength="12" autocomplete="tel">

    <div id="hookahWarning" class="hookah-warning">
      💨 Для компаний от 5 человек обязательно бронирование 2 кальянов
    </div>

    <button id="bookBtn">ЗАБРОНИРОВАТЬ</button>

    <div class="footer">
      <p>📍 Ермакова 11, Новокузнецк</p>
      <p>📞 +7‒913‒432‒01‒01</p>
      <a class="map-btn" href="https://2gis.ru/novokuznetsk/geo/70000001067987554" target="_blank">🗺 ОТКРЫТЬ В 2ГИС</a>
    </div>
  </div>
</div>

<script>
const API = "https://dubrovka-webapp-production.up.railway.app";

// Конфигурация столов
const TABLES_CONFIG = [
  { id: "1", number: 1, capacity: 7, x: 1, y: 1 },
  { id: "2", number: 2, capacity: 5, x: 2, y: 1 },
  { id: "3", number: 3, capacity: 5, x: 3, y: 1 },
  { id: "4", number: 4, capacity: 5, x: 4, y: 1 },
  { id: "5", number: 5, capacity: 5, x: 1, y: 2 },
  { id: "6", number: 6, capacity: 3, x: 2, y: 2 },
  { id: "7", number: 7, capacity: 5, x: 3, y: 2 },
  { id: "8", number: 8, capacity: 5, x: 4, y: 2 },
  { id: "9", number: 9, capacity: 5, x: 1, y: 3 },
  { id: "10", number: 10, capacity: 5, x: 2, y: 3 },
  { id: "11", number: 11, capacity: 5, x: 3, y: 3 },
  { id: "12", number: 12, capacity: 7, x: 4, y: 3 }
];

// Вместимость столов
const TABLE_CAPACITY = {
  "1": 7, "2": 5, "3": 5, "4": 5, "5": 5, "6": 3,
  "7": 5, "8": 5, "9": 5, "10": 5, "11": 5, "12": 7
};

// Данные о бронях
let bookingsData = {};
let selectedTable = null;
let selectedTime = null;
let userChatId = null;
let currentDate = null;

document.addEventListener("DOMContentLoaded", () => {
const tg = window.Telegram.WebApp;
if(tg) tg.expand();

const phoneInput = document.getElementById("phone");
const nameInput = document.getElementById("name");
const guestsInput = document.getElementById("guests");
const dateInput = document.getElementById("date");
const timeSelect = document.getElementById("timeSelect");
const warningMessage = document.getElementById("warningMessage");
const tablesGrid = document.getElementById("tablesGrid");
const bookBtn = document.getElementById("bookBtn");
const hookahWarning = document.getElementById("hookahWarning");
const vipBtn = document.getElementById("vipBtn");

if(tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
  const user = tg.initDataUnsafe.user;
  userChatId = user.id;
  if(user.first_name) nameInput.value = user.first_name;
  if(user.last_name && nameInput.value) nameInput.value += " " + user.last_name;
}

// =====================
// РАБОЧЕЕ ВРЕМЯ
// =====================
function getWorkingHours(date) {
  const day = new Date(date).getDay();
  if (day === 5 || day === 6) {
    return { start: 12, end: 26, text: "ПТ-СБ: 12:00 - 02:00" };
  } else {
    return { start: 12, end: 25, text: "ВС-ЧТ: 12:00 - 01:00" };
  }
}

// =====================
// ГЕНЕРАЦИЯ ВРЕМЕНИ С ШАГОМ 10 МИНУТ
// =====================
function generateTimeOptions(date) {
  let times = [];
  let workingHours = getWorkingHours(date);
  let startHour = workingHours.start;
  let endHour = workingHours.end;
  
  for(let h = startHour; h < endHour; h++) {
    for(let m = 0; m < 60; m += 10) {
      let displayHour = h >= 24 ? h - 24 : h;
      let time = `${String(displayHour).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
      times.push(time);
    }
  }
  return times;
}

function populateTimeSelect(date) {
  let allTimes = generateTimeOptions(date);
  let now = new Date();
  let currentGuests = parseInt(guestsInput.value) || 1;
  
  timeSelect.innerHTML = '<option value="">⏰ ВЫБЕРИТЕ ВРЕМЯ</option>';
  
  allTimes.forEach(time => {
    let [h,m] = time.split(":");
    let slot = new Date(date);
    let hour = parseInt(h);
    slot.setHours(hour, m);
    
    if (slot >= now) {
      let option = document.createElement("option");
      option.value = time;
      option.innerText = time;
      timeSelect.appendChild(option);
    }
  });
}

// =====================
// ЗАГРУЗКА ДАННЫХ О СТОЛАХ
// =====================
async function loadTablesStatus() {
  if(!dateInput.value) return;
  
  try {
    // Загружаем занятые времена для каждого стола
    let allTables = TABLES_CONFIG.map(t => t.id);
    let busyData = {};
    
    for (let table of allTables) {
      let res = await fetch(`${API}/busy_times?date=${dateInput.value}&table=${table}`);
      let busy = await res.json();
      busyData[table] = Array.isArray(busy) ? busy : [];
    }
    
    renderTables(busyData);
    
  } catch(e) {
    console.error(e);
  }
}

function renderTables(busyData) {
  let html = '';
  
  TABLES_CONFIG.forEach(table => {
    let isBusy = busyData[table.id] && busyData[table.id].length > 0;
    let busyTimes = busyData[table.id] || [];
    let nextFreeTime = getNextFreeTime(busyTimes);
    
    let statusClass = isBusy ? 'status-booked' : 'status-free';
    let statusText = isBusy ? '🔴 ЗАНЯТ' : '🟢 СВОБОДЕН';
    let untilText = '';
    
    if (isBusy && nextFreeTime) {
      untilText = `<div class="status-until">📅 Свободен после ${nextFreeTime}</div>`;
    }
    
    html += `
      <div class="table-card ${isBusy ? 'booked' : ''}" data-table-id="${table.id}" data-table-capacity="${table.capacity}">
        <div class="table-number">СТОЛ ${table.number}</div>
        <div class="table-capacity">👥 ДО ${table.capacity} ГОСТЕЙ</div>
        <div class="table-status ${statusClass}">${statusText}</div>
        ${untilText}
      </div>
    `;
  });
  
  tablesGrid.innerHTML = html;
  
  // Добавляем обработчики кликов
  document.querySelectorAll('.table-card').forEach(el => {
    el.onclick = () => {
      if(el.classList.contains('booked')) {
        showError("❌ Этот стол уже забронирован на выбранную дату");
        return;
      }
      
      document.querySelectorAll('.table-card').forEach(t => t.classList.remove('selected'));
      el.classList.add('selected');
      selectedTable = el.dataset.tableId;
      let capacity = el.dataset.tableCapacity;
      guestsInput.max = capacity;
      guestsInput.placeholder = `👥 ГОСТЕЙ (МАКС. ${capacity})`;
      
      let currentGuests = parseInt(guestsInput.value) || 1;
      if(currentGuests > capacity) {
        guestsInput.value = capacity;
        showError(`СТОЛ ${selectedTable} ВМЕЩАЕТ ${capacity} ГОСТЕЙ!`);
      }
      
      warningMessage.style.display = "none";
    };
  });
}

function getNextFreeTime(busyTimes) {
  if (!busyTimes || busyTimes.length === 0) return null;
  let sorted = [...busyTimes].sort();
  let last = sorted[sorted.length - 1];
  let [hours, minutes] = last.split(':').map(Number);
  let nextHour = hours + 2;
  let nextMinute = minutes;
  if (nextHour >= 24) {
    nextHour = nextHour - 24;
  }
  return `${String(nextHour).padStart(2, '0')}:${String(nextMinute).padStart(2, '0')}`;
}

// =====================
// ЗАГРУЗКА ДОСТУПНЫХ ВРЕМЕН ДЛЯ ВЫБРАННОГО СТОЛА
// =====================
async function loadAvailableTimes() {
  if(!dateInput.value || !selectedTable) return;
  
  try {
    let res = await fetch(`${API}/busy_times?date=${dateInput.value}&table=${selectedTable}`);
    let busyTimes = await res.json();
    busyTimes = Array.isArray(busyTimes) ? busyTimes : [];
    
    let allTimes = generateTimeOptions(dateInput.value);
    let now = new Date();
    
    timeSelect.innerHTML = '<option value="">⏰ ВЫБЕРИТЕ ВРЕМЯ</option>';
    
    allTimes.forEach(time => {
      let [h,m] = time.split(":");
      let slot = new Date(dateInput.value);
      let hour = parseInt(h);
      slot.setHours(hour, m);
      
      if (slot >= now && !busyTimes.includes(time)) {
        let option = document.createElement("option");
        option.value = time;
        option.innerText = time;
        timeSelect.appendChild(option);
      }
    });
    
    if(timeSelect.options.length === 1) {
      timeSelect.innerHTML = '<option value="">❌ НЕТ СВОБОДНЫХ ВРЕМЕН</option>';
    }
    
  } catch(e) {
    console.error(e);
  }
}

// =====================
// УТИЛИТЫ
// =====================
function showError(message) {
  const errorDiv = document.createElement('div');
  errorDiv.style.cssText = `
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(220, 53, 69, 0.95);
    color: white;
    padding: 14px 24px;
    border-radius: 12px;
    z-index: 10000;
    font-size: 14px;
    font-weight: 500;
    animation: fadeInDown 0.3s ease-out;
    max-width: 90%;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  `;
  errorDiv.innerHTML = `❌ ${message}`;
  document.body.appendChild(errorDiv);
  setTimeout(() => errorDiv.remove(), 4000);
}

function showSuccess(message) {
  const successDiv = document.createElement('div');
  successDiv.style.cssText = `
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #2ecc71;
    color: white;
    padding: 14px 24px;
    border-radius: 12px;
    z-index: 10000;
    font-size: 14px;
    font-weight: 500;
    animation: fadeInDown 0.3s ease-out;
    max-width: 90%;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  `;
  successDiv.innerHTML = `✅ ${message}`;
  document.body.appendChild(successDiv);
  setTimeout(() => successDiv.remove(), 4000);
}

// =====================
// ОБРАБОТЧИКИ
// =====================
guestsInput.addEventListener("input", (e) => {
  let guests = parseInt(e.target.value) || 1;
  if (guests < 1) e.target.value = 1;
  if (guests > 20) { e.target.value = 20; showError("Максимум 20 гостей"); }
  if (selectedTable && guests > TABLE_CAPACITY[selectedTable]) {
    showError(`СТОЛ ${selectedTable} ВМЕЩАЕТ ${TABLE_CAPACITY[selectedTable]} ГОСТЕЙ!`);
  }
  if (selectedTable && guests >= 5) hookahWarning.style.display = "block";
  else hookahWarning.style.display = "none";
});

dateInput.min = new Date().toISOString().split("T")[0];
dateInput.value = new Date().toISOString().split("T")[0];
currentDate = dateInput.value;

dateInput.addEventListener("change", async () => {
  currentDate = dateInput.value;
  await loadTablesStatus();
  selectedTable = null;
  selectedTime = null;
  warningMessage.style.display = "none";
  document.querySelectorAll('.table-card').forEach(t => t.classList.remove('selected'));
  timeSelect.innerHTML = '<option value="">⏰ ВЫБЕРИТЕ ВРЕМЯ</option>';
  populateTimeSelect(dateInput.value);
});

phoneInput.addEventListener("input", () => {
  let v = phoneInput.value.replace(/\D/g,"");
  if(!v.startsWith("7")) v = "7" + v;
  v = v.slice(0,11);
  phoneInput.value = "+" + v;
});

timeSelect.addEventListener("change", () => {
  selectedTime = timeSelect.value;
  if (selectedTime) {
    warningMessage.style.display = "none";
  }
});

// =====================
// БРОНИРОВАНИЕ
// =====================
bookBtn.onclick = async () => {
  if(!selectedTable) { showError("ВЫБЕРИТЕ СТОЛ"); return; }
  if(!dateInput.value) { showError("ВЫБЕРИТЕ ДАТУ"); return; }
  if(!selectedTime) { showError("ВЫБЕРИТЕ ВРЕМЯ"); return; }
  
  let nameVal = nameInput.value.trim();
  let phoneVal = phoneInput.value;
  let guestsVal = parseInt(guestsInput.value || 0);
  let workingHours = getWorkingHours(dateInput.value);
  let maxGuests = TABLE_CAPACITY[selectedTable];
  
  if(!nameVal) { showError("ВВЕДИТЕ ИМЯ"); return; }
  if(phoneVal.length !== 12) { showError("НЕВЕРНЫЙ НОМЕР (+7XXXXXXXXXX)"); return; }
  if(guestsVal < 1) { showError("УКАЖИТЕ КОЛИЧЕСТВО ГОСТЕЙ"); return; }
  if(guestsVal > maxGuests) { showError(`СТОЛ ${selectedTable} ВМЕЩАЕТ ${maxGuests} ГОСТЕЙ!`); return; }
  
  if(guestsVal >= 5) {
    let confirmHookah = confirm(`💨 ВНИМАНИЕ!\n\nДля компании из ${guestsVal} человек обязательно бронирование 2 кальянов.\n\nВы подтверждаете, что согласны с этим условием?`);
    if(!confirmHookah) { showError("Требуется согласие на заказ кальянов"); return; }
  }
  
  let [hours, minutes] = selectedTime.split(':').map(Number);
  let originalHour = hours;
  if (hours < 12) {
    hours = hours + 24;
  }
  if (hours < workingHours.start || hours >= workingHours.end) {
    showError(`⏰ РЕСТОРАН РАБОТАЕТ: ${workingHours.text}`);
    return;
  }
  
  let data = {
    name: nameVal,
    phone: phoneVal,
    guests: guestsVal,
    table: selectedTable,
    date: dateInput.value,
    time: selectedTime,
    chat_id: userChatId
  };
  
  try {
    bookBtn.disabled = true;
    bookBtn.textContent = "ОТПРАВКА...";
    
    let res = await fetch(API + "/booking", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(data)
    });
    let result = await res.json();
    
    if (result.error || result.detail) {
      showError("❌ Этот стол уже занят в выбранное время");
      await loadTablesStatus();
      if(selectedTable) await loadAvailableTimes();
      return;
    }
    
    if(result.ok || result.id) {
      if(tg) tg.sendData(JSON.stringify(data));
      showSuccess(`🎉 БРОНЬ СОЗДАНА!\n\n🪑 Стол ${selectedTable}\n⏰ ${selectedTime}\n👥 ${guestsVal} гостей\n👤 ${nameVal}\n\nПодтверждение отправлено в Telegram!`);
      
      nameInput.value = "";
      guestsInput.value = "1";
      selectedTime = null;
      warningMessage.style.display = "none";
      document.querySelectorAll(".table-card").forEach(t => t.classList.remove("selected"));
      selectedTable = null;
      timeSelect.value = "";
      hookahWarning.style.display = "none";
      await loadTablesStatus();
      populateTimeSelect(dateInput.value);
    } else {
      showError("ОШИБКА: " + (result.detail || "НЕИЗВЕСТНАЯ ОШИБКА"));
    }
  } catch(e) {
    console.error(e);
    showError("❌ ОШИБКА СОЕДИНЕНИЯ С СЕРВЕРОМ");
  } finally {
    bookBtn.disabled = false;
    bookBtn.textContent = "ЗАБРОНИРОВАТЬ";
  }
};

// =====================
// ИНИЦИАЛИЗАЦИЯ
// =====================
async function init() {
  populateTimeSelect(dateInput.value);
  await loadTablesStatus();
}

init();
});
</script>

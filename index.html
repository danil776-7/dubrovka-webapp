<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka Lounge & Bar</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:-apple-system,BlinkMacSystemFont;
  background:#0a0a0f;
  color:#fff;
}

/* VIDEO */
.video-background{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  opacity:0.5;
}

/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

/* LOGO */
.logo-container{
  text-align:center;
  margin-bottom:20px;
}

.logo-img{
  width:80px;
  height:80px;
  border-radius:50%;
  border:2px solid #d4af37;
}

.logo-text{
  font-size:24px;
  font-weight:700;
  color:#d4af37;
}

/* CARD */
.card{
  background:rgba(10,10,15,0.85);
  padding:20px;
  border-radius:20px;
  border:1px solid rgba(212,175,55,0.3);
}

/* TABLE CARDS */
.tables-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.table-card{
  background:rgba(20,20,30,0.9);
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  transition:0.2s;
}

.table-card:hover{
  transform:translateY(-2px);
}

.card-img{
  height:100px;
  background:linear-gradient(135deg,#333,#111);
}

.card-body{
  padding:10px;
  font-size:13px;
}

/* VIP */
.vip-btn{
  margin-top:12px;
  padding:14px;
  background:rgba(20,20,30,0.9);
  border-radius:14px;
  text-align:center;
  cursor:pointer;
  border:1px solid rgba(212,175,55,0.2);
  font-weight:600;
}

.vip-btn:hover{
  background:rgba(212,175,55,0.15);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  z-index:9999;
}

.modal.active{display:block;}

.gallery{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.gallery img{
  width:100%;
  height:250px;
  object-fit:cover;
  scroll-snap-align:center;
}

.modal-body{
  padding:15px;
}

/* TIME */
.time-slot{
  padding:8px;
  margin:5px;
  background:#222;
  border-radius:10px;
  display:inline-block;
}

.time-slot.selected{background:#d4af37;color:black;}
.time-slot.busy{opacity:0.3;}
.time-slot.warning{background:orange;}
</style>
</head>

<body>

<video class="video-background" autoplay muted loop playsinline>
  <source src="bg.mp4">
</video>

<div class="container">

<div class="logo-container">
  <img src="logo.png" class="logo-img">
  <div class="logo-text">DUBROVKA</div>
</div>

<div class="card">

<div id="tablesGrid" class="tables-grid"></div>

<div class="vip-btn" id="vipBtn">VIP ЗАЛ</div>

</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="gallery" id="gallery"></div>

  <div class="modal-body">
    <h2 id="title"></h2>
    <p id="desc"></p>

    <div id="times"></div>
    <div id="warning"></div>

    <input id="guests" type="number" value="1">
    <input id="name" placeholder="Имя">
    <input id="phone" placeholder="+7XXXXXXXXXX">

    <button onclick="book()">Забронировать</button>
    <button onclick="closeModal()">Закрыть</button>
  </div>
</div>

<script>
const API="https://dubrovka-webapp-production.up.railway.app";

const TABLE_CAPACITY={"1":7,"2":5,"3":5,"4":5,"5":5,"6":3};

const tableDescriptions={
 "1":"🍷 Приватная зона\n👥 до 7",
 "2":"🍷 Приватная зона\n👥 до 5",
 "3":"🍷 Приватная зона\n👥 до 5",
 "4":"🍷 Приватная зона\n👥 до 5",
 "5":"✨ Открытая зона\n👥 до 5",
 "6":"🪑 Компакт\n👥 до 3"
};

function getBookingDurationMinutes(g){
 if(g<=2) return 90;
 if(g<=4) return 120;
 return 240;
}

function toMin(t){let[a,b]=t.split(":");return a*60+ +b;}

function getSlotStatus(time,busyTimes,guests){
 let start=toMin(time);
 let end=start+getBookingDurationMinutes(guests);

 for(let bt of busyTimes){
  let s=toMin(bt);
  let e=s+120;
  if(start<e && end>s) return "busy";
 }

 return "free";
}

let selectedTable=null;
let selectedTime=null;
let busyTimes=[];
let currentDate=new Date().toISOString().split("T")[0];

/* VIP */
document.getElementById("vipBtn").onclick=()=>{
 alert("VIP бронируется через администратора\n📞 +7‒913‒432‒01‒01");
};

/* TABLES */
function renderTables(){
 let grid=document.getElementById("tablesGrid");

 for(let i=1;i<=6;i++){
  let el=document.createElement("div");
  el.className="table-card";

  el.innerHTML=`
   <div class="card-img"></div>
   <div class="card-body">
    Стол ${i}<br>👥 ${TABLE_CAPACITY[i]}
   </div>
  `;

  el.onclick=()=>openTable(i);

  grid.appendChild(el);
 }
}

/* OPEN */
function openTable(id){
 selectedTable=String(id);

 document.getElementById("modal").classList.add("active");
 document.getElementById("title").innerText="Стол "+id;
 document.getElementById("desc").innerText=tableDescriptions[id];

 renderGallery();
 loadTimes();
}

/* CLOSE */
function closeModal(){
 document.getElementById("modal").classList.remove("active");
}

/* GALLERY */
function renderGallery(){
 document.getElementById("gallery").innerHTML=`
  <img src="https://via.placeholder.com/400x250">
  <img src="https://via.placeholder.com/400x250">
 `;
}

/* TIMES */
async function loadTimes(){
 let res=await fetch(`${API}/busy_times?date=${currentDate}&table=${selectedTable}`);
 busyTimes=await res.json();

 let container=document.getElementById("times");
 container.innerHTML="";

 for(let h=12;h<24;h++){
  let t=h+":00";

  let el=document.createElement("div");
  el.className="time-slot";
  el.innerText=t;

  if(getSlotStatus(t,busyTimes,2)==="busy"){
   el.classList.add("busy");
  }

  el.onclick=()=>{
   if(el.classList.contains("busy")) return;

   selectedTime=t;

   document.querySelectorAll(".time-slot").forEach(x=>x.classList.remove("selected"));
   el.classList.add("selected");
  };

  container.appendChild(el);
 }
}

/* BOOK */
async function book(){
 if(!selectedTime) return alert("Выберите время");

 await fetch(API+"/booking",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
   table:selectedTable,
   time:selectedTime,
   date:currentDate,
   guests:2
  })
 });

 alert("Бронь создана");
 closeModal();
}

renderTables();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dubrovka Lounge</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    color: #e7d9c0;
    background: #000;
}

/* 🎥 ВИДЕО ФОН */
.video-bg {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    top: 0;
    left: 0;
    z-index: -2;
    animation: zoom 20s infinite alternate;
}

/* затемнение */
.overlay-dark {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.65);
    top: 0;
    left: 0;
    z-index: -1;
}

/* контейнер */
.container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
    margin-top: 40px;
}

/* карточка */
.card {
    background: rgba(20,20,20,0.75);
    backdrop-filter: blur(12px);
    padding: 25px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.05);
    animation: fadeIn 1s ease;
}

/* логотип */
.logo {
    text-align: center;
    margin-bottom: 20px;
}

.logo img {
    width: 140px;
}

/* заголовок */
h1 {
    font-family: 'Playfair Display', serif;
    text-align: center;
    margin-bottom: 10px;
}

/* инфо */
.info {
    text-align: center;
    font-size: 14px;
    color: #c7a96b;
    margin-bottom: 20px;
}

/* поля */
input, select {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border-radius: 12px;
    border: 1px solid #2a2a2a;
    background: #111;
    color: #fff;
    font-size: 14px;
}

/* кнопка */
button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
    background: linear-gradient(135deg, #d6b36a, #a88c4a);
    color: black;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    opacity: 0.85;
}

/* успех */
.success {
    text-align: center;
    margin-top: 120px;
    animation: fadeIn 1s ease;
}

/* анимации */
@keyframes zoom {
    from { transform: scale(1); }
    to { transform: scale(1.1); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px);}
    to { opacity: 1; transform: translateY(0);}
}

/* fallback картинка */
@media (max-width: 768px) {
    body {
        background: url('bg.jpg') center/cover no-repeat;
    }
}
</style>
</head>

<body>

<!-- 🎥 ВИДЕО -->
<video autoplay muted loop playsinline class="video-bg">
    <source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay-dark"></div>

<div class="container">

<div class="card">

<div class="logo">
<img src="logo.png">
</div>

<h1>Dubrovka</h1>

<div class="info">
🕒 Вс–Чт: 11:00 – 01:00<br>
🕒 Пт–Сб: 11:00 – 02:00
</div>

<input id="name" placeholder="Ваше имя">
<input id="phone" placeholder="+7999...">

<select id="guests">
<option value="1">1 гость</option>
<option value="2">2 гостя</option>
<option value="3">3 гостя</option>
<option value="4">4 гостя</option>
</select>

<input type="date" id="date">
<input type="time" id="time">

<button onclick="send()">Забронировать</button>

</div>
</div>

<script>
const API = "https://dubrovka-webapp-1.onrender.com";

// ограничения времени
time.min = "13:00";
time.max = "23:00";

async function send(){

    // проверка
    if(!name.value || !phone.value || !date.value || !time.value){
        alert("Заполните все поля");
        return;
    }

    if(!phone.value.startsWith("+")){
        alert("Введите номер в формате +7999...");
        return;
    }

    let data = {
        name: name.value,
        phone: phone.value,
        guests: guests.value,
        table: "auto",
        date: date.value,
        time: time.value,
        user_id: 0
    };

    let res = await fetch(API + "/booking", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
    });

    let result = await res.json();

    if(result.error){
        alert("❌ Это время уже занято");
        return;
    }

    document.body.innerHTML = `
    <div class="success">
        <h1>✅ Бронь отправлена</h1>
        <p>Ожидайте подтверждения администратора</p>
    </div>`;
}
</script>

</body>
</html>

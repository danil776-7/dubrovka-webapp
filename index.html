<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#2b1208;
  color:white;
}

/* HEADER */
.top{
  background:#eee;
  color:black;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

/* TIMELINE */
.timeline{
  background:#3b1509;
  padding:15px;
}

.slider{
  overflow-x:auto;
  display:flex;
  gap:8px;
}

.time{
  padding:10px;
  background:#0003;
  border-radius:10px;
  min-width:60px;
  text-align:center;
  cursor:pointer;
}

.time.active{
  background:white;
  color:black;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}

/* CARD */
.card{
  position:relative;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#000a,transparent);
}

.status{
  position:absolute;
  top:8px;
  left:8px;
  background:#000a;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

.dot{
  position:absolute;
  top:10px;
  right:10px;
  width:8px;
  height:8px;
  background:#4cff4c;
  border-radius:50%;
}

.info{
  position:absolute;
  bottom:0;
  padding:10px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  z-index:9999;
}

.modal.active{display:block;}

.header-modal{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#111;
}

.btn{
  margin:15px;
  padding:15px;
  background:#ddd;
  color:black;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

/* TIME GRID */
.time-grid{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding:10px;
}

.slot{
  padding:10px;
  border-radius:8px;
  background:#222;
}

.slot.busy{opacity:0.3;}
.slot.warning{background:orange;}
.slot.active{background:#d4af37;color:black;}
</style>
</head>

<body>

<div class="top">
  <div>Dubrovka Lounge</div>
  <div>+7‒913‒432‒01‒01</div>
</div>

<div class="timeline">
  <div>с 12:00</div>
  <div id="slider" class="slider"></div>
</div>

<div id="grid" class="grid"></div>

<!-- TABLE MODAL -->
<div id="tableModal" class="modal">
  <div class="header-modal">
    <div onclick="closeTable()">←</div>
    <div id="title"></div>
    <div onclick="closeTable()">✕</div>
  </div>

  <img id="img" src="https://via.placeholder.com/400x250">

  <div style="padding:10px;">
    <div>Нет броней</div>
  </div>

  <div class="btn" onclick="openTime()">Забронировать →</div>
</div>

<!-- TIME MODAL -->
<div id="timeModal" class="modal">
  <div class="header-modal">
    <div onclick="closeTime()">←</div>
    <div>Дата и время</div>
    <div onclick="closeTime()">✕</div>
  </div>

  <div id="timeGrid" class="time-grid"></div>
</div>

<script>
const API="https://dubrovka-webapp-production.up.railway.app";

const TABLES=[
 {id:"1",cap:7},
 {id:"2",cap:5},
 {id:"3",cap:5},
 {id:"4",cap:5},
 {id:"5",cap:5},
 {id:"6",cap:3}
];

let selectedTable=null;
let selectedTime=null;
let busyTimes=[];
let date=new Date().toISOString().split("T")[0];

/* SLIDER */
for(let h=12;h<24;h++){
 let el=document.createElement("div");
 el.className="time";
 el.innerText=h+":00";

 el.onclick=()=>{
  document.querySelectorAll(".time").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
 };

 slider.appendChild(el);
}

/* TABLES */
TABLES.forEach(t=>{
 let el=document.createElement("div");
 el.className="card";

 el.innerHTML=`
  <img src="https://via.placeholder.com/300x200">
  <div class="overlay"></div>
  <div class="status">Свободно</div>
  <div class="dot"></div>
  <div class="info">№${t.id} 👥 ${t.cap}</div>
 `;

 el.onclick=()=>openTable(t.id);

 grid.appendChild(el);
});

/* OPEN TABLE */
function openTable(id){
 selectedTable=id;
 title.innerText="Стол "+id;
 tableModal.classList.add("active");
}

/* TIME LOGIC */
function duration(g){
 if(g<=2) return 90;
 if(g<=4) return 120;
 return 240;
}

function toMin(t){
 let [h,m]=t.split(":");
 return h*60+ +m;
}

function slotStatus(time){
 let start=toMin(time);
 let end=start+duration(2);

 for(let bt of busyTimes){
  let s=toMin(bt);
  let e=s+120;

  if(start<e && end>s) return "busy";
 }

 return "free";
}

/* LOAD TIMES */
async function openTime(){
 tableModal.classList.remove("active");
 timeModal.classList.add("active");

 let res=await fetch(`${API}/busy_times?date=${date}&table=${selectedTable}`);
 busyTimes=await res.json();

 let html="";

 for(let h=12;h<24;h++){
  let t=h+":00";

  let status=slotStatus(t);

  html+=`<div class="slot ${status}" onclick="select('${t}')">${t}</div>`;
 }

 timeGrid.innerHTML=html;
}

function select(t){
 selectedTime=t;

 document.querySelectorAll(".slot").forEach(s=>s.classList.remove("active"));
 event.target.classList.add("active");
}

/* CLOSE */
function closeTable(){tableModal.classList.remove("active");}
function closeTime(){timeModal.classList.remove("active");}
</script>

</body>
</html>

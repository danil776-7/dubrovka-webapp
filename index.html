<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont;
  background:#2b1208;color:#fff;
}

/* HEADER */
.header{
  background:#eee;color:#000;
  padding:12px 16px;
  display:flex;justify-content:space-between
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px;padding:12px
}

.card{
  border-radius:14px;overflow:hidden;
  position:relative;cursor:pointer
}
.card img{
  width:100%;height:160px;object-fit:cover
}

.overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  justify-content:space-between;padding:10px;
  background:linear-gradient(transparent,rgba(0,0,0,.8))
}

/* STATUS */
.status{
  padding:4px 8px;border-radius:8px;
  font-size:12px;width:max-content
}
.free{background:#1faa5c}
.partial{background:#cfa72a}
.busy{background:#c0392b}

/* MODAL */
.modal{
  position:fixed;inset:0;background:#000c;
  display:none;justify-content:center;align-items:center
}
.modal.active{display:flex}

.box{
  width:420px;background:#111;border-radius:14px
}

.header-modal{
  padding:14px;background:#1c1c1c;
  display:flex;justify-content:space-between
}

/* TIME GRID */
.time-grid{
  display:flex;flex-wrap:wrap;
  gap:8px;padding:12px
}

.slot{
  width:70px;padding:12px;text-align:center;
  border-radius:8px;background:#1c1c1c;
  border:1px solid #333;cursor:pointer
}
.slot.active{background:#fff;color:#000}
.slot.range{background:#444}
.slot.busy{opacity:.3;pointer-events:none}

/* BUTTON */
.btn{
  margin:12px;padding:14px;text-align:center;
  background:#fff;color:#000;border-radius:10px;
  cursor:pointer
}
.btn.disabled{
  background:#555;color:#aaa
}

/* INPUT */
input{
  width:calc(100% - 24px);
  margin:8px 12px;padding:14px;
  border-radius:10px;border:1px solid #333;
  background:#1c1c1c;color:#fff
}
</style>
</head>

<body>

<div class="header">
  <b>DUBROVKA</b>
  <div>+7‒913‒432‒01‒01</div>
</div>

<div id="grid" class="grid"></div>

<!-- TIME -->
<div id="timeModal" class="modal">
  <div class="box">
    <div class="header-modal">
      <div>Дата и время</div>
      <div onclick="closeTime()">✕</div>
    </div>

    <input type="date" id="dateInput">

    <div style="padding:12px">
      С: <b id="from">--</b><br>
      До: <b id="to">--</b>
    </div>

    <div id="timeGrid" class="time-grid"></div>

    <div id="continueBtn" class="btn disabled">Продолжить</div>
  </div>
</div>

<!-- FORM -->
<div id="formModal" class="modal">
  <div class="box">
    <div class="header-modal">
      <div>Бронирование</div>
      <div onclick="closeForm()">✕</div>
    </div>

    <input placeholder="Имя">

    <input id="phone" placeholder="+7 XXX XXX XX XX" maxlength="18">

    <!-- 🔥 ЛИМИТ ГОСТЕЙ -->
    <input id="guests" type="number" min="1" max="8" value="2">

    <div class="btn" onclick="book()">Подтвердить</div>
  </div>
</div>

<script>

/* TABLES */
const TABLES=[1,2,3,4,5,6,"VIP"];

/* ЗАНЯТОСТЬ */
const BUSY={
  1:[["18:00","20:00"]],
  2:[["17:30","19:00"]],
  3:[["19:00","22:00"]],
  4:[],
  5:[["16:00","18:00"]],
  6:[["20:00","23:00"]],
  VIP:[["18:00","23:00"]]
};

let selectedTable=null;
let selectedFrom=null;
let selectedTo=null;

/* STATUS */
function getStatus(table){
  const busy=BUSY[table]||[];

  if(busy.length===0){
    return {class:"free",text:"Свободно"};
  }

  if(busy.length>=2){
    return {class:"busy",text:"Занято"};
  }

  return {
    class:"partial",
    text:`Свободно до ${busy[0][0]}`
  };
}

/* RENDER */
function render(){
  grid.innerHTML="";

  TABLES.forEach(t=>{
    let s=getStatus(t);

    let el=document.createElement("div");
    el.className="card";

    el.innerHTML=`
      <img src="https://images.unsplash.com/photo-1552566626-52f8b828add9">
      <div class="overlay">
        <div class="status ${s.class}">${s.text}</div>
        <div>Стол ${t}</div>
      </div>
    `;

    el.onclick=()=>{
      selectedTable=t;
      openTime();
    };

    grid.appendChild(el);
  });
}

/* TIME */
function openTime(){
  timeModal.classList.add("active");

  selectedFrom=null;
  selectedTo=null;

  from.innerText="--";
  to.innerText="--";

  continueBtn.classList.add("disabled");

  renderTimeGrid();
}

function closeTime(){
  timeModal.classList.remove("active");
}

/* TIME GRID */
function renderTimeGrid(){
  timeGrid.innerHTML="";

  for(let h=12;h<24;h++){
    ["00","30"].forEach(m=>{
      let t=`${String(h).padStart(2,'0')}:${m}`;

      let el=document.createElement("div");
      el.className="slot";
      el.innerText=t;

      if(isBusy(t)){
        el.classList.add("busy");
      }

      el.onclick=()=>{

        if(!selectedFrom){
          selectedFrom=t;
          from.innerText=t;
          reset();
          el.classList.add("active");
          return;
        }

        if(selectedFrom && !selectedTo){

          if(t <= selectedFrom){
            selectedFrom=t;
            from.innerText=t;
            reset();
            el.classList.add("active");
            return;
          }

          selectedTo=t;
          to.innerText=t;

          highlight();
          continueBtn.classList.remove("disabled");
          return;
        }

        selectedFrom=t;
        selectedTo=null;

        from.innerText=t;
        to.innerText="--";

        continueBtn.classList.add("disabled");

        reset();
        el.classList.add("active");
      };

      timeGrid.appendChild(el);
    });
  }
}

function isBusy(t){
  const busy=BUSY[selectedTable]||[];
  return busy.some(([s,e])=>t>=s && t<e);
}

function reset(){
  document.querySelectorAll(".slot").forEach(x=>{
    x.classList.remove("active","range");
  });
}

function highlight(){
  document.querySelectorAll(".slot").forEach(el=>{
    let t=el.innerText;
    if(t > selectedFrom && t < selectedTo){
      el.classList.add("range");
    }
    if(t===selectedTo){
      el.classList.add("active");
    }
  });
}

/* CONTINUE */
continueBtn.onclick=()=>{
  if(!selectedFrom || !selectedTo) return;
  timeModal.classList.remove("active");
  formModal.classList.add("active");
}

/* FORM */
function closeForm(){
  formModal.classList.remove("active");
}

/* LIMIT ГОСТЕЙ */
guests.oninput=()=>{
  if(guests.value>8) guests.value=8;
  if(guests.value<1) guests.value=1;
}

/* PHONE */
phone.oninput=()=>{
  let v=phone.value.replace(/\D/g,"").substring(0,11);
  if(!v.startsWith("7")) v="7"+v;

  let f="+7";
  if(v.length>1) f+=" "+v.slice(1,4);
  if(v.length>4) f+=" "+v.slice(4,7);
  if(v.length>7) f+=" "+v.slice(7,9);
  if(v.length>9) f+=" "+v.slice(9,11);

  phone.value=f;
}

/* BOOK */
function book(){
  alert("Бронь создана");
}

/* INIT */
render();

</script>

</body>
</html>

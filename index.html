<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{background:#0d0d0d;color:#fff;font-family:Arial;padding:10px}
.container{max-width:500px;margin:auto}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.table{background:#1c1c1c;padding:15px;text-align:center;border-radius:10px}
.table.active{background:#d6b36a;color:#000}
.vip{grid-column:1/-1;background:#d6b36a;color:#000}
input,select{width:100%;padding:10px;margin:5px 0}
button{width:100%;padding:12px;background:#d6b36a;border:none}
</style>
</head>

<body>

<div class="container">

<div class="grid">
<div class="table" onclick="sel('1')">1</div>
<div class="table" onclick="sel('2')">2</div>
<div class="table" onclick="sel('3')">3</div>
<div class="table" onclick="sel('4')">4</div>
<div class="table" onclick="sel('5')">5</div>
<div class="table" onclick="sel('6')">6</div>
<div class="table vip" onclick="sel('VIP')">VIP</div>
</div>

<input type="date" id="date">
<select id="time"></select>

<input id="name" placeholder="Имя">
<input id="phone" placeholder="Телефон">
<input id="guests" placeholder="Гости">

<button onclick="book()">Забронировать</button>

</div>

<script>
const API="https://dubrovka-webapp-9.onrender.com";
let table=null;

function sel(t){
table=t;
document.querySelectorAll(".table").forEach(e=>e.classList.remove("active"));
event.target.classList.add("active");
load();
}

function times(){
let d=new Date(date.value).getDay();
let end=(d==5||d==6)?24:23;
let arr=[];
for(let i=13;i<=end;i++)arr.push(i+":00");
return arr;
}

async function load(){
if(!table||!date.value)return;
let r=await fetch(`${API}/busy_times?date=${date.value}&table=${table}`);
let busy=await r.json();

time.innerHTML=times().filter(t=>!busy.includes(t)).map(t=>`<option>${t}</option>`).join("");
}

async function book(){

if(table=="VIP"){alert("VIP через админа");return;}

let data={
name:name.value,
phone:phone.value,
guests:guests.value,
table:table,
date:date.value,
time:time.value
};

let r=await fetch(API+"/booking",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
let res=await r.json();

if(res.error=="busy"){alert("занято");return;}
if(res.error=="guests_limit"){alert("слишком много гостей");return;}

alert("успешно");

Telegram.WebApp.sendData(JSON.stringify(data));
}

setInterval(load,5000);
</script>

</body>
</html>

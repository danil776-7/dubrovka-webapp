<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin:0;
  background:#0b0b0f;
  color:white;
  font-family:-apple-system;
}

.container {
  padding:15px;
}

/* TIME */
.time-scroll {
  display:flex;
  overflow-x:auto;
  gap:10px;
  margin-bottom:15px;
}

.time-slot {
  padding:10px 14px;
  border-radius:10px;
  background:#1a1a22;
  cursor:pointer;
}

.time-slot.selected {
  background:white;
  color:black;
}

/* GRID */
.tables-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

/* CARD */
.card {
  background:#1a1a22;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
}

.card-img {
  height:120px;
  background:linear-gradient(135deg,#333,#111);
}

.card-body {
  padding:10px;
}

.status {
  position:absolute;
  top:10px;
  left:10px;
  background:rgba(0,0,0,0.6);
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
}

.dot {
  position:absolute;
  top:10px;
  right:10px;
  width:8px;
  height:8px;
  border-radius:50%;
  background:#2ecc71;
}

.booked .dot {
  background:red;
}

/* MODAL */
.modal {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#111;
  border-radius:20px 20px 0 0;
  padding:20px;
  display:none;
}

.modal.active {
  display:block;
}

button {
  width:100%;
  padding:15px;
  border-radius:12px;
  border:none;
  margin-top:10px;
  background:white;
}
</style>
</head>

<body>

<div class="container">

<div id="times" class="time-scroll"></div>

<div id="tables" class="tables-grid"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div id="modalContent"></div>
</div>

<script>
const API="https://dubrovka-webapp-production.up.railway.app";

const TABLES_CONFIG = [
  { id:"1", number:1, capacity:7 },
  { id:"2", number:2, capacity:5 },
  { id:"3", number:3, capacity:5 },
  { id:"4", number:4, capacity:5 },
  { id:"5", number:5, capacity:5 },
  { id:"6", number:6, capacity:3 },
  { id:"7", number:7, capacity:5 },
  { id:"8", number:8, capacity:5 },
  { id:"9", number:9, capacity:5 },
  { id:"10", number:10, capacity:5 },
  { id:"11", number:11, capacity:5 },
  { id:"12", number:12, capacity:7 }
];

let selectedTime=null;
let bookings=[];
let currentDate=new Date().toISOString().split("T")[0];

// TIME
function generateTimes(){
  let arr=[];
  for(let h=12;h<26;h++){
    for(let m=0;m<60;m+=30){
      let hh=h>=24?h-24:h;
      arr.push(`${String(hh).padStart(2,"0")}:${String(m).padStart(2,"0")}`);
    }
  }
  return arr;
}

function renderTimes(){
  let c=document.getElementById("times");
  c.innerHTML="";

  generateTimes().forEach(t=>{
    let el=document.createElement("div");
    el.className="time-slot";
    el.innerText=t;

    el.onclick=()=>{
      selectedTime=t;
      document.querySelectorAll(".time-slot").forEach(e=>e.classList.remove("selected"));
      el.classList.add("selected");
      renderTables();
    };

    c.appendChild(el);
  });
}

// BUSY
function isBusy(tableId){
  if(!selectedTime) return false;

  return bookings.some(b=>{
    if(b.table!=tableId || b.date!=currentDate) return false;

    let [h,m]=b.time.split(":").map(Number);
    let start=h*60+m;
    let end=start+(b.duration||2)*60;

    let [sh,sm]=selectedTime.split(":").map(Number);
    let cur=sh*60+sm;

    return cur>=start && cur<end;
  });
}

// TABLES
function renderTables(){
  let c=document.getElementById("tables");
  c.innerHTML="";

  TABLES_CONFIG.forEach(t=>{
    let busy=isBusy(t.id);

    let el=document.createElement("div");
    el.className="card "+(busy?"booked":"");

    el.innerHTML=`
      <div class="card-img">
        <div class="status">${busy?"Занят":"Свободно"}</div>
        <div class="dot"></div>
      </div>
      <div class="card-body">
        <div>№${t.number} стол</div>
        <div style="font-size:12px;color:#aaa;">👥 ${t.capacity}</div>
      </div>
    `;

    el.onclick=()=>{
      if(busy) return;
      openModal(t);
    };

    c.appendChild(el);
  });
}

// MODAL
function openModal(table){
  let m=document.getElementById("modal");
  let c=document.getElementById("modalContent");

  c.innerHTML=`
    <h3>Стол №${table.number}</h3>
    <p>Вместимость: ${table.capacity}</p>
    <button onclick="book('${table.id}')">Забронировать</button>
  `;

  m.classList.add("active");
}

// BOOK
window.book=async(tableId)=>{
  if(!selectedTime) return alert("Выбери время");

  await fetch(API+"/booking",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      table:tableId,
      time:selectedTime,
      date:currentDate,
      guests:2
    })
  });

  alert("Готово");
  document.getElementById("modal").classList.remove("active");
  init();
};

// API
async function load(){
  let res=await fetch(API+"/all_bookings");
  bookings=await res.json();
}

// INIT
async function init(){
  await load();
  renderTimes();
  renderTables();
}

init();
</script>

</body>
</html>

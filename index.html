<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#2b1208;
  color:white;
}

/* HEADER */
.top{
  background:#eee;
  color:black;
  padding:12px;
  display:flex;
  justify-content:space-between;
}

/* TIMELINE */
.timeline{
  background:#3b1509;
  padding:15px;
}

.slider{
  display:flex;
  overflow-x:auto;
  gap:8px;
}

.time{
  min-width:70px;
  text-align:center;
  padding:10px;
  background:#0003;
  border-radius:10px;
  cursor:pointer;
}

.time.active{
  background:white;
  color:black;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}

/* CARD */
.card{
  position:relative;
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

/* STATUS */
.status{
  position:absolute;
  top:8px;
  left:8px;
  padding:5px 8px;
  border-radius:6px;
  font-size:12px;
  background:#000a;
}

.green{background:#1f7a1f;}
.red{background:#a02020;}
.yellow{background:#aa8800;}

.dot{
  position:absolute;
  top:10px;
  right:10px;
  width:8px;
  height:8px;
  border-radius:50%;
}

.dot.green{background:#4cff4c;}
.dot.red{background:#ff4c4c;}
.dot.yellow{background:#ffc107;}

.info{
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  background:linear-gradient(to top,#000c,transparent);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  z-index:9999;
}

.modal.active{display:block;}

.header-modal{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#111;
}

.btn{
  margin:15px;
  padding:15px;
  background:#ddd;
  color:black;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="top">
  <div>Dubrovka Lounge</div>
  <div>+7‒913‒432‒01‒01</div>
</div>

<div class="timeline">
  <div>Выберите время</div>
  <div id="slider" class="slider"></div>
</div>

<div id="grid" class="grid"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="header-modal">
    <div onclick="closeModal()">←</div>
    <div id="modalTitle"></div>
    <div onclick="closeModal()">✕</div>
  </div>

  <img id="modalImg" src="https://via.placeholder.com/400x250">

  <div class="btn">Забронировать →</div>
</div>

<script>
const API="https://dubrovka-webapp-production.up.railway.app";

const slider=document.getElementById("slider");
const grid=document.getElementById("grid");

/* СТОЛЫ */
const TABLES=[
 {id:"1",cap:7,img:"https://via.placeholder.com/300x200"},
 {id:"2",cap:5,img:"https://via.placeholder.com/300x200"},
 {id:"3",cap:5,img:"https://via.placeholder.com/300x200"},
 {id:"4",cap:5,img:"https://via.placeholder.com/300x200"},
 {id:"5",cap:5,img:"https://via.placeholder.com/300x200"},
 {id:"6",cap:3,img:"https://via.placeholder.com/300x200"}
];

let selectedTime=null;
let busyTimesByTable={};

/* ===== ТВОЯ ДЛИТЕЛЬНОСТЬ ===== */
function getDuration(guests=2){
 if(guests<=2) return 90;
 if(guests<=4) return 120;
 return 240;
}

/* ===== ВРЕМЯ ===== */
function toMin(t){
 let [h,m]=t.split(":");
 return h*60+ +m;
}

function minToTime(m){
 let h=Math.floor(m/60);
 let min=m%60;
 return `${String(h).padStart(2,"0")}:${String(min).padStart(2,"0")}`;
}

/* ===== ТВОЯ ЛОГИКА СЛОТА ===== */
function getSlotStatus(time, busyTimes){

 let start=toMin(time);
 let duration=getDuration(2);
 let end=start+duration;

 // пересечение = занято
 for(let bt of busyTimes){
  let s=toMin(bt);
  let e=s+getDuration(5);

  if(start < e && end > s){
    return {status:"busy",from:bt,to:minToTime(e)};
  }
 }

 // ближайшая бронь
 let next=null;

 for(let bt of busyTimes){
  let s=toMin(bt);
  if(s>start){
    if(!next || s<toMin(next)) next=bt;
  }
 }

 if(next){
  let gap=toMin(next)-end;

  if(gap<90){
    return {status:"warning",to:next};
  }

  return {status:"free_until",to:next};
 }

 return {status:"free"};
}

/* ===== СТАТУС ДЛЯ КАРТОЧКИ ===== */
function getStatus(tableId){

 if(!selectedTime){
  return {text:"Выберите время"};
 }

 let busyTimes=busyTimesByTable[tableId] || [];

 let result=getSlotStatus(selectedTime,busyTimes);

 if(result.status==="busy"){
  return {
    text:`Занят с ${result.from}`,
    color:"red"
  };
 }

 if(result.status==="warning"){
  return {
    text:`⚠ До ${result.to}`,
    color:"yellow"
  };
 }

 if(result.status==="free_until"){
  return {
    text:`Свободно до ${result.to}`,
    color:"green"
  };
 }

 return {
  text:"Свободно",
  color:"green"
 };
}

/* ===== РЕНДЕР ===== */
function renderTables(){

 grid.innerHTML="";

 TABLES.forEach(t=>{
  let st=getStatus(t.id);

  let el=document.createElement("div");
  el.className="card";

  el.innerHTML=`
    <img src="${t.img}">
    <div class="status ${st.color||""}">${st.text}</div>
    <div class="dot ${st.color||""}"></div>
    <div class="info">№${t.id} 👥 ${t.cap}</div>
  `;

  el.onclick=()=>openModal(t);

  grid.appendChild(el);
 });
}

/* ===== ЗАГРУЗКА ===== */
async function loadBusy(){

 for(let t of TABLES){
  try{
    let res=await fetch(`${API}/busy_times?table=${t.id}`);
    let data=await res.json();
    busyTimesByTable[t.id]=data;
  }catch{
    busyTimesByTable[t.id]=[];
  }
 }

 renderTables();
}

/* ===== СЛАЙДЕР ===== */
for(let h=12;h<24;h++){
 let t=h+":00";

 let el=document.createElement("div");
 el.className="time";
 el.innerText=t;

 el.onclick=()=>{
  selectedTime=t;

  document.querySelectorAll(".time").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");

  renderTables();
 };

 slider.appendChild(el);
}

/* ===== MODAL ===== */
function openModal(table){
 document.getElementById("modal").classList.add("active");
 document.getElementById("modalTitle").innerText="Стол "+table.id;
 document.getElementById("modalImg").src=table.img;
}

function closeModal(){
 document.getElementById("modal").classList.remove("active");
}

/* INIT */
loadBusy();
</script>

</body>
</html>

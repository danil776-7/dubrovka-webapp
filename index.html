<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka Booking Pro</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:#fff;
}

/* GLASS */
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.08);
  padding:20px;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:20px;
}

/* TIME */
.time-scroll {
  display:flex;
  overflow-x:auto;
  gap:10px;
}

.time-slot {
  min-width:80px;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  text-align:center;
  cursor:pointer;
}

.time-slot.selected {
  background:linear-gradient(135deg,#d4af37,#facc15);
  color:black;
}

.time-slot.busy {
  opacity:0.3;
}

/* HALL MAP */
.hall-map {
  position:relative;
  height:350px;
}

.table {
  position:absolute;
  width:70px;
  height:70px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  background:rgba(255,255,255,0.06);
}

.table.selected {
  background:linear-gradient(135deg,#d4af37,#facc15);
  color:black;
}

.table.booked {
  opacity:0.3;
}

/* FORM */
input {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  margin-bottom:10px;
}

button {
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#d4af37,#facc15);
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <div>DUBROVKA</div>
  <div id="date"></div>
</div>

<div class="glass">
  <div>Время</div>
  <div id="times" class="time-scroll"></div>
</div>

<div class="glass" style="margin-top:20px;">
  <div>Карта зала</div>
  <div id="hall" class="hall-map"></div>
</div>

<div class="glass" style="margin-top:20px;">
  <input id="name" placeholder="Имя">
  <input id="phone" placeholder="Телефон">
  <input id="guests" type="number" value="1">
  <button id="book">Забронировать</button>
</div>

<script>
const API="https://dubrovka-webapp-production.up.railway.app";

let selectedTime=null;
let selectedTable=null;
let bookings=[];
let busyTimes={};

// Позиции столов (визуальная карта)
const TABLES=[
 {id:"1",x:20,y:20,cap:6},
 {id:"2",x:120,y:20,cap:4},
 {id:"3",x:220,y:20,cap:4},
 {id:"4",x:20,y:120,cap:6},
 {id:"5",x:120,y:120,cap:4},
 {id:"6",x:220,y:120,cap:4}
];

// ======================
// ДАТА
// ======================
function setDate(){
  let d=new Date();
  document.getElementById("date").innerText=d.toLocaleDateString();
}
setDate();

// ======================
// ВРЕМЯ
// ======================
function generateTimes(){
  let times=[];
  for(let h=12;h<26;h++){
    for(let m=0;m<60;m+=10){
      let hh=h>=24?h-24:h;
      times.push(`${String(hh).padStart(2,"0")}:${String(m).padStart(2,"0")}`);
    }
  }
  return times;
}

function renderTimes(){
  let container=document.getElementById("times");
  container.innerHTML="";
  generateTimes().forEach(t=>{
    let el=document.createElement("div");
    el.className="time-slot";
    el.innerText=t;

    if(busyTimes[t]) el.classList.add("busy");

    el.onclick=()=>{
      if(el.classList.contains("busy")) return;
      selectedTime=t;
      document.querySelectorAll(".time-slot").forEach(e=>e.classList.remove("selected"));
      el.classList.add("selected");
      renderTables();
    };

    container.appendChild(el);
  });
}

// ======================
// КАРТА ЗАЛА
// ======================
function renderTables(){
  let hall=document.getElementById("hall");
  hall.innerHTML="";

  TABLES.forEach(t=>{
    let el=document.createElement("div");
    el.className="table";
    el.style.left=t.x+"px";
    el.style.top=t.y+"px";
    el.innerText=t.id;

    if(isTableBusy(t.id)) el.classList.add("booked");

    el.onclick=()=>{
      if(el.classList.contains("booked")) return;
      selectedTable=t.id;
      document.querySelectorAll(".table").forEach(e=>e.classList.remove("selected"));
      el.classList.add("selected");
    };

    hall.appendChild(el);
  });
}

function isTableBusy(id){
  if(!selectedTime) return false;
  return bookings.some(b=>b.table==id && b.time==selectedTime);
}

// ======================
// API
// ======================
async function loadBookings(){
  let res=await fetch(API+"/all_bookings");
  bookings=await res.json();
}

// ======================
// ДЛИТЕЛЬНОСТЬ
// ======================
function getDuration(g){
  if(g>=5) return 3;
  return 2;
}

// ======================
// БРОНЬ
// ======================
document.getElementById("book").onclick=async()=>{
  let name=document.getElementById("name").value;
  let phone=document.getElementById("phone").value;
  let guests=parseInt(document.getElementById("guests").value);

  if(!selectedTable||!selectedTime) return alert("Выберите время и стол");

  let data={
    name,
    phone,
    guests,
    table:selectedTable,
    time:selectedTime,
    duration:getDuration(guests)
  };

  await fetch(API+"/booking",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  alert("Бронь создана");
  init();
};

// ======================
async function init(){
  await loadBookings();
  renderTimes();
  renderTables();
}

init();
</script>

</body>
</html>

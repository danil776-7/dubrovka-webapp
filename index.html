<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dubrovka Lounge</title>

<style>

/* ===== ВИДЕО ФОН ===== */
video.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* затемнение */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

/* ===== ОСНОВА ===== */
body{
margin:0;
font-family:Arial;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* контейнер */
.container{
width:420px;
max-width:95%;
background:rgba(20,20,20,0.9);
padding:20px;
border-radius:16px;
backdrop-filter: blur(10px);
}

/* логотип */
.logo{
display:flex;
justify-content:center;
margin-bottom:10px;
}

.logo img{
width:120px;
}

/* заголовок */
h1{
text-align:center;
margin-bottom:15px;
}

/* столы */
.tables{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:10px;
}

.table{
padding:15px;
background:#1a1a1a;
border-radius:10px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.table:hover{
background:#222;
}

.table.active{
background:#ffcc00;
color:#000;
}

/* VIP */
.vip{
grid-column:1/3;
}

/* описание */
.info{
font-size:13px;
margin-bottom:10px;
color:#ccc;
}

/* поля */
input, select{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:none;
background:#1a1a1a;
color:#fff;
}

/* кнопка */
button{
width:100%;
padding:14px;
background:#ffcc00;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* ===== АДАПТАЦИЯ ===== */
max-width:600px{

.container{
width:100%;
height:100vh;
border-radius:0;
}

.tables{
grid-template-columns:1fr;
}

.vip{
grid-column:1;
}

.logo img{
width:100px;
}

}

</style>
</head>

<body>

<!-- 🎥 ВИДЕО -->
<video autoplay muted loop class="bg">
<source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

<!-- 🔥 ЛОГО -->
<div class="logo">
<img src="logo.png">
</div>

<h1>Dubrovka Lounge</h1>

<!-- СТОЛЫ -->
<div class="tables">
<div class="table" data-table="1">1</div>
<div class="table" data-table="2">2</div>
<div class="table" data-table="3">3</div>
<div class="table" data-table="4">4</div>
<div class="table" data-table="5">5</div>
<div class="table" data-table="6">6</div>
<div class="table vip" data-table="VIP">VIP</div>
</div>

<div id="tableInfo" class="info">Выберите стол</div>

<!-- ФОРМА -->
<input type="date" id="date">
<select id="time"></select>
<input type="number" id="guests" placeholder="Количество гостей" min="1" max="20">
<input type="text" id="name" placeholder="Имя">
<input type="tel" id="phone" placeholder="Телефон">

<button id="bookBtn">Забронировать</button>

</div>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka Lounge</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
  background:#2b1208;
  color:#fff;
}

/* HEADER */
.header{
  background:#eee;
  color:#000;
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;
  padding:12px;
}

.card{
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  transition:.3s;
}
.card:hover{transform:scale(1.03)}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card-info{
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  background:linear-gradient(transparent,rgba(0,0,0,0.8));
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}
.modal.active{
  opacity:1;
  pointer-events:auto;
}

.box{
  width:420px;
  background:#111;
  border-radius:14px;
  overflow:hidden;
  transform:translateY(20px);
  transition:.3s;
}
.modal.active .box{
  transform:translateY(0);
}

.header-modal{
  padding:14px;
  background:#1c1c1c;
  display:flex;
  justify-content:space-between;
}

/* TIME GRID */
.time-grid{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding:12px;
}

.slot{
  width:70px;
  padding:12px;
  text-align:center;
  border-radius:8px;
  background:#1c1c1c;
  border:1px solid #333;
  cursor:pointer;
  transition:.2s;
}
.slot:hover{transform:scale(1.05)}

.slot.active{
  background:#fff;
  color:#000;
}

.slot.range{
  background:#444;
}

/* BUTTON */
.btn{
  margin:12px;
  padding:14px;
  text-align:center;
  background:#fff;
  color:#000;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
}
.btn.disabled{
  background:#555;
  color:#aaa;
  cursor:not-allowed;
}

/* INPUT */
input{
  width:calc(100% - 24px);
  margin:8px 12px;
  padding:14px;
  border-radius:10px;
  border:1px solid #333;
  background:#1c1c1c;
  color:#fff;
}

/* MOBILE */
@media(max-width:500px){
  .box{width:95%}
}
</style>
</head>

<body>

<div class="header">
  <b>DUBROVKA</b>
  <div>+7‒913‒432‒01‒01</div>
</div>

<div id="grid" class="grid"></div>

<!-- TABLE -->
<div id="tableModal" class="modal">
  <div class="box">
    <div class="header-modal">
      <div>Стол №<span id="tableId"></span></div>
      <div onclick="closeTable()">✕</div>
    </div>
    <img id="tableImg" style="width:100%;height:200px;object-fit:cover">
    <div class="btn" onclick="openTime()">Забронировать</div>
  </div>
</div>

<!-- TIME -->
<div id="timeModal" class="modal">
  <div class="box">
    <div class="header-modal">
      <div>Дата и время</div>
      <div onclick="closeTime()">✕</div>
    </div>

    <input type="date" id="dateInput">

    <div style="padding:12px">
      С: <b id="from">--</b><br>
      До: <b id="to">--</b>
    </div>

    <div id="timeGrid" class="time-grid"></div>

    <div id="continueBtn" class="btn disabled">Продолжить</div>
  </div>
</div>

<!-- FORM -->
<div id="formModal" class="modal">
  <div class="box">
    <div class="header-modal">
      <div>Бронирование</div>
      <div onclick="closeForm()">✕</div>
    </div>

    <input id="name" placeholder="Имя">
    <input id="phone" placeholder="+7 XXX XXX XX XX" maxlength="18">
    <input id="guests" type="number" min="1" max="20" value="2">

    <div class="btn" onclick="book()">Подтвердить</div>
  </div>
</div>

<script>

/* TABLES */
const TABLES=[
 {id:1,img:"https://images.unsplash.com/photo-1552566626-52f8b828add9"},
 {id:2,img:"https://images.unsplash.com/photo-1555396273-367ea4eb4db5"},
 {id:3,img:"https://images.unsplash.com/photo-1565299624946-b28f40a0ae38"},
 {id:4,img:"https://images.unsplash.com/photo-1541542684-4a0f6a1d1a66"},
 {id:5,img:"https://images.unsplash.com/photo-1559339352-11d035aa65de"},
 {id:6,img:"https://images.unsplash.com/photo-1559339352-11d035aa65de"},
 {id:"VIP",img:"https://images.unsplash.com/photo-1559339352-11d035aa65de"}
];

let selectedTable=null;
let selectedFrom=null;
let selectedTo=null;

/* RENDER */
function render(){
  grid.innerHTML="";
  TABLES.forEach(t=>{
    let el=document.createElement("div");
    el.className="card";
    el.innerHTML=`
      <img src="${t.img}">
      <div class="card-info">Стол ${t.id}</div>
    `;
    el.onclick=()=>openTable(t);
    grid.appendChild(el);
  });
}

/* TABLE */
function openTable(t){
  selectedTable=t.id;
  tableId.innerText=t.id;
  tableImg.src=t.img;
  tableModal.classList.add("active");
}
function closeTable(){tableModal.classList.remove("active")}

/* TIME */
function openTime(){
  closeTable();
  timeModal.classList.add("active");

  selectedFrom=null;
  selectedTo=null;

  from.innerText="--";
  to.innerText="--";

  continueBtn.classList.add("disabled");

  dateInput.value=new Date().toISOString().split("T")[0];

  renderTimeGrid();
}
function closeTime(){timeModal.classList.remove("active")}

/* TIME GRID */
function renderTimeGrid(){
  timeGrid.innerHTML="";

  for(let h=12;h<24;h++){
    ["00","30"].forEach(m=>{
      let t=`${String(h).padStart(2,'0')}:${m}`;

      let el=document.createElement("div");
      el.className="slot";
      el.innerText=t;

      el.onclick=()=>{

        if(!selectedFrom){
          selectedFrom=t;
          from.innerText=t;
          reset();
          el.classList.add("active");
          return;
        }

        if(selectedFrom && !selectedTo){

          if(t <= selectedFrom){
            selectedFrom=t;
            from.innerText=t;
            reset();
            el.classList.add("active");
            return;
          }

          selectedTo=t;
          to.innerText=t;

          highlight();

          continueBtn.classList.remove("disabled");
          return;
        }

        selectedFrom=t;
        selectedTo=null;

        from.innerText=t;
        to.innerText="--";

        continueBtn.classList.add("disabled");

        reset();
        el.classList.add("active");
      };

      timeGrid.appendChild(el);
    });
  }
}

function reset(){
  document.querySelectorAll(".slot").forEach(x=>{
    x.classList.remove("active","range");
  });
}

function highlight(){
  document.querySelectorAll(".slot").forEach(el=>{
    let t=el.innerText;
    if(t > selectedFrom && t < selectedTo){
      el.classList.add("range");
    }
    if(t === selectedTo){
      el.classList.add("active");
    }
  });
}

/* CONTINUE */
continueBtn.onclick=()=>{
  if(!selectedFrom || !selectedTo) return;
  timeModal.classList.remove("active");
  formModal.classList.add("active");
}

/* FORM */
function closeForm(){formModal.classList.remove("active")}

/* PHONE MASK */
phone.oninput=()=>{
  let v=phone.value.replace(/\D/g,"").substring(0,11);
  if(!v.startsWith("7")) v="7"+v;

  let f="+7";
  if(v.length>1) f+=" "+v.substring(1,4);
  if(v.length>4) f+=" "+v.substring(4,7);
  if(v.length>7) f+=" "+v.substring(7,9);
  if(v.length>9) f+=" "+v.substring(9,11);

  phone.value=f;
}

/* BOOK */
function book(){
  alert(`Бронь:\nСтол: ${selectedTable}\n${selectedFrom}-${selectedTo}`);
}

/* INIT */
render();

</script>

</body>
</html>

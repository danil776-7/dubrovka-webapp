<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="google" content="notranslate">
<title>Dubrovka Lounge & Bar</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
  background: #0a0a0f;
  color: #ffffff;
  min-height: 100vh;
}

.video-background {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  opacity: 0.3;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
  position: relative;
  z-index: 1;
}

/* Шапка */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 20px;
  margin-bottom: 30px;
  padding-bottom: 20px;
  border-bottom: 1px solid rgba(212, 175, 55, 0.2);
}

.logo-container {
  display: flex;
  align-items: center;
  gap: 15px;
}

.logo-img {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #d4af37;
}

.logo-text {
  font-size: 24px;
  font-weight: 700;
  background: linear-gradient(135deg, #d4af37 0%, #f5e5a3 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logo-subtitle {
  font-size: 11px;
  color: #d4af37;
  letter-spacing: 2px;
}

.date-info {
  text-align: right;
}

.date-info .day {
  font-size: 14px;
  color: #888;
}

.date-info .date {
  font-size: 24px;
  font-weight: 600;
  color: #d4af37;
}

/* Основная сетка */
.main-grid {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 30px;
}

@media (max-width: 768px) {
  .main-grid {
    grid-template-columns: 1fr;
  }
  .container {
    padding: 15px;
  }
  .header {
    flex-direction: column;
    text-align: center;
  }
  .date-info {
    text-align: center;
  }
}

/* Схема зала */
.hall-scheme {
  background: rgba(20, 20, 30, 0.6);
  border-radius: 20px;
  padding: 20px;
  border: 1px solid rgba(212, 175, 55, 0.2);
}

.hall-title {
  font-size: 18px;
  color: #d4af37;
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(212, 175, 55, 0.3);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.hall-stats {
  font-size: 12px;
  color: #888;
}

.tables-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
}

@media (min-width: 768px) {
  .tables-grid {
    grid-template-columns: repeat(4, 1fr);
  }
}

@media (min-width: 1024px) {
  .tables-grid {
    grid-template-columns: repeat(6, 1fr);
  }
}

.table-card {
  background: rgba(30, 30, 40, 0.9);
  border-radius: 12px;
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
  border: 1px solid rgba(212, 175, 55, 0.2);
  text-align: center;
  position: relative;
}

.table-card:hover {
  background: rgba(212, 175, 55, 0.15);
  transform: translateY(-2px);
  border-color: rgba(212, 175, 55, 0.5);
}

.table-card.selected {
  background: linear-gradient(135deg, #d4af37 0%, #b88d2a 100%);
  color: #0a0a0f;
  border-color: #d4af37;
  box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
}

.table-card.booked {
  opacity: 0.5;
  cursor: not-allowed;
  background: rgba(50, 50, 60, 0.9);
  border-color: rgba(220, 53, 69, 0.3);
}

.table-card.booked:hover {
  transform: none;
  background: rgba(50, 50, 60, 0.9);
}

.table-number {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 5px;
}

.table-capacity {
  font-size: 10px;
  color: #888;
  margin-bottom: 8px;
}

.table-status {
  font-size: 10px;
  padding: 3px 6px;
  border-radius: 12px;
  display: inline-block;
}

.status-free {
  background: rgba(46, 204, 113, 0.2);
  color: #2ecc71;
}

.status-booked {
  background: rgba(220, 53, 69, 0.2);
  color: #ff6b6b;
}

.table-until {
  font-size: 9px;
  color: #ffc107;
  margin-top: 5px;
}

/* Панель бронирования */
.booking-panel {
  background: rgba(20, 20, 30, 0.8);
  border-radius: 20px;
  padding: 20px;
  border: 1px solid rgba(212, 175, 55, 0.2);
  position: sticky;
  top: 20px;
}

.panel-title {
  font-size: 16px;
  font-weight: 600;
  color: #d4af37;
  margin-bottom: 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(212, 175, 55, 0.3);
}

.selected-table-info {
  background: rgba(30, 30, 40, 0.8);
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 20px;
  text-align: center;
}

.selected-table-number {
  font-size: 28px;
  font-weight: 700;
  color: #d4af37;
}

.selected-table-capacity {
  font-size: 12px;
  color: #888;
  margin-top: 5px;
}

/* Выбор времени */
.time-selector {
  margin-bottom: 20px;
}

.time-label {
  font-size: 12px;
  color: #888;
  margin-bottom: 8px;
  display: block;
}

.time-scroll {
  max-height: 200px;
  overflow-y: auto;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 5px;
}

.time-slot {
  padding: 10px 12px;
  background: rgba(30, 30, 40, 0.9);
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s ease;
  border: 1px solid rgba(212, 175, 55, 0.2);
  font-size: 13px;
  font-weight: 500;
  min-width: 70px;
}

.time-slot:hover {
  background: rgba(212, 175, 55, 0.2);
  transform: scale(1.02);
}

.time-slot.selected {
  background: #d4af37;
  color: #0a0a0f;
  border-color: #d4af37;
}

.time-slot.busy {
  background: rgba(220, 53, 69, 0.2);
  border-color: rgba(220, 53, 69, 0.3);
  color: #ff8a7a;
  cursor: not-allowed;
  opacity: 0.6;
  text-decoration: line-through;
}

.time-slot.busy:hover {
  transform: none;
}

/* Форма */
.input-group {
  margin-bottom: 15px;
}

.input-group input {
  width: 100%;
  padding: 12px 15px;
  border-radius: 12px;
  border: 1px solid rgba(212, 175, 55, 0.3);
  background: rgba(30, 30, 40, 0.9);
  color: #ffffff;
  font-size: 14px;
  transition: all 0.2s ease;
}

.input-group input:focus {
  outline: none;
  border-color: #d4af37;
  box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
}

.input-group input::placeholder {
  color: #6b6b7a;
}

.book-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #d4af37 0%, #b88d2a 100%);
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 700;
  font-size: 16px;
  margin-top: 10px;
  color: #0a0a0f;
  transition: all 0.2s ease;
}

.book-btn:hover {
  background: linear-gradient(135deg, #e5c14a 0%, #c99f32 100%);
  transform: translateY(-2px);
  box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
}

.book-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.warning-message {
  background: rgba(255, 193, 7, 0.15);
  padding: 10px;
  border-radius: 10px;
  margin: 10px 0;
  display: none;
  color: #ffc107;
  text-align: center;
  font-size: 11px;
  border-left: 3px solid #ffc107;
}

.hookah-warning {
  background: rgba(212, 175, 55, 0.1);
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  display: none;
  color: #d4af37;
  text-align: center;
  font-size: 11px;
}

/* Футер */
.footer {
  margin-top: 30px;
  text-align: center;
  font-size: 11px;
  color: #6b6b7a;
  border-top: 1px solid rgba(212, 175, 55, 0.2);
  padding-top: 20px;
}

.map-btn {
  display: inline-block;
  margin-top: 8px;
  padding: 6px 18px;
  background: rgba(20, 20, 30, 0.9);
  border-radius: 20px;
  text-decoration: none;
  color: #d4af37;
  font-size: 11px;
  transition: all 0.2s ease;
  border: 1px solid rgba(212, 175, 55, 0.3);
}

.map-btn:hover {
  background: #d4af37;
  color: #0a0a0f;
}

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-15px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

::-webkit-scrollbar {
  width: 4px;
}

::-webkit-scrollbar-track {
  background: rgba(30, 30, 40, 0.5);
  border-radius: 10px;
}

::-webkit-scrollbar-thumb {
  background: #d4af37;
  border-radius: 10px;
}
</style>
</head>

<body>
<video class="video-background" autoplay muted loop playsinline>
  <source src="bg.mp4" type="video/mp4">
</video>

<div class="container">
  <!-- Шапка -->
  <div class="header">
    <div class="logo-container">
      <img src="logo.png" alt="Dubrovka Lounge & Bar" class="logo-img" onerror="this.style.display='none'">
      <div>
        <div class="logo-text">DUBROVKA</div>
        <div class="logo-subtitle">LOUNGE & BAR</div>
      </div>
    </div>
    <div class="date-info" id="dateInfo">
      <div class="day" id="dayName"></div>
      <div class="date" id="currentDate"></div>
    </div>
  </div>

  <!-- Основная сетка -->
  <div class="main-grid">
    <!-- Схема зала -->
    <div class="hall-scheme">
      <div class="hall-title">
        ОСНОВНОЙ ЗАЛ
        <span class="hall-stats" id="hallStats"></span>
      </div>
      <div id="tablesGrid" class="tables-grid">
        <div class="loading">Загрузка схемы столов...</div>
      </div>
    </div>

    <!-- Панель бронирования -->
    <div class="booking-panel">
      <div class="panel-title">🍷 БРОНИРОВАНИЕ</div>
      
      <div id="selectedTableInfo" class="selected-table-info">
        <div class="selected-table-number">—</div>
        <div class="selected-table-capacity">Выберите стол</div>
      </div>

      <div class="time-selector">
        <div class="time-label">⏰ ВЫБЕРИТЕ ВРЕМЯ</div>
        <div id="timeScroll" class="time-scroll">
          <div style="text-align:center;padding:20px;color:#888;">Сначала выберите стол</div>
        </div>
      </div>

      <div class="input-group">
        <input type="number" id="guests" placeholder="👥 КОЛИЧЕСТВО ГОСТЕЙ" min="1" max="20" step="1" value="1">
      </div>
      <div class="input-group">
        <input type="text" id="name" placeholder="👤 ВАШЕ ИМЯ" autocomplete="name">
      </div>
      <div class="input-group">
        <input type="tel" id="phone" placeholder="📞 ТЕЛЕФОН (+7XXXXXXXXXX)" maxlength="12" autocomplete="tel">
      </div>

      <div id="hookahWarning" class="hookah-warning">
        💨 Для компаний от 5 человек обязательно бронирование 2 кальянов
      </div>
      <div id="warningMessage" class="warning-message"></div>

      <button id="bookBtn" class="book-btn">ЗАБРОНИРОВАТЬ</button>
    </div>
  </div>

  <div class="footer">
    <p>📍 Ермакова 11, Новокузнецк</p>
    <p>📞 +7‒913‒432‒01‒01</p>
    <a class="map-btn" href="https://2gis.ru/novokuznetsk/geo/70000001067987554" target="_blank">🗺 ОТКРЫТЬ В 2ГИС</a>
  </div>
</div>

<script>
const API = "https://dubrovka-webapp-production.up.railway.app";

// Конфигурация столов
const TABLES_CONFIG = [
  { id: "1", number: 1, capacity: 7, x: 1, y: 1 },
  { id: "2", number: 2, capacity: 5, x: 2, y: 1 },
  { id: "3", number: 3, capacity: 5, x: 3, y: 1 },
  { id: "4", number: 4, capacity: 5, x: 4, y: 1 },
  { id: "5", number: 5, capacity: 5, x: 1, y: 2 },
  { id: "6", number: 6, capacity: 3, x: 2, y: 2 },
  { id: "7", number: 7, capacity: 5, x: 3, y: 2 },
  { id: "8", number: 8, capacity: 5, x: 4, y: 2 },
  { id: "9", number: 9, capacity: 5, x: 1, y: 3 },
  { id: "10", number: 10, capacity: 5, x: 2, y: 3 },
  { id: "11", number: 11, capacity: 5, x: 3, y: 3 },
  { id: "12", number: 12, capacity: 7, x: 4, y: 3 }
];

const TABLE_CAPACITY = {
  "1": 7, "2": 5, "3": 5, "4": 5, "5": 5, "6": 3,
  "7": 5, "8": 5, "9": 5, "10": 5, "11": 5, "12": 7
};

document.addEventListener("DOMContentLoaded", () => {
const tg = window.Telegram.WebApp;
if(tg) tg.expand();

const phoneInput = document.getElementById("phone");
const nameInput = document.getElementById("name");
const guestsInput = document.getElementById("guests");
const timeScroll = document.getElementById("timeScroll");
const warningMessage = document.getElementById("warningMessage");
const tablesGrid = document.getElementById("tablesGrid");
const bookBtn = document.getElementById("bookBtn");
const hookahWarning = document.getElementById("hookahWarning");
const selectedTableNumberDiv = document.querySelector(".selected-table-number");
const selectedTableCapacityDiv = document.querySelector(".selected-table-capacity");

let selectedTable = null;
let selectedTime = null;
let userChatId = null;
let currentDate = null;
let busyTimes = {};
let allBookings = [];

if(tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
  const user = tg.initDataUnsafe.user;
  userChatId = user.id;
  if(user.first_name) nameInput.value = user.first_name;
  if(user.last_name && nameInput.value) nameInput.value += " " + user.last_name;
}

// =====================
// ДАТА
// =====================
function updateDateDisplay() {
  const now = new Date();
  const days = ['ВОСКРЕСЕНЬЕ', 'ПОНЕДЕЛЬНИК', 'ВТОРНИК', 'СРЕДА', 'ЧЕТВЕРГ', 'ПЯТНИЦА', 'СУББОТА'];
  const months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
  
  document.getElementById('dayName').textContent = days[now.getDay()];
  document.getElementById('currentDate').textContent = `${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
  
  const year = now.getFullYear();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function getWorkingHours(date) {
  const day = new Date(date).getDay();
  if (day === 5 || day === 6) {
    return { start: 12, end: 26, text: "ПТ-СБ: 12:00 - 02:00" };
  } else {
    return { start: 12, end: 25, text: "ВС-ЧТ: 12:00 - 01:00" };
  }
}

// =====================
// ГЕНЕРАЦИЯ ВРЕМЕНИ С ШАГОМ 10 МИНУТ
// =====================
function generateTimeOptions(date) {
  let times = [];
  let workingHours = getWorkingHours(date);
  let startHour = workingHours.start;
  let endHour = workingHours.end;
  
  for(let h = startHour; h < endHour; h++) {
    for(let m = 0; m < 60; m += 10) {
      let displayHour = h >= 24 ? h - 24 : h;
      let time = `${String(displayHour).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
      times.push(time);
    }
  }
  return times;
}

// =====================
// ЗАГРУЗКА ВСЕХ БРОНЕЙ
// =====================
async function loadAllBookings() {
  try {
    let res = await fetch(`${API}/all_bookings`);
    let data = await res.json();
    allBookings = Array.isArray(data) ? data : [];
    console.log("📅 Загружено броней:", allBookings.length);
    return allBookings;
  } catch(e) {
    console.error(e);
    return [];
  }
}

// =====================
// ЗАГРУЗКА СХЕМЫ СТОЛОВ
// =====================
async function loadTablesStatus() {
  if(!currentDate) return;
  
  try {
    await loadAllBookings();
    
    let html = '';
    let freeCount = 0;
    let bookedCount = 0;
    
    TABLES_CONFIG.forEach(table => {
      let isBusy = isTableBooked(table.id, currentDate);
      let untilTime = getTableFreeUntil(table.id, currentDate);
      
      if(isBusy) {
        bookedCount++;
      } else {
        freeCount++;
      }
      
      let statusClass = isBusy ? 'status-booked' : 'status-free';
      let statusText = isBusy ? '🔴 ЗАНЯТ' : '🟢 СВОБОДЕН';
      let untilHtml = '';
      
      if(isBusy && untilTime) {
        untilHtml = `<div class="table-until">📅 до ${untilTime}</div>`;
      }
      
      html += `
        <div class="table-card ${isBusy ? 'booked' : ''}" data-table-id="${table.id}" data-table-number="${table.number}" data-table-capacity="${table.capacity}">
          <div class="table-number">СТОЛ ${table.number}</div>
          <div class="table-capacity">👥 ${table.capacity} чел.</div>
          <div class="table-status ${statusClass}">${statusText}</div>
          ${untilHtml}
        </div>
      `;
    });
    
    tablesGrid.innerHTML = html;
    document.getElementById('hallStats').textContent = `🟢 Свободно: ${freeCount} | 🔴 Занято: ${bookedCount}`;
    
    // Добавляем обработчики
    document.querySelectorAll('.table-card').forEach(el => {
      el.onclick = () => {
        if(el.classList.contains('booked')) {
          showError("❌ Этот стол уже забронирован на выбранную дату");
          return;
        }
        
        document.querySelectorAll('.table-card').forEach(t => t.classList.remove('selected'));
        el.classList.add('selected');
        
        let tableId = el.dataset.tableId;
        let tableNumber = el.dataset.tableNumber;
        let capacity = el.dataset.tableCapacity;
        
        selectedTable = tableId;
        selectedTableNumberDiv.textContent = `СТОЛ ${tableNumber}`;
        selectedTableCapacityDiv.textContent = `Вместимость: ${capacity} человек`;
        
        guestsInput.max = capacity;
        guestsInput.placeholder = `👥 ГОСТЕЙ (МАКС. ${capacity})`;
        
        let currentGuests = parseInt(guestsInput.value) || 1;
        if(currentGuests > capacity) {
          guestsInput.value = capacity;
        }
        
        loadAvailableTimes(tableId);
        warningMessage.style.display = "none";
      };
    });
    
  } catch(e) {
    console.error(e);
  }
}

function isTableBooked(tableId, date) {
  return allBookings.some(b => 
    b.table === tableId && 
    b.date === date && 
    b.status === "active"
  );
}

function getTableFreeUntil(tableId, date) {
  let booking = allBookings.find(b => 
    b.table === tableId && 
    b.date === date && 
    b.status === "active"
  );
  
  if(booking) {
    let [hours, minutes] = booking.time.split(':').map(Number);
    let endHour = hours + 2;
    let endMinute = minutes;
    if(endHour >= 24) {
      endHour = endHour - 24;
    }
    return `${String(endHour).padStart(2, '0')}:${String(endMinute).padStart(2, '0')}`;
  }
  return null;
}

// =====================
// ЗАГРУЗКА ДОСТУПНЫХ ВРЕМЕН ДЛЯ СТОЛА
// =====================
async function loadAvailableTimes(tableId) {
  if(!currentDate || !tableId) return;
  
  try {
    let res = await fetch(`${API}/busy_times?date=${currentDate}&table=${tableId}`);
    let busy = await res.json();
    busy = Array.isArray(busy) ? busy : [];
    
    let allTimes = generateTimeOptions(currentDate);
    let now = new Date();
    let html = '';
    
    allTimes.forEach(time => {
      let [h,m] = time.split(":");
      let slot = new Date(currentDate);
      let hour = parseInt(h);
      slot.setHours(hour, m);
      
      let isPast = slot < now;
      let isBusy = busy.includes(time);
      
      let statusClass = '';
      let onclick = '';
      
      if(isPast) {
        statusClass = 'busy';
      } else if(isBusy) {
        statusClass = 'busy';
      } else {
        statusClass = '';
        onclick = `selectTime('${time}')`;
      }
      
      html += `<div class="time-slot ${statusClass}" onclick="${onclick}">${time}</div>`;
    });
    
    timeScroll.innerHTML = html;
    
  } catch(e) {
    console.error(e);
  }
}

window.selectTime = (time) => {
  selectedTime = time;
  document.querySelectorAll('.time-slot').forEach(slot => slot.classList.remove('selected'));
  const slots = document.querySelectorAll('.time-slot');
  for (let slot of slots) {
    if (slot.innerText === time) {
      slot.classList.add('selected');
      break;
    }
  }
  warningMessage.style.display = "none";
};

// =====================
// УТИЛИТЫ
// =====================
function showError(message) {
  const errorDiv = document.createElement('div');
  errorDiv.style.cssText = `
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(220, 53, 69, 0.95);
    color: white;
    padding: 12px 20px;
    border-radius: 12px;
    z-index: 10000;
    font-size: 13px;
    font-weight: 500;
    animation: fadeInDown 0.3s ease-out;
    max-width: 90%;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  `;
  errorDiv.innerHTML = `❌ ${message}`;
  document.body.appendChild(errorDiv);
  setTimeout(() => errorDiv.remove(), 3500);
}

function showSuccess(message) {
  const successDiv = document.createElement('div');
  successDiv.style.cssText = `
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #2ecc71;
    color: white;
    padding: 12px 20px;
    border-radius: 12px;
    z-index: 10000;
    font-size: 13px;
    font-weight: 500;
    animation: fadeInDown 0.3s ease-out;
    max-width: 90%;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  `;
  successDiv.innerHTML = `✅ ${message}`;
  document.body.appendChild(successDiv);
  setTimeout(() => successDiv.remove(), 3500);
}

// =====================
// ОБРАБОТЧИКИ
// =====================
guestsInput.addEventListener("input", (e) => {
  let guests = parseInt(e.target.value) || 1;
  if (guests < 1) e.target.value = 1;
  if (guests > 20) { e.target.value = 20; showError("Максимум 20 гостей"); }
  if (selectedTable && guests > TABLE_CAPACITY[selectedTable]) {
    showError(`СТОЛ ${selectedTable} ВМЕЩАЕТ ${TABLE_CAPACITY[selectedTable]} ГОСТЕЙ!`);
  }
  if (selectedTable && guests >= 5) hookahWarning.style.display = "block";
  else hookahWarning.style.display = "none";
});

phoneInput.addEventListener("input", () => {
  let v = phoneInput.value.replace(/\D/g,"");
  if(!v.startsWith("7")) v = "7" + v;
  v = v.slice(0,11);
  phoneInput.value = "+" + v;
});

// =====================
// БРОНИРОВАНИЕ
// =====================
bookBtn.onclick = async () => {
  if(!selectedTable) { showError("ВЫБЕРИТЕ СТОЛ"); return; }
  if(!selectedTime) { showError("ВЫБЕРИТЕ ВРЕМЯ"); return; }
  
  let nameVal = nameInput.value.trim();
  let phoneVal = phoneInput.value;
  let guestsVal = parseInt(guestsInput.value || 0);
  let maxGuests = TABLE_CAPACITY[selectedTable];
  
  if(!nameVal) { showError("ВВЕДИТЕ ИМЯ"); return; }
  if(phoneVal.length !== 12) { showError("НЕВЕРНЫЙ НОМЕР (+7XXXXXXXXXX)"); return; }
  if(guestsVal < 1) { showError("УКАЖИТЕ КОЛИЧЕСТВО ГОСТЕЙ"); return; }
  if(guestsVal > maxGuests) { showError(`СТОЛ ${selectedTable} ВМЕЩАЕТ ${maxGuests} ГОСТЕЙ!`); return; }
  
  if(guestsVal >= 5) {
    let confirmHookah = confirm(`💨 ВНИМАНИЕ!\n\nДля компании из ${guestsVal} человек обязательно бронирование 2 кальянов.\n\nВы подтверждаете, что согласны с этим условием?`);
    if(!confirmHookah) { showError("Требуется согласие на заказ кальянов"); return; }
  }
  
  let data = {
    name: nameVal,
    phone: phoneVal,
    guests: guestsVal,
    table: selectedTable,
    date: currentDate,
    time: selectedTime,
    chat_id: userChatId
  };
  
  try {
    bookBtn.disabled = true;
    bookBtn.textContent = "ОТПРАВКА...";
    
    let res = await fetch(API + "/booking", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(data)
    });
    let result = await res.json();
    
    if (result.error || result.detail) {
      showError("❌ Этот стол уже занят в выбранное время");
      await loadTablesStatus();
      if(selectedTable) await loadAvailableTimes(selectedTable);
      return;
    }
    
    if(result.ok || result.id) {
      if(tg) tg.sendData(JSON.stringify(data));
      showSuccess(`🎉 БРОНЬ СОЗДАНА!\n\n🪑 Стол ${selectedTable}\n⏰ ${selectedTime}\n👥 ${guestsVal} гостей\n👤 ${nameVal}\n\nПодтверждение отправлено в Telegram!`);
      
      nameInput.value = "";
      guestsInput.value = "1";
      selectedTime = null;
      selectedTable = null;
      selectedTableNumberDiv.textContent = "—";
      selectedTableCapacityDiv.textContent = "Выберите стол";
      document.querySelectorAll(".table-card").forEach(t => t.classList.remove("selected"));
      document.querySelectorAll(".time-slot").forEach(t => t.classList.remove("selected"));
      hookahWarning.style.display = "none";
      await loadTablesStatus();
      timeScroll.innerHTML = '<div style="text-align:center;padding:20px;color:#888;">Сначала выберите стол</div>';
    } else {
      showError("ОШИБКА: " + (result.detail || "НЕИЗВЕСТНАЯ ОШИБКА"));
    }
  } catch(e) {
    console.error(e);
    showError("❌ ОШИБКА СОЕДИНЕНИЯ С СЕРВЕРОМ");
  } finally {
    bookBtn.disabled = false;
    bookBtn.textContent = "ЗАБРОНИРОВАТЬ";
  }
};

// =====================
// ИНИЦИАЛИЗАЦИЯ
// =====================
async function init() {
  currentDate = updateDateDisplay();
  await loadTablesStatus();
}

init();
});
</script>
</body>
</html>

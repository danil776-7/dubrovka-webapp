<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka Lounge & Bar</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Arial', sans-serif;
  background: #000;
  color: #e7d9c0;
  min-height: 100vh;
  overflow-x: hidden;
}

.video-background {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, rgba(0,0,0,0.85) 0%, rgba(60,0,0,0.6) 100%);
  z-index: -1;
}

.container {
  max-width: 500px;
  margin: 0 auto;
  padding: 20px;
  position: relative;
  z-index: 1;
}

.logo-container {
  text-align: center;
  margin-bottom: 20px;
  animation: fadeInDown 0.8s ease-out;
}

.logo-img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 15px;
  box-shadow: 0 0 30px rgba(139, 0, 0, 0.5);
  transition: transform 0.3s ease;
  border: 2px solid #8B0000;
}

.logo-img:hover {
  transform: scale(1.05);
  box-shadow: 0 0 40px rgba(139, 0, 0, 0.8);
}

.logo-text {
  font-size: 28px;
  font-weight: bold;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #8B0000 0%, #cc0000 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 5px;
}

.logo-subtitle {
  font-size: 12px;
  color: #8B0000;
  letter-spacing: 3px;
  text-transform: uppercase;
}

.card {
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(15px);
  padding: 25px;
  border-radius: 20px;
  border: 1px solid rgba(139, 0, 0, 0.4);
  box-shadow: 0 8px 32px rgba(139, 0, 0, 0.2);
  animation: fadeInUp 0.8s ease-out;
}

.working-hours {
  background: rgba(139, 0, 0, 0.2);
  padding: 8px;
  border-radius: 8px;
  text-align: center;
  margin-bottom: 15px;
  font-size: 12px;
  color: #d6b36a;
  border: 1px solid rgba(139, 0, 0, 0.3);
}

.working-hours span {
  color: #8B0000;
  font-weight: bold;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 24px;
  color: #8B0000;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: bold;
}

.tables {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.table {
  padding: 15px;
  background: rgba(20, 20, 20, 0.9);
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s ease;
  border: 1px solid rgba(139, 0, 0, 0.3);
  font-weight: bold;
  font-size: 18px;
  color: #fff;
  position: relative;
  overflow: hidden;
}

.table::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(139, 0, 0, 0.3), transparent);
  transition: left 0.5s;
}

.table:hover::before {
  left: 100%;
}

.table:hover {
  background: rgba(139, 0, 0, 0.2);
  transform: translateY(-2px);
  border-color: #8B0000;
}

.table.selected {
  background: #8B0000;
  color: #fff;
  box-shadow: 0 0 20px rgba(139, 0, 0, 0.6);
  border-color: #cc0000;
}

.table.disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.table[data-table="VIP"] {
  background: linear-gradient(135deg, rgba(139, 0, 0, 0.2), rgba(74, 0, 0, 0.2));
  border-color: #8B0000;
  position: relative;
}

.table[data-table="VIP"]::after {
  content: "⭐";
  position: absolute;
  top: -8px;
  right: -8px;
  font-size: 14px;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

.desc {
  background: rgba(20, 20, 20, 0.9);
  padding: 12px;
  border-radius: 12px;
  margin: 15px 0;
  white-space: pre-line;
  font-size: 14px;
  border-left: 3px solid #8B0000;
}

input, select {
  width: 100%;
  padding: 12px 15px;
  margin: 8px 0;
  border-radius: 10px;
  border: 1px solid rgba(139, 0, 0, 0.3);
  background: rgba(20, 20, 20, 0.9);
  color: #fff;
  font-size: 14px;
  transition: all 0.3s ease;
}

input:focus, select:focus {
  outline: none;
  border-color: #8B0000;
  box-shadow: 0 0 10px rgba(139, 0, 0, 0.3);
}

button {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #8B0000 0%, #4a0000 100%);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  font-size: 16px;
  margin-top: 15px;
  color: #fff;
  transition: all 0.3s ease;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
}

button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s;
}

button:hover::before {
  left: 100%;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 20px rgba(139, 0, 0, 0.5);
}

.suggestion-box {
  background: rgba(20, 20, 20, 0.95);
  padding: 15px;
  border-radius: 12px;
  margin-top: 15px;
  display: none;
  border: 1px solid rgba(139, 0, 0, 0.5);
}

.suggestion-box h4 {
  margin: 0 0 10px 0;
  color: #8B0000;
  font-size: 16px;
}

.suggestion-item {
  padding: 12px;
  margin: 8px 0;
  background: rgba(30, 30, 30, 0.9);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-left: 2px solid #8B0000;
}

.suggestion-item:hover {
  background: rgba(139, 0, 0, 0.2);
  transform: translateX(5px);
}

.suggestion-item.selected {
  background: #8B0000;
  color: #fff;
}

.blocked-warning {
  background: linear-gradient(135deg, rgba(139, 0, 0, 0.9), rgba(74, 0, 0, 0.9));
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  display: none;
  color: #fff;
  text-align: center;
  font-size: 14px;
  animation: shake 0.5s ease;
}

.footer {
  margin-top: 25px;
  text-align: center;
  font-size: 13px;
  color: #888;
  border-top: 1px solid rgba(139, 0, 0, 0.3);
  padding-top: 20px;
}

.map-btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 20px;
  background: rgba(20, 20, 20, 0.9);
  border-radius: 20px;
  text-decoration: none;
  color: #8B0000;
  font-size: 12px;
  transition: all 0.3s ease;
  border: 1px solid rgba(139, 0, 0, 0.5);
}

.map-btn:hover {
  background: #8B0000;
  color: #fff;
}

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.shake-animation {
  animation: shake 0.5s ease-in-out;
}

.loading {
  text-align: center;
  padding: 20px;
  color: #8B0000;
}

@media (max-width: 480px) {
  .container { padding: 15px; }
  .card { padding: 20px; }
  .logo-img { width: 100px; height: 100px; }
  .logo-text { font-size: 24px; }
  .table { padding: 12px; font-size: 16px; }
}
</style>
</head>

<body>
<video class="video-background" autoplay muted loop playsinline>
  <source src="bg.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<div class="container">
  <div class="logo-container">
    <img src="logo.png" alt="Dubrovka Lounge & Bar" class="logo-img" onerror="this.style.display='none'">
    <div class="logo-text">DUBROVKA</div>
    <div class="logo-subtitle">LOUNGE & BAR</div>
  </div>

  <div class="card">
    <div class="working-hours">
      🕐 РЕЖИМ РАБОТЫ: <span>ВС-ЧТ: 12:00 - 23:00 | ПТ-СБ: 12:00 - 00:00</span>
    </div>
    
    <h2>🍷 БРОНИРОВАНИЕ СТОЛОВ</h2>

    <div class="tables">
      <div class="table" data-table="1">СТОЛ 1</div>
      <div class="table" data-table="2">СТОЛ 2</div>
      <div class="table" data-table="3">СТОЛ 3</div>
      <div class="table" data-table="4">СТОЛ 4</div>
      <div class="table" data-table="5">СТОЛ 5</div>
      <div class="table" data-table="6">СТОЛ 6</div>
      <div class="table" data-table="VIP">VIP ЗАЛ</div>
    </div>

    <div id="tableInfo" class="desc">✨ ВЫБЕРИТЕ СТОЛ ДЛЯ БРОНИРОВАНИЯ</div>

    <input id="date" type="date">
    <select id="time">
      <option value="">⏰ ВЫБЕРИТЕ ВРЕМЯ</option>
    </select>
    <input id="guests" type="number" placeholder="👥 КОЛИЧЕСТВО ГОСТЕЙ" min="1" max="20">
    <input id="name" placeholder="👤 ВАШЕ ИМЯ">
    <input id="phone" placeholder="📞 ТЕЛЕФОН (+7XXXXXXXXXX)" maxlength="12">

    <button id="bookBtn">ЗАБРОНИРОВАТЬ</button>

    <div id="blockedWarning" class="blocked-warning"></div>
    <div id="suggestionBox" class="suggestion-box">
      <h4>💡 АЛЬТЕРНАТИВНЫЕ ВАРИАНТЫ</h4>
      <div id="suggestions"></div>
    </div>

    <div class="footer">
      <p>📍 Ермакова 11, Новокузнецк</p>
      <p>📞 +7‒913‒432‒01‒01</p>
      <a class="map-btn" href="https://2gis.ru/novokuznetsk/geo/70000001067987554" target="_blank">🗺 ОТКРЫТЬ В 2ГИС</a>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
const API = "https://dubrovka-webapp-production-a00c.up.railway.app";
const tg = window.Telegram.WebApp;
tg.expand();

const phoneInput = document.getElementById("phone");
const nameInput = document.getElementById("name");
const guestsInput = document.getElementById("guests");
const dateInput = document.getElementById("date");
const timeSelect = document.getElementById("time");
const tableInfo = document.getElementById("tableInfo");
const bookBtn = document.getElementById("bookBtn");
const suggestionBox = document.getElementById("suggestionBox");
const suggestionsDiv = document.getElementById("suggestions");
const blockedWarning = document.getElementById("blockedWarning");

let selectedTable = null;
let allBusyTimes = {};
let suggestedOption = null;

// Получить режим работы в зависимости от дня недели
function getWorkingHours(date) {
  const day = new Date(date).getDay();
  // day: 0 - воскресенье, 5 - пятница, 6 - суббота
  
  if (day === 5 || day === 6) {
    // Пятница и суббота: 12:00 до 00:00
    return { start: 12, end: 24, text: "ПТ-СБ: 12:00 - 00:00" };
  } else {
    // Воскресенье - четверг: 12:00 до 23:00
    return { start: 12, end: 23, text: "ВС-ЧТ: 12:00 - 23:00" };
  }
}

// Функция для конвертации времени в минуты
function timeToMinutes(timeStr) {
  let [hours, minutes] = timeStr.split(':').map(Number);
  return hours * 60 + minutes;
}

// Проверка интервала между бронями (минимум 3 часа = 180 минут)
function checkTimeInterval(existingTimes, newTime, minIntervalMinutes = 180) {
  let newTimeMinutes = timeToMinutes(newTime);
  
  for (let existingTime of existingTimes) {
    let existingMinutes = timeToMinutes(existingTime);
    let diff = Math.abs(newTimeMinutes - existingMinutes);
    
    if (diff < minIntervalMinutes) {
      return {
        allowed: false,
        conflictTime: existingTime,
        diffMinutes: diff,
        requiredGap: minIntervalMinutes
      };
    }
  }
  
  return { allowed: true };
}

// Генерация времени с учетом режима работы и интервалов
function generateTimesWithInterval(date, busyTimes, workingHours) {
  let times = [];
  let startHour = workingHours.start;
  let endHour = workingHours.end;
  
  // Сортируем занятые времена
  let sortedBusy = [...busyTimes].sort();
  
  for(let h = startHour; h < endHour; h++) {
    let time1 = `${String(h).padStart(2,'0')}:00`;
    let time2 = `${String(h).padStart(2,'0')}:30`;
    
    // Проверяем время с учетом интервала
    let check1 = checkTimeInterval(sortedBusy, time1, 180);
    let check2 = checkTimeInterval(sortedBusy, time2, 180);
    
    if(check1.allowed) times.push(time1);
    if(check2.allowed) times.push(time2);
  }
  
  return times;
}

function shakeElement(element) {
  element.classList.add('shake-animation');
  setTimeout(() => element.classList.remove('shake-animation'), 500);
}

function showError(message, element = null) {
  if (element) shakeElement(element);
  else shakeElement(bookBtn);
  
  blockedWarning.innerHTML = `❌ ${message}`;
  blockedWarning.style.display = "block";
  setTimeout(() => blockedWarning.style.display = "none", 5000);
}

function showSuccess(message) {
  const successDiv = document.createElement('div');
  successDiv.style.cssText = `
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #006600, #004400);
    color: #fff;
    padding: 12px 20px;
    border-radius: 10px;
    z-index: 10000;
    font-size: 14px;
    font-weight: bold;
    animation: fadeInDown 0.3s ease-out;
    border-left: 3px solid #00ff00;
  `;
  successDiv.innerHTML = `✅ ${message}`;
  document.body.appendChild(successDiv);
  setTimeout(() => successDiv.remove(), 3000);
}

const tables = {
"1": "🍷 ПРИВАТНАЯ ЗОНА\n👥 ДО 7 ГОСТЕЙ | ⏱ МИНИМУМ 2-3 ЧАСА",
"2": "🍷 ПРИВАТНАЯ ЗОНА\n👥 ДО 5 ГОСТЕЙ | ⏱ МИНИМУМ 2-3 ЧАСА",
"3": "🍷 ПРИВАТНАЯ ЗОНА\n👥 ДО 5 ГОСТЕЙ | ⏱ МИНИМУМ 2-3 ЧАСА",
"4": "🍷 ПРИВАТНАЯ ЗОНА\n👥 ДО 5 ГОСТЕЙ | ⏱ МИНИМУМ 2-3 ЧАСА",
"5": "✨ ОТКРЫТАЯ ЗОНА\n👥 ДО 5 ГОСТЕЙ | ⏱ МИНИМУМ 2-3 ЧАСА",
"6": "🪑 КОМПАКТНЫЙ СТОЛ\n👥 ДО 3 ГОСТЕЙ | ⏱ МИНИМУМ 2-3 ЧАСА",
"VIP": "⭐ VIP КОМНАТА\n👑 ЧЕРЕЗ АДМИНИСТРАТОРА | ⏱ МИНИМУМ 3-4 ЧАСА"
};

const TABLE_CAPACITY = {"1": 7, "2": 5, "3": 5, "4": 5, "5": 5, "6": 3, "VIP": 20};

dateInput.min = new Date().toISOString().split("T")[0];
dateInput.value = new Date().toISOString().split("T")[0];

// Загрузка всех занятых времен для всех столов
async function loadAllBusyTimes(date) {
  try {
    let allTables = ["1", "2", "3", "4", "5", "6"];
    let busyData = {};
    
    for (let table of allTables) {
      let res = await fetch(`${API}/busy_times?date=${date}&table=${table}`);
      let busy = await res.json();
      busyData[table] = Array.isArray(busy) ? busy : [];
    }
    
    return busyData;
  } catch(e) {
    console.error(e);
    return {};
  }
}

document.querySelectorAll(".table").forEach(el => {
  el.onclick = async () => {
    if(el.classList.contains("disabled")) return;
    document.querySelectorAll(".table").forEach(t => t.classList.remove("selected"));
    el.classList.add("selected");
    selectedTable = el.dataset.table;
    tableInfo.innerText = tables[selectedTable];
    
    if(selectedTable !== "VIP") {
      await loadTimes();
    }
    suggestionBox.style.display = "none";
    blockedWarning.style.display = "none";
  };
});

async function loadTimes() {
  if(!dateInput.value || !selectedTable || selectedTable === "VIP") return;
  
  try {
    let allBusy = await loadAllBusyTimes(dateInput.value);
    let busyForTable = allBusy[selectedTable] || [];
    let workingHours = getWorkingHours(dateInput.value);
    
    let availableTimes = generateTimesWithInterval(dateInput.value, busyForTable, workingHours);
    let now = new Date();
    
    timeSelect.innerHTML = '<option value="">⏰ ВЫБЕРИТЕ ВРЕМЯ</option>';
    
    availableTimes.forEach(time => {
      let [h,m] = time.split(":");
      let slot = new Date(dateInput.value);
      slot.setHours(h, m);
      
      if(slot >= now) {
        let option = document.createElement("option");
        option.value = time;
        option.innerText = time + " (свободно)";
        timeSelect.appendChild(option);
      }
    });
    
    if(availableTimes.length === 0) {
      timeSelect.innerHTML = '<option value="">❌ НЕТ СВОБОДНЫХ ВРЕМЕН</option>';
      let hours = getWorkingHours(dateInput.value);
      showError(`На ${dateInput.value} нет свободных времен с учетом режима работы (${hours.text}) и 3-часового интервала между бронями`);
    }
    
  } catch(e) {
    console.error(e);
  }
}

dateInput.addEventListener("change", () => {
  if(selectedTable && selectedTable !== "VIP") loadTimes();
  suggestionBox.style.display = "none";
  blockedWarning.style.display = "none";
});

phoneInput.addEventListener("input", () => {
  let v = phoneInput.value.replace(/\D/g,"");
  if(!v.startsWith("7")) v = "7" + v;
  v = v.slice(0,11);
  phoneInput.value = "+" + v;
});

bookBtn.onclick = async () => {
  if(!selectedTable) { showError("ВЫБЕРИТЕ СТОЛ"); return; }
  if(selectedTable === "VIP") { showError("VIP бронируется через администратора\n📞 +7‒913‒432‒01‒01"); return; }
  if(!dateInput.value) { showError("ВЫБЕРИТЕ ДАТУ"); return; }
  if(!timeSelect.value) { showError("ВЫБЕРИТЕ ВРЕМЯ"); return; }
  
  let nameVal = nameInput.value.trim();
  let phoneVal = phoneInput.value;
  let guestsVal = parseInt(guestsInput.value || 0);
  let selectedTime = timeSelect.value;
  let workingHours = getWorkingHours(dateInput.value);
  
  if(!nameVal) { showError("ВВЕДИТЕ ИМЯ", nameInput); return; }
  if(phoneVal.length !== 12) { showError("НЕВЕРНЫЙ НОМЕР (+7XXXXXXXXXX)", phoneInput); return; }
  if(guestsVal < 1) { showError("УКАЖИТЕ КОЛИЧЕСТВО ГОСТЕЙ", guestsInput); return; }
  if(guestsVal > TABLE_CAPACITY[selectedTable]) {
    showError(`СТОЛ ${selectedTable} ВМЕЩАЕТ ${TABLE_CAPACITY[selectedTable]} ГОСТЕЙ`, guestsInput);
    return;
  }
  
  // Проверка времени работы
  let [hours, minutes] = selectedTime.split(':').map(Number);
  if (hours < workingHours.start || hours >= workingHours.end) {
    showError(`⏰ РЕСТОРАН РАБОТАЕТ: ${workingHours.text}\nВыберите время в рабочие часы`);
    return;
  }
  
  // Проверяем интервал с существующими бронями
  let allBusy = await loadAllBusyTimes(dateInput.value);
  let busyForTable = allBusy[selectedTable] || [];
  
  let intervalCheck = checkTimeInterval(busyForTable, selectedTime, 180);
  
  if(!intervalCheck.allowed) {
    showError(`${intervalCheck.reason}\n\n💡 Выберите другое время (минимум через 3 часа после предыдущей брони)`);
    await loadTimes();
    return;
  }
  
  let data = {
    name: nameVal,
    phone: phoneVal,
    guests: guestsVal,
    table: selectedTable,
    date: dateInput.value,
    time: selectedTime,
    user_id: tg.initDataUnsafe?.user?.id || 0
  };
  
  try {
    let res = await fetch(API + "/booking", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(data)
    });
    let result = await res.json();
    
    if(result.error === "busy" || result.detail === "Time slot already booked") {
      showError("СТОЛ УЖЕ ЗАНЯТ В ЭТО ВРЕМЯ");
      await loadTimes();
      return;
    }
    
    if(result.ok || result.id) {
      tg.sendData(JSON.stringify(data));
      showSuccess(`БРОНЬ СОЗДАНА!\n🪑 Стол ${selectedTable}\n⏰ ${selectedTime}\n👤 ${nameVal}\n\n⏱ Минимальное время посещения: 2-3 часа\n🏠 Режим работы: ${workingHours.text}`);
      
      nameInput.value = "";
      guestsInput.value = "";
      timeSelect.value = "";
      document.querySelectorAll(".table").forEach(t => t.classList.remove("selected"));
      selectedTable = null;
      tableInfo.innerText = "✨ ВЫБЕРИТЕ СТОЛ ДЛЯ БРОНИРОВАНИЯ";
      await loadTimes();
    } else {
      showError("ОШИБКА: " + (result.detail || "НЕИЗВЕСТНАЯ ОШИБКА"));
    }
  } catch(e) {
    console.error(e);
    showError("ОШИБКА СОЕДИНЕНИЯ С СЕРВЕРОМ");
  }
};
</script>
</body>
</html>

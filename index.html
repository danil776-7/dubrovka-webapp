<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{margin:0;font-family:-apple-system;background:#2b1208;color:white;}
.top{background:#eee;color:black;padding:12px;display:flex;justify-content:space-between;}
.timeline{background:#3b1509;padding:15px;}
.slider{display:flex;overflow-x:auto;gap:8px;}
.time{min-width:70px;text-align:center;padding:10px;background:#0003;border-radius:10px;cursor:pointer;}
.time.active{background:white;color:black;}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:12px;}
.card{position:relative;border-radius:16px;overflow:hidden;cursor:pointer;}
.card img{width:100%;height:160px;object-fit:cover;}

.status{position:absolute;top:8px;left:8px;padding:5px 8px;border-radius:6px;font-size:12px;}
.green{background:#1f7a1f;} .red{background:#a02020;} .yellow{background:#aa8800;}

.info{position:absolute;bottom:0;width:100%;padding:10px;background:linear-gradient(to top,#000c,transparent);}

.modal{position:fixed;inset:0;background:#000;display:none;z-index:9999;}
.modal.active{display:block;}

.header-modal{display:flex;justify-content:space-between;padding:12px;background:#111;}

.btn{margin:15px;padding:15px;background:#ddd;color:black;border-radius:10px;text-align:center;cursor:pointer;}

input{width:90%;margin:10px;padding:12px;border-radius:10px;border:none;}
</style>
</head>

<body>

<div class="top">
  <div>Dubrovka Lounge</div>
  <div>+7‒913‒432‒01‒01</div>
</div>

<div class="timeline">
  <div>Выберите время</div>
  <div id="slider" class="slider"></div>
</div>

<div id="grid" class="grid"></div>

<!-- TABLE MODAL -->
<div id="modal" class="modal">
  <div class="header-modal">
    <div onclick="closeModal()">←</div>
    <div id="modalTitle"></div>
    <div onclick="closeModal()">✕</div>
  </div>

  <img id="modalImg" src="https://via.placeholder.com/400x250">

  <div class="btn" onclick="openBooking()">Забронировать →</div>
</div>

<!-- BOOKING MODAL -->
<div id="bookingModal" class="modal">
  <div class="header-modal">
    <div onclick="closeBooking()">←</div>
    <div>Бронирование</div>
    <div onclick="closeBooking()">✕</div>
  </div>

  <input id="name" placeholder="Имя">
  <input id="phone" placeholder="+7XXXXXXXXXX">
  <input id="guests" type="number" value="2">

  <div class="btn" onclick="book()">Подтвердить</div>
</div>

<script>
const API="https://dubrovka-webapp-production.up.railway.app";

const slider=document.getElementById("slider");
const grid=document.getElementById("grid");

const TABLES=[
 {id:"1",cap:7,img:"https://via.placeholder.com/300"},
 {id:"2",cap:5,img:"https://via.placeholder.com/300"},
 {id:"3",cap:5,img:"https://via.placeholder.com/300"},
 {id:"4",cap:5,img:"https://via.placeholder.com/300"},
 {id:"5",cap:5,img:"https://via.placeholder.com/300"},
 {id:"6",cap:3,img:"https://via.placeholder.com/300"}
];

let selectedTime=null;
let selectedTable=null;
let busyTimes={};

/* ===== TIME ===== */
for(let h=12;h<24;h++){
 let t=h+":00";
 let el=document.createElement("div");

 el.className="time";
 el.innerText=t;

 el.onclick=()=>{
  selectedTime=t;
  document.querySelectorAll(".time").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
  render();
 };

 slider.appendChild(el);
}

/* ===== UTILS ===== */
function toMin(t){let [h,m]=t.split(":");return h*60+ +m;}
function duration(g){return g<=2?90:g<=4?120:240;}

/* ===== STATUS ===== */
function getStatus(table){
 if(!selectedTime) return {text:"Выберите время"};

 let times=busyTimes[table]||[];
 let start=toMin(selectedTime);
 let end=start+duration(2);

 for(let t of times){
  let s=toMin(t);
  let e=s+duration(5);

  if(start<e && end>s){
    return {text:"Занят",color:"red"};
  }
 }

 return {text:"Свободно",color:"green"};
}

/* ===== RENDER ===== */
function render(){
 grid.innerHTML="";

 TABLES.forEach(t=>{
  let st=getStatus(t.id);

  let el=document.createElement("div");
  el.className="card";

  el.innerHTML=`
    <img src="${t.img}">
    <div class="status ${st.color||""}">${st.text}</div>
    <div class="info">№${t.id} 👥 ${t.cap}</div>
  `;

  el.onclick=()=>openModal(t);

  grid.appendChild(el);
 });
}

/* ===== LOAD ===== */
async function load(){
 for(let t of TABLES){
  try{
   let res=await fetch(`${API}/busy_times?table=${t.id}`);
   busyTimes[t.id]=await res.json();
  }catch{
   busyTimes[t.id]=[];
  }
 }
 render();
}

/* ===== MODALS ===== */
function openModal(t){
 selectedTable=t.id;
 modal.classList.add("active");
 modalTitle.innerText="Стол "+t.id;
 modalImg.src=t.img;
}

function closeModal(){modal.classList.remove("active");}

function openBooking(){
 modal.classList.remove("active");
 bookingModal.classList.add("active");
}

function closeBooking(){bookingModal.classList.remove("active");}

/* ===== BOOK ===== */
async function book(){

 if(!selectedTime || !selectedTable){
  alert("Выберите время и стол");
  return;
 }

 let data={
  name:name.value,
  phone:phone.value,
  guests:parseInt(guests.value),
  table:selectedTable,
  time:selectedTime,
  date:new Date().toISOString().split("T")[0]
 };

 try{
  let res=await fetch(API+"/booking",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify(data)
  });

  let result=await res.json();

  if(result.error){
    alert("Стол уже занят");
    return;
  }

  alert("Бронь создана ✅");

  bookingModal.classList.remove("active");
  load();

 }catch{
  alert("Ошибка сервера");
 }
}

/* INIT */
load();
</script>

</body>
</html>

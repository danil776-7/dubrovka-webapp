<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka Lounge & Bar</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#2b1208;
  color:white;
}

/* HEADER */
.top{
  background:#eee;
  color:black;
  padding:10px;
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

/* TIMELINE */
.timeline{
  padding:15px;
  background:#3b1509;
}

.times{
  display:flex;
  overflow-x:auto;
  gap:10px;
}

.time{
  padding:8px 12px;
  border:1px solid #fff3;
  border-radius:8px;
  cursor:pointer;
}

.time.active{
  background:white;
  color:black;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

/* CARD */
.card{
  position:relative;
  border-radius:14px;
  overflow:hidden;
  background:#555;
  cursor:pointer;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.status{
  position:absolute;
  top:8px;
  left:8px;
  background:#000a;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

.dot{
  position:absolute;
  top:8px;
  right:8px;
  width:8px;
  height:8px;
  background:#4cff4c;
  border-radius:50%;
}

.card-info{
  padding:10px;
  background:#6b5a54;
  font-size:13px;
}

/* VIP */
.vip{
  margin:10px;
  padding:14px;
  border:1px solid #fff3;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  z-index:9999;
}

.modal.active{display:block;}

.modal-header{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.gallery img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.btn{
  margin:15px;
  padding:15px;
  background:#ddd;
  color:black;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="top">
  <div>Dubrovka Lounge</div>
  <div>+7‒913‒432‒01‒01</div>
</div>

<!-- TIME -->
<div class="timeline">
  <div>Забронировать с 12:00</div>
  <div class="times" id="times"></div>
</div>

<!-- TABLES -->
<div id="grid" class="grid"></div>

<!-- VIP -->
<div class="vip" onclick="alert('VIP бронируется через администратора\n📞 +7‒913‒432‒01‒01')">
VIP ЗАЛ
</div>

<!-- MODAL TABLE -->
<div id="modal" class="modal">
  <div class="modal-header">
    <div onclick="closeModal()">← Назад</div>
    <div onclick="closeModal()">✕</div>
  </div>

  <div class="gallery">
    <img src="https://via.placeholder.com/400x250">
  </div>

  <div style="padding:10px;">
    <h2 id="title"></h2>
    <p id="desc"></p>
    <p>Нет броней</p>
  </div>

  <div class="btn">Забронировать →</div>
</div>

<script>
/* ТВОИ СТОЛЫ */
const TABLES=[
 {id:"1",cap:7,floor:"1 этаж"},
 {id:"2",cap:5,floor:"1 этаж"},
 {id:"3",cap:5,floor:"1 этаж"},
 {id:"4",cap:5,floor:"1 этаж"},
 {id:"5",cap:5,floor:"1 этаж"},
 {id:"6",cap:3,floor:"1 этаж"}
];

/* ТВОИ ОПИСАНИЯ */
const DESCRIPTIONS={
 "1":"🍷 Приватная зона со шторками и PlayStation\n👥 до 7 гостей",
 "2":"🍷 Приватная зона со шторками и PlayStation\n👥 до 5 гостей",
 "3":"🍷 Приватная зона со шторками и PlayStation\n👥 до 5 гостей",
 "4":"🍷 Приватная зона со шторками и PlayStation\n👥 до 5 гостей",
 "5":"✨ Открытая зона\n👥 до 5 гостей",
 "6":"🪑 Компактный стол\n👥 до 3 гостей"
};

/* TIME */
for(let h=12;h<24;h++){
 let el=document.createElement("div");
 el.className="time";
 el.innerText=h+":00";

 el.onclick=()=>{
  document.querySelectorAll(".time").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
 };

 document.getElementById("times").appendChild(el);
}

/* TABLES */
const grid=document.getElementById("grid");

TABLES.forEach(t=>{
 let el=document.createElement("div");
 el.className="card";

 el.innerHTML=`
  <img src="https://via.placeholder.com/300x150">
  <div class="status">Свободно</div>
  <div class="dot"></div>
  <div class="card-info">
   ${t.floor}<br>
   №${t.id} стол 👥 ${t.cap}
  </div>
 `;

 el.onclick=()=>openTable(t.id);

 grid.appendChild(el);
});

/* OPEN */
function openTable(id){
 document.getElementById("modal").classList.add("active");
 document.getElementById("title").innerText="Стол №"+id;
 document.getElementById("desc").innerText=DESCRIPTIONS[id];
}

function closeModal(){
 document.getElementById("modal").classList.remove("active");
}
</script>

</body>
</html>

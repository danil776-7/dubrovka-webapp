<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka Lounge</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<video class="bg" autoplay muted loop playsinline>
    <source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

<div class="logo">
<img src="logo.png">
</div>

<h1>Dubrovka Lounge</h1>

<div class="tables">
<div class="table" data-table="1">1</div>
<div class="table" data-table="2">2</div>
<div class="table" data-table="3">3</div>
<div class="table" data-table="4">4</div>
<div class="table" data-table="5">5</div>
<div class="table" data-table="6">6</div>
<div class="table vip" data-table="VIP">VIP</div>
</div>

<div id="tableInfo" class="info">Выберите стол</div>

<input type="date" id="date">
<select id="time"></select>

<input type="number" id="guests" placeholder="Количество гостей" min="1">
<input type="text" id="name" placeholder="Имя">
<input type="tel" id="phone" placeholder="Телефон">

<button id="bookBtn">Забронировать</button>

<div class="footer">
📍 Dubrovka Lounge<
📞 +7 (XXX) XXX-XX-XX<b
a href="https://2gis.ru" target="_blank">Открыть в 2GIS</a>
</div>

</div>

<script src="script.js"></script>
</body>
</html>

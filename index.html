<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Дубровка — Бронирование</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<video autoplay muted loop playsinline class="video-bg">
<source src="media/bg.mp4" type="video/mp4">
</video>

<div class="container">

<img src="img/logo.png" class="logo">

<h2 class="subtitle">Бронирование столов</h2>

<p class="desc">Кальянный лаунж с приватными зонами</p>

<p class="worktime">🕒 13:00 — 23:00</p>

<label>Дата бронирования</label>
<input type="date" id="date">

<label>Время</label>

<select id="time">

<option>13:00</option>
<option>14:00</option>
<option>15:00</option>
<option>16:00</option>
<option>17:00</option>
<option>18:00</option>
<option>19:00</option>
<option>20:00</option>
<option>21:00</option>
<option>22:00</option>
<option>23:00</option>

</select>

<h3>Выберите стол</h3>

<div class="tables">

<div class="table" data-table="1">1</div>
<div class="table" data-table="2">2</div>
<div class="table" data-table="3">3</div>
<div class="table" data-table="4">4</div>

<div class="table" data-table="5">5</div>
<div class="table" data-table="6">6</div>

<div class="table vip" data-table="VIP">VIP</div>

</div>

<!-- описание стола -->

<div id="tableInfo" class="table-info">
Выберите стол чтобы увидеть описание
</div>

<label>Ваше имя</label>
<input type="text" id="name" placeholder="Введите имя">

<label>Телефон</label>
<input type="tel" id="phone" placeholder="+7 (___) ___-__-__ "

<button class="neon-btn" onclick="sendBooking()">
Забронировать стол
</button>

</div>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dubrovka Lounge</title>

<style>
body {
margin:0;
font-family:Arial;
background:#000;
color:#e7d9c0;
}

/* видео */
video{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* затемнение */
.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:-1;
}

/* контейнер */
.container{
max-width:420px;
margin:auto;
padding:20px;
}

/* карточка */
.card{
background:rgba(20,20,20,0.85);
padding:20px;
border-radius:20px;
}

/* карта столов */
.tables-map{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin:15px 0;
}

.table{
padding:18px;
border-radius:12px;
background:#222;
text-align:center;
cursor:pointer;
border:1px solid #333;
}

.table.selected{
background:#d6b36a;
color:black;
}

.vip{
border:2px solid gold;
}

/* описание */
.desc{
background:#111;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

/* поля */
input, select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
}

/* кнопка */
button{
width:100%;
padding:14px;
background:linear-gradient(135deg,#d6b36a,#a88c4a);
border:none;
border-radius:10px;
margin-top:10px;
}

/* футер */
.footer{
margin-top:20px;
text-align:center;
font-size:14px;
color:#ccc;
}

.map-btn{
display:block;
margin-top:10px;
padding:10px;
background:#222;
border-radius:8px;
text-decoration:none;
color:white;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
<source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">
<div class="card">

<h2>Бронирование</h2>

<div class="tables-map">

<div class="table" data-table="1">1<br><small>Приват</small></div>
<div class="table" data-table="2">2<br><small>Приват</small></div>
<div class="table" data-table="3">3<br><small>Приват</small></div>
<div class="table" data-table="4">4<br><small>Приват</small></div>
<div class="table" data-table="5">5<br><small>Открытая</small></div>
<div class="table" data-table="6">6<br><small>2-3 чел</small></div>
<div class="table vip" data-table="VIP">VIP</div>

</div>

<div id="tableInfo" class="desc">
Выберите стол
</div>

<input id="guests" type="number" placeholder="Количество гостей">
<input id="name" placeholder="Имя">
<input id="phone" placeholder="+7999..." maxlength="12">

<input type="date" id="date">
<input type="time" id="time">

<button id="bookBtn">Забронировать</button>

<div class="footer">
📍 Ермакова 11<br>
📞 +7‒913‒432‒01‒01

<a class="map-btn" href="https://2gis.ru/novokuznetsk/geo/70000001067987554" target="_blank">
Открыть в 2ГИС
</a>
</div>

</div>
</div>

<script>
const API = "https://dubrovka-webapp-1.onrender.com";

let selectedTable = null;

/* столы */
const tables = {
"1": {text:"Приватная зона + PlayStation\nДо 7 гостей",max:7},
"2": {text:"Приватная зона + PlayStation\nДо 5 гостей",max:5},
"3": {text:"Приватная зона + PlayStation\nДо 5 гостей",max:5},
"4": {text:"Приватная зона + PlayStation\nДо 5 гостей",max:5},
"5": {text:"Открытая зона\nДо 5 гостей",max:5},
"6": {text:"Компактный стол\nДо 3 гостей",max:3},
"VIP": {text:"VIP комната\nДепозитная\nБронирование через администратора",max:10}
};

/* выбор */
document.querySelectorAll(".table").forEach(el=>{
el.onclick=()=>{
document.querySelectorAll(".table").forEach(t=>t.classList.remove("selected"));
el.classList.add("selected");

selectedTable=el.dataset.table;

tableInfo.innerText=tables[selectedTable].text;
};
});

/* телефон */
phone.addEventListener("input",()=>{
let v=phone.value.replace(/\D/g,"");
if(!v.startsWith("7")) v="7"+v;
v=v.slice(0,11);
phone.value="+"+v;
});

/* бронь */
bookBtn.onclick=async()=>{

let guests=parseInt(guests.value);
let nameVal=name.value.trim();
let phoneVal=phone.value;

if(!selectedTable) return alert("Выберите стол");

/* VIP логика */
if(selectedTable==="VIP"){
return alert("VIP комната бронируется через администратора");
}

if(!nameVal) return alert("Введите имя");
if(phoneVal.length!==12) return alert("Введите номер");
if(!date.value) return alert("Выберите дату");
if(!time.value) return alert("Выберите время");

if(guests>tables[selectedTable].max){
return alert("Слишком много гостей");
}

/* кальян */
if(guests>=5){
if(!confirm("От 5 гостей обязательно 2 кальяна. Продолжить?")) return;
}

let res=await fetch(API+"/booking",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:nameVal,
phone:phoneVal,
guests:guests,
table:selectedTable,
date:date.value,
time:time.value,
user_id:0
})
});

let result=await res.json();

if(result.error){
alert("Стол занят");
return;
}

document.body.innerHTML="<h2 style='text-align:center;margin-top:100px;'>Бронь отправлена</h2>";
};
</script>

</body>
</html>

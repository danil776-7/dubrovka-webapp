<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dubrovka Lounge</title>

<style>
body{
  margin:0;
  font-family:-apple-system, Arial;
  background:#2b1208;
  color:white;
}

/* CONTAINER */
.container{
  max-width:1200px;
  margin:auto;
}

/* HEADER */
.top{
  background:#eee;
  color:black;
  padding:12px;
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

/* TIMELINE */
.timeline{
  background:#3b1509;
  padding:15px;
}

.slider{
  display:flex;
  gap:8px;
  overflow-x:auto;
}

.time{
  padding:10px 14px;
  background:#0003;
  border-radius:10px;
  cursor:pointer;
}

.time.active{
  background:white;
  color:black;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}

@media(min-width:768px){
  .grid{grid-template-columns:repeat(3,1fr);}
}

@media(min-width:1200px){
  .grid{grid-template-columns:repeat(4,1fr);}
}

/* CARD */
.card{
  position:relative;
  border-radius:16px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

/* STATUS */
.status{
  position:absolute;
  top:8px;
  left:8px;
  padding:5px 8px;
  border-radius:6px;
  font-size:12px;
  background:#000a;
}

.status.green{background:#1f7a1f;}
.status.red{background:#a02020;}
.status.yellow{background:#aa8800;}

.dot{
  position:absolute;
  top:10px;
  right:10px;
  width:8px;
  height:8px;
  border-radius:50%;
}

.dot.green{background:#4cff4c;}
.dot.red{background:#ff4c4c;}
.dot.yellow{background:#ffc107;}

.info{
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  background:linear-gradient(to top,#000c,transparent);
  font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<div class="top">
  <div>Dubrovka Lounge</div>
  <div>+7‒913‒432‒01‒01</div>
</div>

<div class="timeline">
  <div>Выберите время</div>
  <div id="slider" class="slider"></div>
</div>

<div id="grid" class="grid"></div>

</div>

<script>
const API="https://dubrovka-webapp-production.up.railway.app";

/* СТОЛЫ */
const TABLES=[
 {id:"1",cap:7,img:"table1.jpg"},
 {id:"2",cap:5,img:"table2.jpg"},
 {id:"3",cap:5,img:"table3.jpg"},
 {id:"4",cap:5,img:"table4.jpg"},
 {id:"5",cap:5,img:"table5.jpg"},
 {id:"6",cap:3,img:"table6.jpg"},
 {id:"vip",cap:"VIP",img:"vip.jpg"}
];

let selectedTime=null;
let bookings=[];

/* ===== ВРЕМЯ (СЛАЙДЕР) ===== */
for(let h=12;h<24;h++){
 let t=h+":00";

 let el=document.createElement("div");
 el.className="time";
 el.innerText=t;

 el.onclick=()=>{
  selectedTime=t;
  document.querySelectorAll(".time").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");

  renderTables();
 };

 slider.appendChild(el);
}

/* ===== ДЛИТЕЛЬНОСТЬ ===== */
function duration(g=2){
 if(g<=2) return 90;
 if(g<=4) return 120;
 return 240;
}

/* ===== ПЕРЕВОД В МИНУТЫ ===== */
function toMin(t){
 let [h,m]=t.split(":");
 return h*60+ +m;
}

function minToTime(m){
 let h=Math.floor(m/60);
 let min=m%60;
 return `${String(h).padStart(2,"0")}:${String(min).padStart(2,"0")}`;
}

/* ===== СТАТУС ===== */
function getStatus(tableId){

 if(!selectedTime) return {
  text:"Выберите время",
  color:""
 };

 if(tableId==="vip"){
  return {
    text:"Через администратора",
    color:"yellow"
  };
 }

 let startUser=toMin(selectedTime);
 let endUser=startUser+duration(2);

 let tableBookings=bookings.filter(b=>b.table==tableId);

 for(let b of tableBookings){
  let start=toMin(b.time);
  let end=start+duration(5);

  // занят
  if(startUser < end && endUser > start){
    return {
      text:`Занят с ${b.time} до ${minToTime(end)}`,
      color:"red"
    };
  }

  // предупреждение (<90 мин)
  if(startUser < start){
    let gap=start - endUser;
    if(gap < 90){
      return {
        text:`⚠ До ${b.time}`,
        color:"yellow"
      };
    }
    return {
      text:`Свободно до ${b.time}`,
      color:"green"
    };
  }
 }

 return {
  text:"Свободно",
  color:"green"
 };
}

/* ===== РЕНДЕР ===== */
function renderTables(){
 grid.innerHTML="";

 TABLES.forEach(t=>{
  let st=getStatus(t.id);

  let el=document.createElement("div");
  el.className="card";

  el.innerHTML=`
    <img src="${t.img}">
    <div class="status ${st.color}">${st.text}</div>
    <div class="dot ${st.color}"></div>
    <div class="info">№${t.id} 👥 ${t.cap}</div>
  `;

  grid.appendChild(el);
 });
}

/* ===== ЗАГРУЗКА БРОНЕЙ ===== */
async function loadBookings(){
 try{
  let res=await fetch(API+"/all_bookings");
  bookings=await res.json();
 }catch(e){
  console.log("нет API, используем тест");

  // ТЕСТ
  bookings=[
    {table:"1",time:"18:00"},
    {table:"2",time:"19:00"},
    {table:"3",time:"20:00"}
  ];
 }
}

/* INIT */
loadBookings().then(renderTables);
</script>

</body>
</html>
